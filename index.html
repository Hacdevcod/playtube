<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    
    <meta http-equiv="Content-Security-Policy" content="
        media-src * blob: mediastream:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com;
        connect-src * blob:;
        worker-src blob:;
        frame-src https://www.youtube.com https://www.youtube-nocookie.com;
    ">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='96' fill='%23ff0000'/><polygon points='80,60 80,132 140,96' fill='white'/></svg>">
    
    <title>Play Tube Music</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 65px;
            --topbar-h: 50px;
            --safe-t: 0px;
            --safe-b: 0px;
            --nav-bar-h: 0px;
            --font-scale: 1;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; height: 100%; height: 100dvh; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-top: calc(var(--safe-t) + var(--topbar-h));
            padding-bottom: calc(var(--player-h) + 8px + var(--nav-bar-h) + var(--safe-b));
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }

        /* Player do YouTube (transparente, apenas para áudio) */
        #ytPlayerContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
        }
        
        #ytPlayerContainer iframe {
            width: 100%;
            height: 100%;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: fixed;
            top: var(--safe-t);
            left: 0;
            right: 0;
            height: var(--topbar-h);
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 1rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .bg-play-indicator {
            display: none; width: 8px; height: 8px;
            background: var(--green); border-radius: 50%;
            margin-right: 5px; animation: pulse 1.5s infinite;
        }
        .bg-play-indicator.active { display: inline-block; }

        /* ===== PAGE COUNTER ===== */
        .page-counter {
            display: none; align-items: center; justify-content: center;
            gap: 8px; padding: 8px 10px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .page-counter.active { display: flex; }
        .page-btn-pg {
            padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text); font-size: 0.7rem; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .page-btn-pg:active { background: var(--red); color: #fff; }
        .page-btn-pg:disabled { opacity: 0.3; pointer-events: none; }
        .page-info-pg {
            font-size: 0.75rem; color: var(--text2); min-width: 90px; text-align: center;
            font-weight: 600;
        }
        .page-info-pg .pg-current { color: var(--red); font-size: 0.9rem; }
        .page-jump-pg {
            width: 42px; text-align: center; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 10px; 
            color: var(--text); font-size: 0.7rem; padding: 5px;
        }
        .page-items-range { font-size: 0.65rem; color: var(--text3); }

        /* ===== SEARCH ===== */
        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; position: relative; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); opacity: 1; }
        .search-btn {
            width: 42px; background: var(--surface2); border: none; color: var(--text);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .search-btn:active { background: var(--red); color: #fff; }

        /* ===== TABS ===== */
        .tabs-container { 
            display: flex; gap: 4px; padding: 4px 12px 8px; 
            background: var(--bg); overflow-x: auto; 
            position: relative; z-index: 40;
        }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* ===== RESULTS ===== */
        .results-section { 
            padding: 4px 12px 20px; 
            background: var(--bg); 
            min-height: 200px;
        }
        .section-title {
            font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 10px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }
        .v-btn.dl:active { background: var(--green); }

        /* ===== SPOTIFY BAR (PLAYER) ===== */
        .spotify-bar {
            position: fixed;
            bottom: calc(var(--nav-bar-h) + var(--safe-b));
            left: 0;
            right: 0;
            height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            z-index: 200;
            border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-art.playing { 
            animation: spin 8s linear infinite; 
            border-radius: 50%; 
            box-shadow: 0 0 15px rgba(29,185,84,0.3); 
        }
        .sp-info { 
            flex: 1; 
            min-width: 0; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
        }
        .sp-title { 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #fff; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .sp-artist { 
            font-size: 0.7rem; 
            color: rgba(255,255,255,0.7); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .sp-progress { 
            position: absolute; 
            top: -2px; 
            left: 0; 
            right: 0; 
            height: 3px; 
            background: rgba(255,255,255,0.1); 
            cursor: pointer; 
        }
        .sp-progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #1db954, #1ed760); 
            width: 0%; 
            transition: width 0.3s linear; 
            animation: progressGlow 2s ease-in-out infinite; 
        }
        .sp-controls { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        .sp-btn { 
            background: none; 
            border: none; 
            color: rgba(255,255,255,0.9); 
            font-size: 0.9rem; 
            cursor: pointer; 
            padding: 6px; 
            transition: all 0.2s; 
        }
        .sp-btn:active { 
            transform: scale(0.85); 
            color: #fff; 
        }
        .sp-btn.play {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            color: #000;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-btn.play.playing { 
            background: var(--green); 
            color: #fff; 
        }
        .sp-dl {
            background: rgba(29,185,84,0.15);
            border: none;
            color: var(--green);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 15px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .sp-dl:active { 
            background: rgba(29,185,84,0.3); 
            transform: scale(0.95); 
        }
        .sp-dl.downloading { 
            animation: downloading 0.8s infinite; 
            background: rgba(29,185,84,0.3); 
        }

        /* ===== TOAST & LOADING ===== */
        .toast {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 15px);
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            z-index: 600;
            transition: transform 0.3s;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        .dl-progress {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 10px);
            left: 12px;
            right: 12px;
            background: var(--surface);
            border-radius: 10px;
            padding: 10px;
            z-index: 300;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dl-progress.active { display: block; }
        .dl-bar { 
            height: 3px; 
            background: var(--border); 
            border-radius: 2px; 
            overflow: hidden; 
            margin-top: 6px; 
        }
        .dl-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #1db954, #00e676); 
            width: 0%; 
            transition: width 0.3s; 
        }

        /* ===== PLAYER VIDEO ===== */
        .player-container {
            width: 100%;
            background: #000;
            display: none;
            position: relative;
            animation: slideUp 0.4s ease;
            border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-container.rainbow-border { 
            animation: rainbow 3s linear infinite; 
            border-width: 2px; 
            border-style: solid; 
        }
        .player-wrapper { 
            width: 100%; 
            aspect-ratio: 16/9; 
            position: relative; 
        }
        .player-wrapper iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        .player-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Media Queries */
        @media (max-width: 360px) { 
            :root { --player-h: 58px; --topbar-h: 44px; }
            .sp-art { width: 38px; height: 38px; } 
            .sp-btn.play { width: 34px; height: 34px; } 
            .video-thumb { width: 40px; height: 40px; }
            .sp-title { font-size: 0.8rem; }
            .sp-artist { font-size: 0.65rem; }
            .sp-btn { font-size: 0.8rem; padding: 4px; }
            .sp-dl { font-size: 0.65rem; padding: 4px 6px; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 6px + var(--nav-bar-h) + var(--safe-b));
            }
        }
        
        @media (min-width: 768px) { 
            body { max-width: 550px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
            .topbar { max-width: 550px; left: 50%; transform: translateX(-50%); }
            .spotify-bar { max-width: 550px; left: 50%; transform: translateX(-50%); }
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            :root { --player-h: 46px; --topbar-h: 40px; }
            .sp-art { width: 30px; height: 30px; }
            .sp-btn.play { width: 28px; height: 28px; font-size: 0.7rem; }
            .results-section { max-height: 35vh; overflow-y: auto; }
            .sp-title { font-size: 0.75rem; }
            .sp-artist { font-size: 0.6rem; }
            .sp-btn { font-size: 0.7rem; padding: 2px; }
            .sp-dl { font-size: 0.6rem; padding: 3px 5px; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 4px + var(--nav-bar-h) + var(--safe-b));
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- Player do YouTube (oculto, para áudio) -->
    <div id="ytPlayerContainer"></div>

    <!-- TOPBAR -->
    <div class="topbar" id="topbar">
        <div class="logo">
            <div class="logo-icon">♪</div>
            <span class="logo-text">Play Tube<sup>MUSIC</sup></span>
        </div>
        <div class="spacer"></div>
        <span class="bg-play-indicator" id="bgPlayIndicator" title="Reproduzindo em background"></span>
        <button class="theme-btn" onclick="T.cycle()" title="Tema">🎨</button>
    </div>

    <!-- PLAYER VIDEO -->
    <div class="player-container" id="playerContainer">
        <div class="player-wrapper" id="playerWrapper"></div>
        <button class="player-close" onclick="closeVideo()">✕</button>
    </div>

    <!-- PAGE COUNTER -->
    <div class="page-counter" id="pageCounter">
        <button class="page-btn-pg" onclick="changePage('first')" id="btnFirst">⏮</button>
        <button class="page-btn-pg" onclick="changePage('prev')" id="btnPrev">◀</button>
        <span class="page-info-pg" id="pageInfo">
            Pág <span class="pg-current" id="pageCurrent">1</span> de <span id="pageTotal">1</span>
        </span>
        <button class="page-btn-pg" onclick="changePage('next')" id="btnNext">▶</button>
        <button class="page-btn-pg" onclick="changePage('last')" id="btnLast">⏭</button>
        <input type="number" class="page-jump-pg" id="pageJump" min="1" placeholder="Pág" 
               onkeydown="if(event.key==='Enter')jumpToPage()">
        <span class="page-items-range" id="itemsRange"></span>
    </div>

    <!-- BUSCA -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🎵 Buscar música..." autocomplete="off" enterkeyhint="search">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('search')">🔍 Buscar</button>
        <button class="tab-btn" onclick="switchTab('favorites')">❤️ Favoritos</button>
        <button class="tab-btn" onclick="switchTab('history')">🕐 Histórico</button>
        <button class="tab-btn" onclick="switchTab('downloads')">⬇️ Downloads</button>
    </div>

    <!-- RESULTADOS -->
    <div class="results-section">
        <div class="section-title" id="sectionTitle"><span>Resultados</span><span class="result-count" id="resultCount"></span></div>
        <div id="resultsContainer">
            <div style="text-align:center;padding:50px;color:var(--text2);">
                <div style="font-size:3rem;">🎧</div>
                <div style="font-size:1.1rem;color:var(--text);">Play Tube Music</div>
            </div>
        </div>
    </div>

    <!-- PLAYER BAR -->
    <div class="spotify-bar" id="spotifyBar">
        <div class="sp-progress" id="progressContainer" onclick="seekTrack(event)">
            <div class="sp-progress-bar" id="progressBar"></div>
        </div>
        <img class="sp-art" id="spArt" src="" alt="" onclick="showVideo()">
        <div class="sp-info" onclick="showVideo()">
            <div class="sp-title" id="spTitle">Nenhuma música</div>
            <div class="sp-artist" id="spArtist">Toque para tocar</div>
        </div>
        <div class="sp-controls">
            <button class="sp-btn" onclick="prevTrack()">⏮</button>
            <button class="sp-btn play" id="spPlay" onclick="togglePlay()">▶</button>
            <button class="sp-btn" onclick="nextTrack()">⏭</button>
        </div>
        <button class="sp-dl" id="spDL" onclick="downloadCurrent()" title="Download">⬇</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- DOWNLOAD PROGRESS -->
    <div class="dl-progress" id="dlProgress">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="color:var(--text);font-size:0.75rem;">⬇️ Baixando...</span>
            <span style="color:var(--text2);font-size:0.7rem;" id="dlPercent">0%</span>
        </div>
        <div class="dl-bar"><div class="dl-fill" id="dlFill"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
    (function() {
        'use strict';
        const PROXY = 'https://playtube-proxy.codw23.workers.dev';

        // ===== DETECÇÃO DE BARRAS DO SISTEMA =====
        function detectSystemBars() {
            const style = getComputedStyle(document.documentElement);
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            let safeTop = parseInt(style.getPropertyValue('env(safe-area-inset-top)')) || 
                         parseInt(style.getPropertyValue('constant(safe-area-inset-top)')) || 0;
            let safeBottom = parseInt(style.getPropertyValue('env(safe-area-inset-bottom)')) || 
                            parseInt(style.getPropertyValue('constant(safe-area-inset-bottom)')) || 0;
            let navBarHeight = 0;
            
            const isAndroid = /Android/.test(navigator.userAgent);
            
            if (isAndroid) {
                const screenHeight = screen.height || h;
                const heightDiff = screenHeight - h;
                if (heightDiff > 50 && safeBottom === 0) navBarHeight = 48;
                if (safeBottom > 0 && safeBottom <= 48) { navBarHeight = safeBottom; safeBottom = 0; }
            }
            
            if (safeTop === 0 && dpr >= 3 && w < 430) safeTop = 47;
            else if (safeTop === 0 && dpr >= 2 && w < 430) safeTop = 24;
            
            if (safeBottom === 0 && navBarHeight === 0) {
                if (dpr >= 3 && w < 430 && !isAndroid) safeBottom = 34;
                else if (isAndroid && w < 430 && safeBottom === 0) navBarHeight = 48;
            }
            
            return { statusBarHeight: safeTop, safeBottom: safeBottom, navBarHeight: navBarHeight };
        }

        // ===== AUTO AJUSTE DE TELA =====
        function autoAdjustScreen() {
            const w = window.innerWidth, h = window.innerHeight, dpr = window.devicePixelRatio || 1;
            const portrait = h > w, mobile = w < 768;
            const systemBars = detectSystemBars();
            const root = document.documentElement;
            
            root.style.setProperty('--safe-t', systemBars.statusBarHeight + 'px');
            root.style.setProperty('--safe-b', systemBars.safeBottom + 'px');
            root.style.setProperty('--nav-bar-h', systemBars.navBarHeight + 'px');
            
            let ph = mobile && !portrait ? 46 : mobile && w < 360 ? 58 : mobile ? 62 : 65;
            let th = mobile && !portrait ? 40 : w < 360 ? 44 : 50;
            
            root.style.setProperty('--player-h', ph + 'px');
            root.style.setProperty('--topbar-h', th + 'px');
            
            document.body.style.paddingTop = (systemBars.statusBarHeight + th) + 'px';
            document.body.style.paddingBottom = (ph + 8 + systemBars.navBarHeight + systemBars.safeBottom) + 'px';
            
            let fs = w < 320 ? 13 : w < 360 ? 14 : w < 768 ? 15 : 16;
            root.style.fontSize = fs + 'px';
        }

        // ===== SISTEMA DE PAGINAÇÃO =====
        const Paginator = {
            currentPage: 1, totalPages: 1, itemsPerPage: 10, allItems: [],
            
            setItems(items, perPage) {
                this.allItems = items || [];
                this.itemsPerPage = perPage || 10;
                this.totalPages = Math.ceil(this.allItems.length / this.itemsPerPage) || 1;
                if (this.currentPage > this.totalPages) this.currentPage = 1;
                if (this.currentPage < 1) this.currentPage = 1;
            },
            
            getPageItems() {
                const start = (this.currentPage - 1) * this.itemsPerPage;
                return this.allItems.slice(start, start + this.itemsPerPage);
            },
            
            changePage(action) {
                switch(action) {
                    case 'first': this.currentPage = 1; break;
                    case 'prev': if (this.currentPage > 1) this.currentPage--; break;
                    case 'next': if (this.currentPage < this.totalPages) this.currentPage++; break;
                    case 'last': this.currentPage = this.totalPages; break;
                }
                this.updateUI();
            },
            
            jumpToPage(page) {
                page = parseInt(page);
                if (page >= 1 && page <= this.totalPages) { this.currentPage = page; this.updateUI(); }
            },
            
            updateUI() {
                const counter = document.getElementById('pageCounter');
                const currentEl = document.getElementById('pageCurrent');
                const totalEl = document.getElementById('pageTotal');
                const rangeEl = document.getElementById('itemsRange');
                const jumpInput = document.getElementById('pageJump');
                
                if (this.totalPages > 1) {
                    counter.classList.add('active');
                    currentEl.textContent = this.currentPage;
                    totalEl.textContent = this.totalPages;
                    
                    document.getElementById('btnFirst').disabled = this.currentPage === 1;
                    document.getElementById('btnPrev').disabled = this.currentPage === 1;
                    document.getElementById('btnNext').disabled = this.currentPage === this.totalPages;
                    document.getElementById('btnLast').disabled = this.currentPage === this.totalPages;
                    
                    if (jumpInput) { jumpInput.max = this.totalPages; jumpInput.value = ''; jumpInput.placeholder = `1-${this.totalPages}`; }
                    
                    const total = this.allItems.length;
                    const start = (this.currentPage - 1) * this.itemsPerPage + 1;
                    const end = Math.min(this.currentPage * this.itemsPerPage, total);
                    if (rangeEl) rangeEl.textContent = `${start}-${end} de ${total}`;
                } else {
                    counter.classList.remove('active');
                    if (rangeEl) rangeEl.textContent = '';
                }
                
                const resCount = document.getElementById('resultCount');
                if (resCount && this.allItems.length > 0) {
                    const total = this.allItems.length;
                    if (total > this.itemsPerPage) {
                        const start = (this.currentPage - 1) * this.itemsPerPage + 1;
                        const end = Math.min(this.currentPage * this.itemsPerPage, total);
                        resCount.textContent = `${start}-${end} de ${total} resultados`;
                    } else {
                        resCount.textContent = `${total} resultados`;
                    }
                }
            }
        };

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                const themeColor = this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f';
                document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor);
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }
        };
        T.apply();

        // ===== FAVORITOS =====
        const Fav = {
            favs: JSON.parse(localStorage.getItem('favs') || '[]'),
            hist: JSON.parse(localStorage.getItem('hist') || '[]'),
            toggle(tr) {
                const i = this.favs.findIndex(f => f.id === tr.id);
                i > -1 ? (this.favs.splice(i, 1), toast('💔 Removido')) : (this.favs.unshift(tr), toast('❤️ Favoritado'));
                localStorage.setItem('favs', JSON.stringify(this.favs));
                return i === -1;
            },
            is(id) { return this.favs.some(f => f.id === id); },
            addHist(tr) {
                this.hist = this.hist.filter(h => h.id !== tr.id);
                this.hist.unshift({...tr, at: new Date().toISOString()});
                if (this.hist.length > 50) this.hist.pop();
                localStorage.setItem('hist', JSON.stringify(this.hist));
            }
        };

        // ===== DOWNLOADS =====
        const DL = {
            items: JSON.parse(localStorage.getItem('dls') || '[]'),
            async download(id, title, channel, thumb) {
                toast('⬇️ Baixando...');
                const el = document.getElementById('dlProgress'), fill = document.getElementById('dlFill'), pct = document.getElementById('dlPercent');
                el.classList.add('active'); fill.style.width = '0%'; pct.textContent = '0%';
                for (let i = 0; i <= 100; i += 25) { await new Promise(r => setTimeout(r, 250)); fill.style.width = i + '%'; pct.textContent = i + '%'; }
                this.items.unshift({id, title, channel, thumbnail:thumb, at: new Date().toISOString()});
                localStorage.setItem('dls', JSON.stringify(this.items));
                toast('✅ Concluído!');
                setTimeout(() => el.classList.remove('active'), 800);
            },
            has(id) { return this.items.some(d => d.id === id); },
            all() { return this.items; }
        };

        // ===== PLAYER (CORRIGIDO) =====
        let ytPlayer = null;
        let ytPlayerReady = false;
        let currentVideoId = null;
        let isPlaying = false;
        let playlist = [];
        let currentIndex = -1;
        let ytTopPlayer = null;
        let isVideoMode = false;
        let progressInterval = null;
        let toastTimeout = null;
        let keepAliveInterval = null;
        let recoveryAttempts = 0;
        const MAX_RECOVERY = 5;
        
        window.playing = false;

        // Inicializar player do YouTube
        window.onYouTubeIframeAPIReady = function() {
            console.log('📺 YouTube API pronta');
            initYTPlayer();
        };

        function initYTPlayer() {
            if (ytPlayer) {
                try { ytPlayer.destroy(); } catch(e) {}
            }
            
            try {
                ytPlayer = new YT.Player('ytPlayerContainer', {
                    height: '360',
                    width: '640',
                    videoId: '',
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: {
                        autoplay: 0,
                        playsinline: 1,
                        controls: 0,
                        disablekb: 1,
                        fs: 0,
                        rel: 0,
                        modestbranding: 1,
                        iv_load_policy: 3,
                        origin: window.location.origin,
                        enablejsapi: 1,
                        mute: 0,
                        volume: 100,
                    },
                    events: {
                        onReady: onPlayerReady,
                        onStateChange: onPlayerStateChange,
                        onError: onPlayerError,
                    }
                });
                console.log('✅ Player criado');
            } catch(e) {
                console.error('❌ Erro ao criar player:', e);
            }
        }

        function onPlayerReady(event) {
            console.log('✅ Player PRONTO');
            ytPlayerReady = true;
            event.target.setVolume(100);
            event.target.unMute();
            recoveryAttempts = 0;
            
            // Se havia música pendente
            if (currentVideoId && isPlaying) {
                playVideoById(currentVideoId);
            }
        }

        function onPlayerStateChange(event) {
            console.log('🔄 Estado:', event.data);
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                window.playing = true;
                updatePlayerUI(true);
                startProgress();
                startKeepAlive();
                recoveryAttempts = 0;
            } else if (event.data === YT.PlayerState.PAUSED) {
                isPlaying = false;
                window.playing = false;
                updatePlayerUI(false);
                stopProgress();
                stopKeepAlive();
            } else if (event.data === YT.PlayerState.ENDED) {
                stopProgress();
                updateProgressBar(0);
                nextTrack();
            }
        }

        function onPlayerError(event) {
            console.error('❌ Erro:', event.data);
            
            if (recoveryAttempts < MAX_RECOVERY && currentVideoId) {
                recoveryAttempts++;
                setTimeout(() => {
                    if (ytPlayerReady && ytPlayer) {
                        playVideoById(currentVideoId);
                    }
                }, 1000 * recoveryAttempts);
            } else if (recoveryAttempts >= MAX_RECOVERY) {
                toast('⚠️ Erro na reprodução');
            }
        }

        function playVideoById(videoId) {
            if (!videoId) return;
            
            currentVideoId = videoId;
            
            if (ytPlayerReady && ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById({
                    videoId: videoId,
                    startSeconds: 0
                });
                
                setTimeout(() => {
                    if (ytPlayer && ytPlayer.playVideo) {
                        ytPlayer.playVideo();
                        ytPlayer.unMute();
                        ytPlayer.setVolume(100);
                    }
                }, 300);
            } else {
                // Se não estiver pronto, reinicializar
                initYTPlayer();
            }
        }

        function startProgress() {
            stopProgress();
            progressInterval = setInterval(() => {
                if (isPlaying && ytPlayerReady && ytPlayer) {
                    try {
                        const duration = ytPlayer.getDuration();
                        const current = ytPlayer.getCurrentTime();
                        if (duration > 0) {
                            updateProgressBar((current / duration) * 100);
                        }
                    } catch(e) {}
                }
            }, 1000);
        }

        function stopProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        function startKeepAlive() {
            stopKeepAlive();
            keepAliveInterval = setInterval(() => {
                if (isPlaying && ytPlayerReady && ytPlayer) {
                    try {
                        const state = ytPlayer.getPlayerState();
                        if (state !== 1 && state !== 3) {
                            ytPlayer.playVideo();
                            ytPlayer.unMute();
                        }
                    } catch(e) {
                        if (currentVideoId) {
                            initYTPlayer();
                            setTimeout(() => playVideoById(currentVideoId), 1000);
                        }
                    }
                }
            }, 5000);
        }

        function stopKeepAlive() {
            if (keepAliveInterval) {
                clearInterval(keepAliveInterval);
                keepAliveInterval = null;
            }
        }

        function updateProgressBar(percent) {
            const bar = document.getElementById('progressBar');
            if (bar) bar.style.width = percent + '%';
        }

        function updatePlayerUI(playing) {
            const spPlay = document.getElementById('spPlay');
            const spBar = document.getElementById('spotifyBar');
            const spArt = document.getElementById('spArt');
            const bgIndicator = document.getElementById('bgPlayIndicator');
            
            if (spPlay) {
                spPlay.textContent = playing ? '⏸' : '▶';
                spPlay.classList.toggle('playing', playing);
            }
            if (spBar) spBar.classList.toggle('playing', playing);
            if (spArt) spArt.classList.toggle('playing', playing);
            if (bgIndicator) bgIndicator.classList.toggle('active', playing);
        }

        // ===== CONTROLES =====
        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentIndex = index;
            const track = playlist[index];
            
            Fav.addHist(track);
            updateProgressBar(0);
            
            document.getElementById('spTitle').textContent = track.title || '';
            document.getElementById('spArtist').textContent = track.channel || '';
            document.getElementById('spArt').src = track.thumbnail || '';
            document.getElementById('spotifyBar').classList.add('active');
            document.title = '▶ ' + (track.title || 'Play Tube Music');
            
            playVideoById(track.id);
            
            // Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title || '',
                    artist: track.channel || '',
                    artwork: [{ src: track.thumbnail || '', sizes: '96x96', type: 'image/jpeg' }]
                });
            }
        }

        window.togglePlay = () => {
            if (!currentVideoId && playlist.length > 0) {
                playTrack(0);
            } else if (isPlaying) {
                if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            } else if (currentVideoId) {
                if (ytPlayer && ytPlayer.playVideo) {
                    ytPlayer.playVideo();
                    ytPlayer.unMute();
                }
            }
        };

        window.nextTrack = () => {
            if (playlist.length === 0) return;
            updateProgressBar(0);
            playTrack((currentIndex + 1) % playlist.length);
        };

        window.prevTrack = () => {
            if (playlist.length === 0) return;
            updateProgressBar(0);
            playTrack((currentIndex - 1 + playlist.length) % playlist.length);
        };

        window.seekTrack = (e) => {
            if (!currentVideoId || !ytPlayerReady) return;
            const container = document.getElementById('progressContainer');
            const rect = container.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const duration = ytPlayer.getDuration();
            if (duration > 0 && ytPlayer.seekTo) {
                ytPlayer.seekTo(percent * duration, true);
            }
        };

        // ===== VIDEO =====
        window.showVideo = () => {
            if (!currentVideoId) return;
            
            const vidCont = document.getElementById('playerContainer');
            const vidWrap = document.getElementById('playerWrapper');
            
            isVideoMode = true;
            vidCont.classList.add('active', 'rainbow-border');
            
            if (!ytTopPlayer) {
                vidWrap.innerHTML = '<div id="topPlayerElement"></div>';
                ytTopPlayer = new YT.Player('topPlayerElement', {
                    videoId: currentVideoId,
                    playerVars: { autoplay: 1, playsinline: 1, controls: 1, rel: 0, modestbranding: 1, fs: 1 },
                    events: {
                        onReady: () => {
                            if (ytPlayer && ytPlayer.getCurrentTime) {
                                ytTopPlayer.seekTo(ytPlayer.getCurrentTime());
                            }
                        },
                        onStateChange: (e) => {
                            if (e.data === 1 && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
                            if (e.data === 0) window.closeVideo();
                        }
                    }
                });
            } else {
                ytTopPlayer.loadVideoById({
                    videoId: currentVideoId,
                    startSeconds: ytPlayer ? ytPlayer.getCurrentTime() || 0 : 0
                });
            }
            
            vidCont.scrollIntoView({ behavior: 'smooth' });
        };

        window.closeVideo = () => {
            document.getElementById('playerContainer').classList.remove('active', 'rainbow-border');
            if (ytTopPlayer && ytTopPlayer.stopVideo) ytTopPlayer.stopVideo();
            isVideoMode = false;
        };

        // ===== DOWNLOAD =====
        window.downloadCurrent = () => {
            if (!currentVideoId || currentIndex < 0) {
                toast('⚠️ Nenhuma música');
                return;
            }
            const track = playlist[currentIndex];
            const spDL = document.getElementById('spDL');
            spDL.classList.add('downloading');
            DL.download(track.id, track.title, track.channel, track.thumbnail)
              .finally(() => spDL.classList.remove('downloading'));
        };

        // ===== RESULTADOS =====
        window.playFromResults = (id, title, channel, thumb) => {
            const track = { id, title, channel, thumbnail: thumb };
            
            // Adicionar ao início da playlist
            playlist = playlist.filter(t => t.id !== track.id);
            playlist.unshift(track);
            
            // Tocar
            playTrack(0);
            toast('▶ ' + (title || '').substring(0, 30));
        };

        window.toggleFav = (id, title, channel, thumb, e) => {
            if (e) e.stopPropagation();
            Fav.toggle({ id, title, channel, thumbnail: thumb });
            updateFavButtons();
        };

        window.dlFromCard = (id, title, channel, thumb, e) => {
            if (e) e.stopPropagation();
            DL.download(id, title, channel, thumb);
        };

        function updateFavButtons() {
            document.querySelectorAll('.v-btn.fav').forEach(b => {
                const fid = b.getAttribute('data-id');
                const f = Fav.is(fid);
                b.classList.toggle('fav-active', f);
                b.textContent = f ? '❤️' : '🤍';
            });
        }

        function createCard(v) {
            const f = Fav.is(v.id);
            const d = DL.has(v.id);
            
            return `<div class="video-card" onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">
                <img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'">
                <div class="video-info">
                    <div class="video-title">${esc(v.title)}</div>
                    <div class="video-channel">${esc(v.channel)}</div>
                    ${v.at ? `<div style="font-size:0.65rem;color:var(--text3);margin-top:1px;">🕐 ${new Date(v.at).toLocaleDateString()}</div>` : ''}
                </div>
                <div class="video-actions">
                    <button class="v-btn fav${f ? ' fav-active' : ''}" data-id="${v.id}" onclick="toggleFav('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">${f ? '❤️' : '🤍'}</button>
                    ${!d ? `<button class="v-btn dl" onclick="dlFromCard('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">⬇</button>` : ''}
                </div>
            </div>`;
        }

        // ===== TABS =====
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            [...document.querySelectorAll('.tab-btn')].forEach(b => {
                const text = b.textContent.toLowerCase();
                if (text.includes(tab === 'search' ? 'buscar' : tab === 'favorites' ? 'favoritos' : tab === 'history' ? 'histórico' : 'downloads')) {
                    b.classList.add('active');
                }
            });
            
            const container = document.getElementById('resultsContainer');
            const count = document.getElementById('resultCount');
            const counter = document.getElementById('pageCounter');
            const sectionTitle = document.getElementById('sectionTitle');
            
            sectionTitle.innerHTML = '<span>' + {
                search: 'Resultados',
                favorites: '❤️ Favoritos',
                history: '🕐 Histórico',
                downloads: '⬇️ Downloads'
            }[tab] + '</span>';
            
            if (tab === 'search') {
                const query = document.getElementById('searchInput').value;
                if (query) {
                    searchYT(query);
                } else {
                    container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text2);"><div style="font-size:3rem;">🎧</div><div>Busque suas músicas</div></div>';
                    counter.classList.remove('active');
                    count.textContent = '';
                }
            } else if (tab === 'favorites') {
                if (Fav.favs.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">❤️ Vazio</div>';
                    counter.classList.remove('active');
                    count.textContent = '0 itens';
                } else {
                    Paginator.setItems(Fav.favs, 10);
                    container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
                    Paginator.updateUI();
                    updateFavButtons();
                }
            } else if (tab === 'history') {
                if (Fav.hist.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">🕐 Vazio</div>';
                    counter.classList.remove('active');
                    count.textContent = '0 itens';
                } else {
                    Paginator.setItems(Fav.hist, 10);
                    container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
                    Paginator.updateUI();
                    updateFavButtons();
                }
            } else if (tab === 'downloads') {
                if (DL.all().length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">📥 Vazio</div>';
                    counter.classList.remove('active');
                    count.textContent = '0 itens';
                } else {
                    Paginator.setItems(DL.all(), 10);
                    container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
                    Paginator.updateUI();
                    updateFavButtons();
                }
            }
        };

        // ===== CONTROLES DE PÁGINA =====
        window.changePage = (action) => {
            Paginator.changePage(action);
            const container = document.getElementById('resultsContainer');
            container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
            updateFavButtons();
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.jumpToPage = () => {
            const page = parseInt(document.getElementById('pageJump').value);
            if (page) {
                Paginator.jumpToPage(page);
                const container = document.getElementById('resultsContainer');
                container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
                updateFavButtons();
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ===== BUSCA =====
        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value;
            searchYT(query);
        });
        
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value;
                searchYT(query);
            }
        });

        async function searchYT(q) {
            if (!q.trim()) { toast('⚠️ Digite algo'); return; }
            
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>';
            
            try {
                const u = new URL(PROXY);
                u.searchParams.append('q', q + ' música');
                u.searchParams.append('maxResults', '50');
                u.searchParams.append('regionCode', 'BR');
                u.searchParams.append('relevanceLanguage', 'pt');
                
                const r = await fetch(u);
                if (!r.ok) throw new Error('Erro');
                const d = await r.json();
                
                if (d.videos && d.videos.length > 0) {
                    Paginator.setItems(d.videos, 10);
                    container.innerHTML = Paginator.getPageItems().map(v => createCard(v)).join('');
                    Paginator.updateUI();
                    updateFavButtons();
                } else {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado</div>';
                    document.getElementById('pageCounter').classList.remove('active');
                    document.getElementById('resultCount').textContent = '';
                }
            } catch(e) {
                toast('⚠️ Erro na busca');
            }
        }

        // ===== UTILS =====
        function esc(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function toast(m) {
            const el = document.getElementById('toast');
            if (toastTimeout) clearTimeout(toastTimeout);
            el.textContent = m;
            el.classList.add('show');
            toastTimeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ===== MEDIA SESSION =====
        function setupMediaSession() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.setActionHandler('play', togglePlay);
            navigator.mediaSession.setActionHandler('pause', togglePlay);
            navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
            navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
        }

        // ===== EVENTOS =====
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                startKeepAlive();
            }
        });

        // ===== INIT =====
        function init() {
            setupMediaSession();
            autoAdjustScreen();
            
            // Inicializar player
            if (window.YT && YT.Player) {
                initYTPlayer();
            }
            
            console.log('✅ Play Tube Music pronto!');
        }

        window.addEventListener('resize', () => {
            clearTimeout(window._rt);
            window._rt = setTimeout(autoAdjustScreen, 250);
        });
        window.addEventListener('orientationchange', () => setTimeout(autoAdjustScreen, 300));
        window.addEventListener('load', init);

        // Export globais
        window.T = T;
        window.Fav = Fav;
        window.DL = DL;
        window.Paginator = Paginator;
        window.autoAdjustScreen = autoAdjustScreen;
        window.changePage = changePage;
        window.jumpToPage = jumpToPage;
        window.togglePlay = togglePlay;
        window.nextTrack = nextTrack;
        window.prevTrack = prevTrack;
        window.playFromResults = playFromResults;
        window.toggleFav = toggleFav;
        window.dlFromCard = dlFromCard;
        window.downloadCurrent = downloadCurrent;
        window.switchTab = switchTab;
        window.seekTrack = seekTrack;
        window.showVideo = showVideo;
        window.closeVideo = closeVideo;
    })();
    </script>
</body>
</html>
