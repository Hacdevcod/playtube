<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    
    <title>Play Tube Music Pro</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 80px;
            --safe-t: 0px;
            --safe-b: 0px;
            --zoom-level: 1;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; height: 100%; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh; overflow-x: hidden;
            padding-top: var(--safe-t);
            padding-bottom: calc(var(--player-h) + var(--safe-b) + 15px);
            transform: scale(var(--zoom-level));
            transform-origin: top center;
            transition: transform 0.3s ease;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        @keyframes detectedPulse { 0%,100% { border-color: #1db954; } 50% { border-color: #00ff88; } }

        .hidden-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; z-index: -1; }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky; top: var(--safe-t); background: var(--bg);
            backdrop-filter: blur(20px); height: 50px; display: flex; 
            align-items: center; padding: 0 8px; gap: 6px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 4px; }
        .logo-icon {
            width: 26px; height: 26px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #fff;
        }
        .logo-text { font-size: 0.9rem; font-weight: 700; color: var(--text); }
        .logo-text sup { font-size: 6px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; }
        .spacer { flex: 1; }
        .toolbar-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); font-size: 0.7rem; cursor: pointer;
            padding: 5px 10px; border-radius: 12px; white-space: nowrap;
            transition: all 0.2s;
        }
        .toolbar-btn:active { background: var(--red); color: #fff; }
        .toolbar-btn.highlight { border-color: #ff0; color: #ff0; }

        /* ===== PAGE COUNTER (SUPERIOR) ===== */
        .page-counter-top {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; padding: 6px 10px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .page-counter-top.hidden { display: none; }
        .page-btn-top {
            padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.7rem; cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn-top:active { background: var(--red); color: #fff; }
        .page-btn-top:disabled { opacity: 0.3; pointer-events: none; }
        .page-info-top {
            font-size: 0.7rem; color: var(--text2); min-width: 80px; text-align: center;
            font-weight: 600;
        }
        .page-info-top .current { color: var(--red); font-size: 0.85rem; }
        .page-jump-top {
            width: 40px; text-align: center; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.7rem; padding: 4px;
        }

        /* ===== SEARCH ===== */
        .search-section { padding: 6px 10px; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden;
        }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none;
        }
        .search-btn {
            width: 42px; background: var(--surface2); border: none;
            color: var(--text); cursor: pointer; font-size: 1rem;
        }
        .search-btn:active { background: var(--red); }

        /* ===== TABS ===== */
        .tabs-container { display: flex; gap: 3px; padding: 4px 10px 6px; overflow-x: auto; }
        .tab-btn {
            padding: 5px 12px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text2); font-size: 0.7rem; cursor: pointer;
            white-space: nowrap; flex-shrink: 0;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* ===== RESULTS ===== */
        .results-section { padding: 4px 10px 20px; min-height: 150px; }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px 6px;
        }
        .section-title {
            font-size: 0.75rem; font-weight: 600; color: var(--text2); text-transform: uppercase;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 8px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; margin-bottom: 4px; position: relative;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; transition: all 0.15s;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-card.playing { border-color: var(--green); animation: detectedPulse 2s infinite; }
        .video-thumb { 
            width: 44px; height: 44px; border-radius: 6px; object-fit: cover; 
            flex-shrink: 0; background: var(--surface2); 
        }
        .video-info { flex: 1; min-width: 0; }
        .video-title { font-size: 0.8rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.65rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }

        /* ===== PAGE COUNTER (INFERIOR) ===== */
        .page-counter-bottom {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 0; margin-top: 8px;
        }
        .page-counter-bottom.hidden { display: none; }
        .page-btn-bottom {
            padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text); font-size: 0.75rem; cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn-bottom:active { background: var(--red); color: #fff; }
        .page-btn-bottom:disabled { opacity: 0.3; pointer-events: none; }
        .page-info-bottom {
            font-size: 0.75rem; color: var(--text2); min-width: 80px; text-align: center;
        }

        /* ===== SPOTIFY BAR ===== */
        .spotify-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); display: none; align-items: center;
            padding: 0 10px; padding-bottom: var(--safe-b); gap: 8px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .spotify-bar.active { display: flex; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; }
        .sp-art { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; background: var(--surface2); }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; }
        .sp-title { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.65rem; color: rgba(255,255,255,0.7); }
        .sp-controls { display: flex; gap: 8px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 0.9rem; cursor: pointer; padding: 4px; }
        .sp-btn.play { width: 38px; height: 38px; background: #fff; border-radius: 50%; color: #000; }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-dl { background: rgba(29,185,84,0.15); border: none; color: var(--green); font-size: 0.7rem; cursor: pointer; padding: 5px 10px; border-radius: 12px; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: calc(var(--player-h) + var(--safe-b) + 20px); left: 50%;
            transform: translateX(-50%) translateY(120px); background: #333;
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem;
            z-index: 600; transition: transform 0.3s; white-space: nowrap; max-width: 90vw;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        .loading-text { font-size: 0.8rem; margin-top: 8px; }

        /* ===== PLAYER VIDEO ===== */
        .player-container { width: 100%; background: #000; display: none; animation: slideUp 0.4s ease; }
        .player-container.active { display: block; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px; width: 30px; height: 30px;
            border-radius: 50%; background: rgba(0,0,0,0.7); border: none;
            color: #fff; font-size: 14px; cursor: pointer; z-index: 10;
        }
    </style>
</head>

                { id: '450p7goxZqg', title: 'All of Me', artist: 'John Legend', thumbnail: 'https://i.ytimg.com/vi/450p7goxZqg/default.jpg' },
                { id: 'NuCOfRkz2oI', title: 'Havana', artist: 'Camila Cabello', thumbnail: 'https://i.ytimg.com/vi/NuCOfRkz2oI/default.jpg' },
                { id: 'pRpeEdMmmQ0', title: 'Waka Waka', artist: 'Shakira', thumbnail: 'https://i.ytimg.com/vi/pRpeEdMmmQ0/default.jpg' },
            ]
        };

        // ===== SISTEMA DE PAGINAÇÃO =====
        const Paginator = {
            currentPage: 1,
            totalPages: 1,
            itemsPerPage: 8,
            allItems: [],
            
            setItems(items, perPage = 8) {
                this.allItems = items || [];
                this.itemsPerPage = perPage;
                this.totalPages = Math.ceil(this.allItems.length / this.itemsPerPage) || 1;
                this.currentPage = Math.min(this.currentPage, this.totalPages);
                if (this.currentPage < 1) this.currentPage = 1;
            },
            
            getCurrentItems() {
                const start = (this.currentPage - 1) * this.itemsPerPage;
                return this.allItems.slice(start, start + this.itemsPerPage);
            },
            
            changePage(action) {
                const oldPage = this.currentPage;
                switch(action) {
                    case 'first': this.currentPage = 1; break;
                    case 'prev': if (this.currentPage > 1) this.currentPage--; break;
                    case 'next': if (this.currentPage < this.totalPages) this.currentPage++; break;
                    case 'last': this.currentPage = this.totalPages; break;
                }
                if (this.currentPage !== oldPage) {
                    this.updateAllUI();
                    this.dispatchChange();
                }
            },
            
            jumpToPage(page) {
                page = parseInt(page);
                if (page >= 1 && page <= this.totalPages && page !== this.currentPage) {
                    this.currentPage = page;
                    this.updateAllUI();
                    this.dispatchChange();
                }
            },
            
            dispatchChange() {
                window.dispatchEvent(new CustomEvent('pageChanged', { 
                    detail: { page: this.currentPage, items: this.getCurrentItems() }
                }));
            },
            
            updateAllUI() {
                this.updateTopCounter();
                this.updateBottomCounter();
                this.updateItemsRange();
            },
            
            updateTopCounter() {
                const topEl = document.getElementById('pageCounterTop');
                if (this.totalPages > 1) {
                    topEl.classList.remove('hidden');
                    document.getElementById('pageCurrentTop').textContent = this.currentPage;
                    document.getElementById('pageTotalTop').textContent = this.totalPages;
                    
                    document.getElementById('btnFirstTop').disabled = this.currentPage === 1;
                    document.getElementById('btnPrevTop').disabled = this.currentPage === 1;
                    document.getElementById('btnNextTop').disabled = this.currentPage === this.totalPages;
                    document.getElementById('btnLastTop').disabled = this.currentPage === this.totalPages;
                    
                    const jumpInput = document.getElementById('pageJumpTop');
                    if (jumpInput) {
                        jumpInput.max = this.totalPages;
                        jumpInput.placeholder = `1-${this.totalPages}`;
                    }
                } else {
                    topEl.classList.add('hidden');
                }
            },
            
            updateBottomCounter() {
                const bottomEl = document.getElementById('pageCounterBottom');
                if (this.totalPages > 1) {
                    bottomEl.classList.remove('hidden');
                    document.getElementById('pageInfoBottom').textContent = 
                        `Pág ${this.currentPage} de ${this.totalPages}`;
                    
                    document.getElementById('btnFirstBottom').disabled = this.currentPage === 1;
                    document.getElementById('btnPrevBottom').disabled = this.currentPage === 1;
                    document.getElementById('btnNextBottom').disabled = this.currentPage === this.totalPages;
                    document.getElementById('btnLastBottom').disabled = this.currentPage === this.totalPages;
                } else {
                    bottomEl.classList.add('hidden');
                }
            },
            
            updateItemsRange() {
                const total = this.allItems.length;
                const start = total > 0 ? (this.currentPage - 1) * this.itemsPerPage + 1 : 0;
                const end = Math.min(this.currentPage * this.itemsPerPage, total);
                
                const rangeEl = document.getElementById('itemsRangeTop');
                if (rangeEl) {
                    rangeEl.textContent = total > 0 ? `${start}-${end} de ${total}` : '';
                }
                
                const countEl = document.getElementById('resultCount');
                if (countEl) {
                    countEl.textContent = total > this.itemsPerPage ? 
                        `${start}-${end} de ${total} resultados` : 
                        `${total} resultados`;
                }
            }
        };

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                document.querySelector('meta[name="theme-color"]').setAttribute('content',
                    this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f');
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }
        };
        T.apply();

        // ===== STORAGE =====
        const Fav = {
            favs: JSON.parse(localStorage.getItem('favs') || '[]'),
            hist: JSON.parse(localStorage.getItem('hist') || '[]'),
            toggle(tr) {
                const i = this.favs.findIndex(f => f.id === tr.id);
                i > -1 ? this.favs.splice(i, 1) : this.favs.unshift(tr);
                localStorage.setItem('favs', JSON.stringify(this.favs));
                return i === -1;
            },
            is(id) { return this.favs.some(f => f.id === id); },
            addHist(tr) {
                this.hist = this.hist.filter(h => h.id !== tr.id);
                this.hist.unshift({...tr, at: new Date().toISOString()});
                if (this.hist.length > 50) this.hist.pop();
                localStorage.setItem('hist', JSON.stringify(this.hist));
            }
        };

        const DL = {
            items: JSON.parse(localStorage.getItem('dls') || '[]'),
            async download(id, title, channel, thumb) {
                toast('⬇️ Baixando...');
                this.items.unshift({id, title, channel, thumbnail:thumb, at: new Date().toISOString()});
                localStorage.setItem('dls', JSON.stringify(this.items));
                await new Promise(r => setTimeout(r, 1000));
                toast('✅ Concluído!');
            },
            has(id) { return this.items.some(d => d.id === id); }
        };

        // ===== BUSCA NA API =====
        let currentQuery = '';
        let allSearchResults = [];

        async function searchYouTube(query) {
            if (!query || !query.trim()) {
                toast('⚠️ Digite algo para buscar');
                return;
            }
            
            currentQuery = query.trim();
            const resCont = document.getElementById('resultsContainer');
            resCont.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">🔍 Buscando...</div></div>';
            
            try {
                // Tentar buscar via API do YouTube
                const results = await fetchFromYouTubeAPI(query);
                
                if (results && results.length > 0) {
                    allSearchResults = results;
                    displayPaginatedResults(results);
                    toast(`✅ ${results.length} resultados encontrados`);
                } else {
                    // Fallback para database local
                    useLocalFallback(query);
                }
            } catch (error) {
                console.error('Erro na busca:', error);
                // Fallback para database local
                useLocalFallback(query);
            }
        }

        async function fetchFromYouTubeAPI(query) {
            // TENTATIVA 1: API oficial do YouTube
            if (API_CONFIG.apiKey && API_CONFIG.apiKey !== 'AIzaSyAqzGt5QmBQhJQ-NxrPBHZqOcN9GrNZF8o') {
                try {
                    const url = `${API_CONFIG.youtubeSearchURL}?part=snippet&maxResults=50&q=${encodeURIComponent(query + ' música')}&type=video&videoCategoryId=10&key=${API_CONFIG.apiKey}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.items && data.items.length > 0) {
                        return data.items.map(item => ({
                            id: item.id.videoId,
                            title: item.snippet.title,
                            channel: item.snippet.channelTitle,
                            thumbnail: item.snippet.thumbnails?.default?.url || 
                                      item.snippet.thumbnails?.medium?.url || ''
                        }));
                    }
                } catch(e) {
                    console.log('API YouTube falhou, tentando fallback...');
                }
            }
            
            // TENTATIVA 2: Proxy CORS
            try {
                const searchURL = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + ' música')}`;
                const proxyURL = API_CONFIG.proxy + encodeURIComponent(searchURL);
                const response = await fetch(proxyURL);
                const html = await response.text();
                
                // Extrair dados do HTML (scraping básico)
                const results = parseYouTubeHTML(html);
                if (results.length > 0) return results;
            } catch(e) {
                console.log('Proxy falhou, usando database local...');
            }
            
            return [];
        }

        function parseYouTubeHTML(html) {
            const results = [];
            // Regex para extrair videoId e título do HTML do YouTube
            const videoRegex = /\/watch\?v=([a-zA-Z0-9_-]{11})/g;
            const titleRegex = /"title":{"runs":\[{"text":"([^"]+)"}/g;
            
            let match;
            const ids = [];
            while ((match = videoRegex.exec(html)) !== null) {
                if (!ids.includes(match[1])) ids.push(match[1]);
            }
            
            const titles = [];
            while ((match = titleRegex.exec(html)) !== null) {
                titles.push(match[1]);
            }
            
            for (let i = 0; i < Math.min(ids.length, titles.length, 50); i++) {
                results.push({
                    id: ids[i],
                    title: decodeHTML(titles[i]),
                    channel: '',
                    thumbnail: `https://i.ytimg.com/vi/${ids[i]}/default.jpg`
                });
            }
            
            return results;
        }

        function useLocalFallback(query) {
            const q = query.toLowerCase();
            const filtered = MusicDB.songs.filter(s => 
                s.title.toLowerCase().includes(q) || 
                s.artist.toLowerCase().includes(q)
            );
            
            if (filtered.length > 0) {
                allSearchResults = filtered.map(s => ({
                    id: s.id,
                    title: s.title,
                    channel: s.artist,
                    thumbnail: s.thumbnail
                }));
            } else {
                // Se não encontrou nada, mostrar todos
                allSearchResults = MusicDB.songs.map(s => ({
                    id: s.id,
                    title: s.title,
                    channel: s.artist,
                    thumbnail: s.thumbnail
                }));
                toast('📚 Mostrando biblioteca completa');
            }
            
            displayPaginatedResults(allSearchResults);
        }

        function displayPaginatedResults(results) {
            Paginator.setItems(results, 8);
            const pageItems = Paginator.getCurrentItems();
            const resCont = document.getElementById('resultsContainer');
            
            if (pageItems.length === 0) {
                resCont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado encontrado</div>';
                document.getElementById('pageCounterTop').classList.add('hidden');
                document.getElementById('pageCounterBottom').classList.add('hidden');
                document.getElementById('resultCount').textContent = '0 resultados';
                return;
            }
            
            resCont.innerHTML = pageItems.map((v, i) => card(v, i)).join('');
            updateFavButtons();
            Paginator.updateAllUI();
        }

        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // ===== YOUTUBE PLAYER =====
        let yt = null, ytTop = null, playlist = [], idx = -1, playing = false, vid = null;
        let toastTO = null, progInt = null;

        function initPlayer() {
            if (yt) { try { yt.destroy(); } catch(e) {} }
            
            yt = new YT.Player('hiddenPlayer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: {
                    autoplay: 0, playsinline: 1, controls: 0, disablekb: 1,
                    fs: 0, rel: 0, modestbranding: 1, iv_load_policy: 3,
                    origin: window.location.origin, enablejsapi: 1, mute: 0, volume: 100
                },
                events: {
                    onReady: (e) => {
                        console.log('✅ Player YouTube pronto');
                        e.target.setVolume(100);
                        e.target.unMute();
                        if (vid) {
                            e.target.loadVideoById({ videoId: vid, startSeconds: 0 });
                        }
                    },
                    onStateChange: (e) => {
                        if (e.data === 1) { playing = true; updatePlayBtn(true); startProgress(); }
                        else if (e.data === 2) { playing = false; updatePlayBtn(false); stopProgress(); }
                        else if (e.data === 0) { stopProgress(); document.getElementById('progressBar').style.width = '0%'; nextTrack(); }
                    },
                    onError: (e) => {
                        console.error('Erro player:', e.data);
                        if (e.data === 2 || e.data === 5) {
                            setTimeout(() => { if (vid) yt?.loadVideoById?.({ videoId: vid, startSeconds: 0 }); }, 2000);
                        }
                    }
                }
            });
        }

        window.onYouTubeIframeAPIReady = () => {
            console.log('✅ API YouTube carregada');
            initPlayer();
        };
        
        setTimeout(() => {
            if (!yt && typeof YT !== 'undefined' && YT.Player) initPlayer();
        }, 2000);

        function startProgress() {
            stopProgress();
            progInt = setInterval(() => {
                if (!yt || !playing) return;
                try {
                    const d = yt.getDuration(), c = yt.getCurrentTime();
                    if (d > 0) document.getElementById('progressBar').style.width = (c / d) * 100 + '%';
                } catch(e) {}
            }, 1000);
        }

        function stopProgress() { if (progInt) { clearInterval(progInt); progInt = null; } }
        
        function updatePlayBtn(p) { 
            const btn = document.getElementById('spPlay');
            if (btn) { btn.textContent = p ? '⏸' : '▶'; btn.classList.toggle('playing', p); }
        }

        function playTrack(i = -1) {
            if (i >= 0 && i < playlist.length) idx = i;
            if (idx < 0 || idx >= playlist.length) return;
            
            const t = playlist[idx]; 
            vid = t.id; 
            Fav.addHist(t);
            document.getElementById('progressBar').style.width = '0%';
            
            if (yt?.loadVideoById) {
                yt.loadVideoById({ videoId: vid, startSeconds: 0 });
                setTimeout(() => {
                    if (yt?.playVideo) { yt.playVideo(); yt.unMute(); yt.setVolume(100); }
                }, 500);
            } else {
                initPlayer();
                setTimeout(() => playTrack(i), 1000);
                return;
            }
            
            document.getElementById('spTitle').textContent = t.title || '';
            document.getElementById('spArtist').textContent = t.channel || t.artist || '';
            document.getElementById('spArt').src = t.thumbnail || '';
            document.title = '▶ ' + (t.title || 'Play Tube Music');
            document.getElementById('spotifyBar').classList.add('active');
            
            // Marcar card como tocando
            document.querySelectorAll('.video-card').forEach(c => c.classList.remove('playing'));
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(c => {
                if (c.getAttribute('data-videoid') === vid) c.classList.add('playing');
            });
        }

        window.togglePlay = () => {
            if (!yt) { 
                initPlayer();
                setTimeout(() => togglePlay(), 500);
                return; 
            }
            if (playing) { yt.pauseVideo(); if (ytTop) ytTop.pauseVideo(); }
            else if (vid) { yt.playVideo(); yt.unMute(); }
            else if (playlist.length > 0) playTrack(0);
        };
        
        window.nextTrack = () => { 
            if (playlist.length) { stopProgress(); playTrack((idx + 1) % playlist.length); } 
        };
        
        window.prevTrack = () => { 
            if (playlist.length) { stopProgress(); playTrack((idx - 1 + playlist.length) % playlist.length); } 
        };
        
        window.seekTrack = (e) => {
            if (!yt || !vid) return;
            const r = e.currentTarget.getBoundingClientRect();
            const d = yt.getDuration();
            if (d > 0) yt.seekTo(((e.clientX - r.left) / r.width) * d, true);
        };
        
        window.showVideo = () => {
            if (!vid) return;
            document.getElementById('playerContainer').classList.add('active');
            const st = yt?.getCurrentTime?.() || 0;
            const wrapper = document.getElementById('playerWrapper');
            
            if (!ytTop) {
                wrapper.innerHTML = '<div id="topPlayerElement"></div>';
                ytTop = new YT.Player('topPlayerElement', {
                    videoId: vid,
                    playerVars: { autoplay: 1, playsinline: 1, controls: 1, rel: 0, modestbranding: 1, fs: 1, origin: window.location.origin },
                    events: {
                        onReady: () => { if (!isNaN(st)) ytTop.seekTo(st); },
                        onStateChange: (e) => { if (e.data === 1 && yt?.pauseVideo) yt.pauseVideo(); if (e.data === 0) closeVideo(); }
                    }
                });
            } else {
                ytTop.loadVideoById({ videoId: vid, startSeconds: st });
            }
            document.getElementById('playerContainer').scrollIntoView({ behavior: 'smooth' });
        };
        
        window.closeVideo = () => {
            document.getElementById('playerContainer').classList.remove('active');
            if (ytTop) ytTop.stopVideo();
        };
        
        window.downloadCurrent = () => {
            if (!vid || idx < 0) { toast('⚠️ Nenhuma música'); return; }
            const t = playlist[idx];
            DL.download(t.id, t.title, t.channel || t.artist, t.thumbnail);
        };

        // ===== RESULTADOS =====
        window.playFromResults = (id, title, channel, thumb) => {
            const v = { id, title, channel, thumbnail: thumb };
            playlist = playlist.filter(t => t.id !== v.id); 
            playlist.unshift(v);
            idx = 0; 
            playTrack(0); 
            toast('▶ ' + title.substring(0, 35));
        };
        
        window.toggleFav = (id, title, channel, thumb, e) => { 
            if (e) e.stopPropagation(); 
            const isFav = Fav.toggle({ id, title, channel, thumbnail: thumb }); 
            updateFavButtons();
            toast(isFav ? '❤️ Favoritado' : '💔 Removido');
        };
        
        window.dlFromCard = (id, title, channel, thumb, e) => { 
            if (e) e.stopPropagation(); 
            DL.download(id, title, channel, thumb); 
        };

        function updateFavButtons() {
            document.querySelectorAll('.v-btn.fav').forEach(b => {
                const fid = b.getAttribute('data-id'), f = Fav.is(fid);
                b.classList.toggle('fav-active', f); 
                b.textContent = f ? '❤️' : '🤍';
            });
        }

        function esc(t) { 
            if (!t) return ''; 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }

        function card(v, index) {
            const f = Fav.is(v.id), d = DL.has(v.id);
            const isPlaying = vid === v.id;
            return `<div class="video-card${isPlaying ? ' playing' : ''}" 
                         data-videoid="${v.id}"
                         onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${esc(v.thumbnail || '')}')" 
                         style="animation-delay:${index * 0.03}s">
                <img class="video-thumb" src="${v.thumbnail || ''}" loading="lazy" 
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23777%22 font-size=%2214%22>♪</text></svg>'">
                <div class="video-info">
                    <div class="video-title">${esc(v.title)}</div>
                    <div class="video-channel">${esc(v.channel || 'YouTube')}</div>
                </div>
                <div class="video-actions">
                    <button class="v-btn fav${f?' fav-active':''}" data-id="${v.id}" 
                            onclick="toggleFav('${v.id}','${esc(v.title)}','${esc(v.channel)}','${esc(v.thumbnail || '')}',event)">${f?'❤️':'🤍'}</button>
                    ${!d ? `<button class="v-btn dl" onclick="dlFromCard('${v.id}','${esc(v.title)}','${esc(v.channel)}','${esc(v.thumbnail || '')}',event)">⬇</button>` : ''}
                </div></div>`;
        }

        // ===== TABS =====
        let currentTab = 'search';
        
        window.switchTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            [...document.querySelectorAll('.tab-btn')].forEach(b => {
                const txt = b.textContent.toLowerCase();
                if ((t === 'search' && txt.includes('buscar')) || 
                    (t === 'favorites' && txt.includes('favorito')) ||
                    (t === 'history' && txt.includes('histórico')) ||
                    (t === 'downloads' && txt.includes('download'))) {
                    b.classList.add('active');
                }
            });
            
            const titles = { 
                'search': '🔍 Resultados da Busca', 
                'favorites': '❤️ Favoritos', 
                'history': '🕐 Histórico', 
                'downloads': '⬇️ Downloads' 
            };
            document.getElementById('sectionTitle').textContent = titles[t] || 'Resultados';
            
            if (t === 'search') {
                if (currentQuery) {
                    searchYouTube(currentQuery);
                } else {
                    document.getElementById('resultsContainer').innerHTML = 
                        '<div style="text-align:center;padding:50px;color:var(--text2);"><div style="font-size:3rem;">🎧</div><div>Busque suas músicas favoritas</div></div>';
                    document.getElementById('pageCounterTop').classList.add('hidden');
                    document.getElementById('pageCounterBottom').classList.add('hidden');
                    document.getElementById('resultCount').textContent = '';
                }
                return;
            }
            
            let items = [];
            if (t === 'favorites') items = Fav.favs;
            else if (t === 'history') items = Fav.hist;
            else if (t === 'downloads') items = DL.items;
            
            if (items.length === 0) {
                const empties = { 'favorites': '❤️ Nenhum favorito ainda', 'history': '🕐 Histórico vazio', 'downloads': '📥 Nenhum download' };
                document.getElementById('resultsContainer').innerHTML = 
                    `<div style="text-align:center;padding:40px;color:var(--text2);">${empties[t]}</div>`;
                document.getElementById('pageCounterTop').classList.add('hidden');
                document.getElementById('pageCounterBottom').classList.add('hidden');
                document.getElementById('resultCount').textContent = '0 itens';
            } else {
                Paginator.setItems(items, 8);
                document.getElementById('resultsContainer').innerHTML = Paginator.getCurrentItems().map((v, i) => card(v, i)).join('');
                Paginator.updateAllUI();
                updateFavButtons();
            }
        };

        // ===== CONTROLES DE PÁGINA =====
        window.changePage = (action) => Paginator.changePage(action);
        
        window.jumpToPage = () => {
            const page = parseInt(document.getElementById('pageJumpTop').value);
            if (page) Paginator.jumpToPage(page);
        };
        
        window.doSearch = () => {
            const query = document.getElementById('searchInput').value;
            searchYouTube(query);
        };

        // Event listener para página mudar
        window.addEventListener('pageChanged', (e) => {
            const { items } = e.detail;
            document.getElementById('resultsContainer').innerHTML = items.map((v, i) => card(v, i)).join('');
            updateFavButtons();
            
            // Scroll suave para o topo dos resultados
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // Enter no campo de busca
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        // ===== UTILS =====
        function toast(m) {
            if (toastTO) clearTimeout(toastTO);
            const el = document.getElementById('toast');
            if (el) { el.textContent = m; el.classList.add('show'); }
            toastTO = setTimeout(() => { if (el) el.classList.remove('show'); }, 2500);
        }

        // ===== MEDIA SESSION =====
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
        }

        // ===== INIT =====
        function init() {
            // Detectar safe areas
            const style = getComputedStyle(document.documentElement);
            const safeTop = parseInt(style.getPropertyValue('env(safe-area-inset-top)')) || 0;
            const safeBottom = parseInt(style.getPropertyValue('env(safe-area-inset-bottom)')) || 0;
            document.documentElement.style.setProperty('--safe-t', safeTop + 'px');
            document.documentElement.style.setProperty('--safe-b', safeBottom + 'px');
            document.body.style.paddingTop = safeTop + 'px';
            
            console.log('✅ Play Tube Music Pro v12 - Busca API + Paginação Superior');
            console.log('📚 Database local:', MusicDB.songs.length, 'músicas');
            console.log('🔑 API Key configurada:', API_CONFIG.apiKey ? 'Sim' : 'Não (usando fallback)');
        }
        
        window.addEventListener('load', init);

        // Expor globais
        window.T = T;
        window.Paginator = Paginator;
        window.searchYouTube = searchYouTube;
        window.doSearch = doSearch;
        window.changePage = changePage;
        window.jumpToPage = jumpToPage;
    })();
    </script>
</body>
</html>
