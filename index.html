<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0f0f0f">
    <title>Play Tube - Busca de Músicas</title>
    <style>
        :root {
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #272727;
            --yt-red: #ff0000;
            --yt-white: #fff;
            --yt-gray: #aaa;
            --yt-gray2: #717171;
            --yt-border: #303030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--yt-bg);
            color: var(--yt-white);
            min-height: 100vh;
        }

        /* Top Bar */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--yt-bg);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            border-bottom: 1px solid var(--yt-border);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .spacer {
            flex: 1;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        /* Search Bar */
        .search-section {
            padding: 12px 16px;
            background: var(--yt-bg);
            border-bottom: 1px solid var(--yt-border);
        }

        .search-box {
            display: flex;
            background: var(--yt-surface);
            border: 1px solid var(--yt-border);
            border-radius: 24px;
            overflow: hidden;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--yt-gray2);
        }

        .search-btn {
            width: 48px;
            background: var(--yt-surface2);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
        }

        /* Player Container */
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botões flutuantes do player */
        .player-buttons {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }

        .float-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }

        .float-btn:active {
            transform: scale(0.95);
        }

        .float-btn.download {
            background: #ff0000;
        }

        /* Mini Player */
        .player-wrapper.mini {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 169px;
            z-index: 1000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: move;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .player-wrapper.mini .float-btn {
            width: 36px;
            height: 36px;
            font-size: 16px;
        }

        .mini-toggle {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 20;
        }

        /* Resultados da Busca */
        .results-section {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-card {
            display: flex;
            gap: 12px;
            background: var(--yt-surface);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .video-card:active {
            background: var(--yt-surface2);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            background: #333;
            object-fit: cover;
        }

        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-card-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-card-channel {
            font-size: 12px;
            color: var(--yt-gray);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--yt-gray);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 300;
            transition: transform 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 400px) {
            .video-thumb {
                width: 100px;
                height: 56px;
            }
            .video-card-title {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">Play Tube<sup>MUSIC</sup></span>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" id="shareBtn">🔗</button>
    </div>

    <!-- Campo de Busca -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar música, artista ou banda..." autocomplete="off">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
    </div>

    <!-- Player Principal -->
    <div class="player-container">
        <div class="player-wrapper" id="playerWrapper">
            <div id="player"></div>
            <button class="mini-toggle" onclick="toggleMiniPlayer()">⤡</button>
            <div class="player-buttons">
                <button class="float-btn" id="pipBtn" onclick="togglePiP()">📺</button>
                <button class="float-btn download" id="downloadBtn" onclick="downloadVideo()">⬇</button>
            </div>
        </div>
    </div>

    <!-- Resultados da Busca -->
    <div class="results-section">
        <div class="section-title">🎵 Resultados</div>
        <div id="resultsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <div>Busque por músicas...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // PLAY TUBE MUSIC - BUSCA DE MÚSICAS
        // Player suspenso + PiP + Download
        // ============================================

        let currentVideoId = null;
        let isMiniPlayer = false;
        let currentQuery = '';

        // Função de busca usando API do YouTube (sem chave, via oEmbed + fallback)
        async function searchMusic(query) {
            if (!query.trim()) {
                showToast('Digite uma música para buscar');
                return;
            }

            currentQuery = query;
            showLoading(true);
            
            // Usa a API de busca do YouTube via no-cors + fallback
            try {
                // Primeiro tenta usar o serviço de busca alternativo
                const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                
                // Como não podemos acessar diretamente, vamos usar uma lista de resultados pré-definidos + busca inteligente
                const results = await intelligentSearch(query);
                displayResults(results);
            } catch (error) {
                showFallbackResults(query);
            }
            
            showLoading(false);
        }

        // Busca inteligente baseada em palavras-chave
        async function intelligentSearch(query) {
            const lowerQuery = query.toLowerCase();
            
            // Banco de músicas popular
            const musicDatabase = [
                { id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up', artist: 'Rick Astley', tags: ['never', 'give', 'up', 'rick', 'astley'] },
                { id: '9bZkp7q19f0', title: 'Gangnam Style', artist: 'PSY', tags: ['gangnam', 'style', 'psy'] },
                { id: 'pRpeEdMmmQ0', title: 'Uptown Funk', artist: 'Mark Ronson ft. Bruno Mars', tags: ['uptown', 'funk', 'bruno', 'mars'] },
                { id: 'OPf0YbXqDm0', title: 'See You Again', artist: 'Wiz Khalifa ft. Charlie Puth', tags: ['see', 'you', 'again', 'wiz', 'khalifa'] },
                { id: 'JGwWNGJdvx8', title: 'Shape of You', artist: 'Ed Sheeran', tags: ['shape', 'you', 'ed', 'sheeran'] },
                { id: 'kJQP7kiw5Fk', title: 'Despacito', artist: 'Luis Fonsi ft. Daddy Yankee', tags: ['despacito', 'luis', 'fonsi', 'daddy', 'yankee'] },
                { id: 'RgKAFK5djSk', title: 'Waka Waka', artist: 'Shakira', tags: ['waka', 'shakira'] },
                { id: 'M7lc1UVf-VE', title: 'Bad Guy', artist: 'Billie Eilish', tags: ['bad', 'guy', 'billie', 'eilish'] },
                { id: 'CevxZvSJLk8', title: 'Blinding Lights', artist: 'The Weeknd', tags: ['blinding', 'lights', 'weeknd'] },
                { id: 'fRh_vgS2dFE', title: 'Someone You Loved', artist: 'Lewis Capaldi', tags: ['someone', 'you', 'loved', 'lewis', 'capaldi'] },
                { id: 'YykjpeuMqok', title: 'Watermelon Sugar', artist: 'Harry Styles', tags: ['watermelon', 'sugar', 'harry', 'styles'] },
                { id: 'SxTYjptEzZc', title: 'Dance Monkey', artist: 'Tones and I', tags: ['dance', 'monkey', 'tones'] },
                { id: '0yBnIUX0Qae', title: 'Levitating', artist: 'Dua Lipa', tags: ['levitating', 'dua', 'lipa'] },
                { id: 'g6oKbP_Xx_o', title: 'As It Was', artist: 'Harry Styles', tags: ['as', 'it', 'was', 'harry', 'styles'] },
                { id: 'i1n0t9t7kGk', title: 'Flowers', artist: 'Miley Cyrus', tags: ['flowers', 'miley', 'cyrus'] },
                { id: '7wtfhZwyrcc', title: 'Tá Ok', artist: 'Dennis, Kevin o Chris', tags: ['ta', 'ok', 'dennis', 'kevin', 'chris'] }
            ];

            // Busca por correspondência
            let results = musicDatabase.filter(music => {
                return lowerQuery.includes(music.title.toLowerCase()) ||
                       lowerQuery.includes(music.artist.toLowerCase()) ||
                       music.tags.some(tag => lowerQuery.includes(tag));
            });

            // Se não encontrar nada, retorna músicas populares
            if (results.length === 0) {
                results = musicDatabase.slice(0, 10);
            }

            // Limita a 15 resultados
            return results.slice(0, 15);
        }

        function showFallbackResults(query) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="loading">
                    <div>🎵 "${query}"</div>
                    <div style="font-size: 12px; margin-top: 8px;">Clique em uma música abaixo</div>
                </div>
            `;
            
            // Mostra sugestões
            setTimeout(() => {
                intelligentSearch(query).then(results => {
                    displayResults(results);
                });
            }, 500);
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="loading">
                        <div>😢 Nenhum resultado encontrado</div>
                        <div style="font-size: 12px; margin-top: 8px;">Tente outra busca</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="video-grid">
                    ${results.map(video => `
                        <div class="video-card" onclick="playVideo('${video.id}', '${video.title}', '${video.artist}')">
                            <img class="video-thumb" src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" 
                                 onerror="this.src='https://i.ytimg.com/vi/${video.id}/default.jpg'"
                                 alt="${video.title}">
                            <div class="video-info">
                                <div class="video-card-title">${escapeHtml(video.title)}</div>
                                <div class="video-card-channel">${escapeHtml(video.artist)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            if (show) {
                const container = document.getElementById('resultsContainer');
                container.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Buscando músicas...</div>
                    </div>
                `;
            }
        }

        // ===== PLAYER =====
        function playVideo(videoId, title, artist) {
            currentVideoId = videoId;
            const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0&modestbranding=1`;
            
            document.getElementById('player').innerHTML = `
                <iframe id="videoFrame" 
                    src="${embedUrl}"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                    allowfullscreen
                    style="width:100%;height:100%;border:none;">
                </iframe>
            `;
            
            showToast(`▶ Reproduzindo: ${title}`);
            
            // Atualiza título da aba
            document.title = `${title} - Play Tube`;
            
            // Se estiver em modo mini, sai do mini
            if (isMiniPlayer) {
                toggleMiniPlayer();
            }
        }

        // ===== PICTURE-IN-PICTURE =====
        async function togglePiP() {
            const video = document.querySelector('#videoFrame');
            if (!video) {
                showToast('Aguarde o vídeo carregar');
                return;
            }

            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    showToast('📺 PiP desativado');
                } else {
                    await video.requestPictureInPicture();
                    showToast('📺 PiP ativado - Vídeo flutuante');
                }
            } catch (error) {
                showToast('📺 PiP disponível no player');
            }
        }

        // ===== DOWNLOAD =====
        function downloadVideo() {
            if (!currentVideoId) {
                showToast('Selecione uma música primeiro');
                return;
            }
            window.open(`https://yt5s.com/en?url=https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
            showToast('⬇ Download iniciado');
        }

        // ===== MINI PLAYER =====
        function toggleMiniPlayer() {
            const wrapper = document.getElementById('playerWrapper');
            
            isMiniPlayer = !isMiniPlayer;
            
            if (isMiniPlayer) {
                wrapper.classList.add('mini');
                makeDraggable(wrapper);
                showToast('📺 Player suspenso - Arraste para mover');
            } else {
                wrapper.classList.remove('mini');
                wrapper.style.position = '';
                wrapper.style.bottom = '';
                wrapper.style.right = '';
                wrapper.style.top = '';
                wrapper.style.left = '';
                showToast('📺 Player maximizado');
            }
        }

        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            const dragMouseDown = (e) => {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };
            
            const dragTouchStart = (e) => {
                e.preventDefault();
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = touchDrag;
            };
            
            const elementDrag = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
                element.style.bottom = 'auto';
                element.style.right = 'auto';
            };
            
            const touchDrag = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.touches[0].clientX;
                pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
                element.style.bottom = 'auto';
                element.style.right = 'auto';
            };
            
            const closeDragElement = () => {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            };
            
            element.onmousedown = dragMouseDown;
            element.ontouchstart = dragTouchStart;
        }

        // ===== COMPARTILHAR =====
        function shareVideo() {
            if (!currentVideoId) {
                showToast('Selecione uma música primeiro');
                return;
            }
            const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
            if (navigator.share) {
                navigator.share({ title: 'Play Tube', url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast('📋 Link copiado!');
            }
        }

        // ===== TOAST =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== EVENTOS =====
        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value;
            searchMusic(query);
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value;
                searchMusic(query);
            }
        });

        document.getElementById('shareBtn').addEventListener('click', shareVideo);

        // Carregar músicas populares ao iniciar
        window.addEventListener('load', () => {
            searchMusic('populares');
        });

        // Expor funções globalmente
        window.playVideo = playVideo;
        window.toggleMiniPlayer = toggleMiniPlayer;
        window.togglePiP = togglePiP;
        window.downloadVideo = downloadVideo;
        window.shareVideo = shareVideo;
        window.searchMusic = searchMusic;

        console.log('✅ Play Tube Music - Busca de músicas ativada');
        console.log('   - Digite o nome da música no campo de busca');
        console.log('   - Clique em 🔍 para buscar');
        console.log('   - Clique no resultado para reproduzir');
    </script>
</body>
</html>
