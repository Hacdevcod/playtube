<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    
    <meta http-equiv="Content-Security-Policy" content="
        media-src * blob: mediastream:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com https://accounts.google.com https://apis.google.com;
        connect-src * blob: https://accounts.google.com https://apis.google.com https://oauth2.googleapis.com;
        worker-src blob:;
        frame-src https://accounts.google.com https://www.youtube.com https://www.youtube-nocookie.com;
    ">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='96' fill='%23ff0000'/><polygon points='80,60 80,132 140,96' fill='white'/></svg>">
    
    <title>Play Tube Music</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --blue: #4285f4;
            --player-h: 65px;
            --topbar-h: 50px;
            --safe-t: 0px;
            --safe-b: 0px;
            --nav-bar-h: 0px;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; height: 100%; height: 100dvh; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-top: calc(var(--safe-t) + var(--topbar-h));
            padding-bottom: calc(var(--player-h) + 8px + var(--nav-bar-h) + var(--safe-b));
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }

        /* Player visível (não oculto) para garantir funcionamento */
        #ytPlayerContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
        }
        
        #ytPlayerContainer iframe {
            width: 100%;
            height: 100%;
        }

        /* MODAL DE LOGIN */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.hidden { display: none; }
        
        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            border: 1px solid var(--border);
        }
        
        .modal h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
        .modal p { font-size: 0.85rem; color: var(--text2); margin-bottom: 25px; line-height: 1.4; }
        
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #fff; color: #333; border: none; border-radius: 50px;
            padding: 14px 28px; font-size: 1rem; font-weight: 600; cursor: pointer;
            width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px; -webkit-appearance: none;
        }
        .google-btn:active { transform: scale(0.98); }
        .google-btn img { width: 24px; height: 24px; }
        
        .skip-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text2);
            border-radius: 50px; padding: 12px 24px; font-size: 0.85rem; cursor: pointer;
            transition: all 0.3s; width: 100%; -webkit-appearance: none;
        }
        .skip-btn:active { background: var(--surface2); color: var(--text); }

        .login-loading { display: none; text-align: center; padding: 20px; }
        .login-loading.active { display: block; }
        .login-loading .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }

        .user-profile {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            padding: 4px 8px; border-radius: 20px; transition: background 0.2s;
        }
        .user-profile:active { background: var(--surface2); }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid var(--red); }
        .user-name { font-size: 0.8rem; font-weight: 600; color: var(--text); max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .user-menu {
            position: fixed; top: calc(var(--safe-t) + var(--topbar-h) + 5px); right: 12px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 0; min-width: 200px; z-index: 400;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; animation: slideDown 0.2s ease;
        }
        .user-menu.active { display: block; }
        .user-menu-item {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            font-size: 0.85rem; color: var(--text); cursor: pointer; transition: background 0.2s;
            border: none; background: none; width: 100%; text-align: left; -webkit-appearance: none;
        }
        .user-menu-item:active { background: var(--surface2); }
        .user-menu-item.danger { color: #f44; }
        .user-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
        .user-menu-header { padding: 10px 16px; font-size: 0.75rem; color: var(--text2); font-weight: 600; }

        .sync-indicator { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: var(--green); }
        .sync-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }

        .topbar {
            position: fixed; top: var(--safe-t); left: 0; right: 0; height: var(--topbar-h);
            background: var(--bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 12px; gap: 8px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 0.9rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; -webkit-appearance: none; }
        .bg-play-indicator {
            display: none; width: 8px; height: 8px; background: var(--green);
            border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite;
        }
        .bg-play-indicator.active { display: inline-block; }

        .page-counter {
            display: none; align-items: center; justify-content: center;
            gap: 8px; padding: 8px 10px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .page-counter.active { display: flex; }
        .page-btn-pg {
            padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .page-btn-pg:active { background: var(--red); color: #fff; }
        .page-btn-pg:disabled { opacity: 0.3; pointer-events: none; }
        .page-info-pg { font-size: 0.75rem; color: var(--text2); min-width: 90px; text-align: center; font-weight: 600; }
        .page-info-pg .pg-current { color: var(--red); font-size: 0.9rem; }
        .page-jump-pg {
            width: 42px; text-align: center; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 10px; 
            color: var(--text); font-size: 0.7rem; padding: 5px;
        }
        .page-items-range { font-size: 0.65rem; color: var(--text3); }

        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; position: relative; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); opacity: 1; }
        .search-btn {
            width: 42px; background: var(--surface2); border: none; color: var(--text);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .search-btn:active { background: var(--red); color: #fff; }

        .tabs-container { 
            display: flex; gap: 4px; padding: 4px 12px 8px; 
            background: var(--bg); overflow-x: auto; position: relative; z-index: 40;
        }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title {
            font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 10px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }
        .v-btn.dl:active { background: var(--green); }

        .spotify-bar {
            position: fixed;
            bottom: calc(var(--nav-bar-h) + var(--safe-b));
            left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; padding: 0 10px; gap: 8px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art {
            width: 46px; height: 46px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; cursor: pointer; transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; box-shadow: 0 0 15px rgba(29,185,84,0.3); }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .sp-title { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.7rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; animation: progressGlow 2s ease-in-out infinite; }
        .sp-controls { display: flex; gap: 8px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 0.9rem; cursor: pointer; padding: 6px; transition: all 0.2s; }
        .sp-btn:active { transform: scale(0.85); color: #fff; }
        .sp-btn.play {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            color: #000; font-size: 0.9rem; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-dl {
            background: rgba(29,185,84,0.15); border: none; color: var(--green);
            font-size: 0.7rem; cursor: pointer; padding: 6px 8px; border-radius: 15px;
            transition: all 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .sp-dl:active { background: rgba(29,185,84,0.3); transform: scale(0.95); }
        .sp-dl.downloading { animation: downloading 0.8s infinite; background: rgba(29,185,84,0.3); }

        .toast {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 15px);
            left: 50%; transform: translateX(-50%) translateY(120px);
            background: #333; color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 0.75rem; z-index: 600;
            transition: transform 0.3s; white-space: nowrap;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--red); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        .dl-progress {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 10px);
            left: 12px; right: 12px; background: var(--surface);
            border-radius: 10px; padding: 10px; z-index: 300;
            display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dl-progress.active { display: block; }
        .dl-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .dl-fill { height: 100%; background: linear-gradient(90deg, #1db954, #00e676); width: 0%; transition: width 0.3s; }

        .player-container {
            width: 100%; background: #000; display: none;
            position: relative; animation: slideUp 0.4s ease; border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-container.rainbow-border { animation: rainbow 3s linear infinite; border-width: 2px; border-style: solid; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: none;
            color: #fff; font-size: 16px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 360px) { 
            :root { --player-h: 58px; --topbar-h: 44px; }
            .sp-art { width: 38px; height: 38px; } 
            .sp-btn.play { width: 34px; height: 34px; } 
            .video-thumb { width: 40px; height: 40px; }
            .sp-title { font-size: 0.8rem; }
            .logo-text { font-size: 0.8rem; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 6px + var(--nav-bar-h) + var(--safe-b));
            }
        }
        
        @media (min-width: 768px) { 
            body { max-width: 550px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
            .topbar { max-width: 550px; left: 50%; transform: translateX(-50%); }
            .spotify-bar { max-width: 550px; left: 50%; transform: translateX(-50%); }
            .user-menu { right: calc(50% - 262px); }
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            :root { --player-h: 46px; --topbar-h: 40px; }
            .sp-art { width: 30px; height: 30px; }
            .sp-btn.play { width: 28px; height: 28px; font-size: 0.7rem; }
            .results-section { max-height: 35vh; overflow-y: auto; }
            .sp-title { font-size: 0.75rem; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 4px + var(--nav-bar-h) + var(--safe-b));
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- PLAYER DO YOUTUBE (VISÍVEL MAS TRANSPARENTE) -->
    <div id="ytPlayerContainer"></div>

    <!-- MODAL DE LOGIN -->
    <div class="modal-overlay hidden" id="loginModal">
        <div class="modal">
            <div style="font-size:3rem;margin-bottom:15px;">🎧</div>
            <h2>Bem-vindo ao Play Tube</h2>
            <p>Faça login com sua conta Google para salvar suas músicas, playlists e configurações na nuvem.</p>
            <div class="login-loading" id="loginLoading">
                <div class="spinner"></div>
                <p style="color:var(--text2);font-size:0.85rem;">Conectando ao Google...</p>
            </div>
            <div id="loginButtons">
                <button class="google-btn" onclick="Auth.login()">

    <script>
    (function() {
        'use strict';
        const PROXY = 'https://playtube-proxy.codw23.workers.dev';
        const GOOGLE_CLIENT_ID = '1015083213340-69q19u0bd6f232l6kmdcmk2hf3lqgrtj.apps.googleusercontent.com';

        // ===== DETECTOR DE DISPOSITIVO =====
        const Device = {
            isMobile: /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent),
            isIOS: /iPhone|iPad|iPod/i.test(navigator.userAgent),
            isAndroid: /Android/i.test(navigator.userAgent),
        };

        // ===== PLAYER PRINCIPAL (CORRIGIDO) =====
        const Player = {
            yt: null,
            isReady: false,
            isPlaying: false,
            currentId: null,
            onStateChangeCallback: null,
            onErrorCallback: null,
            
            init() {
                console.log('🎵 Inicializando player...');
                
                if (this.yt) {
                    try { this.yt.destroy(); } catch(e) {}
                }
                
                try {
                    this.yt = new YT.Player('ytPlayerContainer', {
                        height: '360',
                        width: '640',
                        videoId: '',
                        host: 'https://www.youtube-nocookie.com',
                        playerVars: {
                            autoplay: 0,
                            playsinline: 1,
                            controls: 0,
                            disablekb: 1,
                            fs: 0,
                            rel: 0,
                            modestbranding: 1,
                            iv_load_policy: 3,
                            origin: window.location.origin,
                            enablejsapi: 1,
                            mute: 0,
                            volume: 100,
                        },
                        events: {
                            onReady: (e) => this.onReady(e),
                            onStateChange: (e) => this.onStateChange(e),
                            onError: (e) => this.onError(e),
                        }
                    });
                    console.log('✅ Player criado');
                } catch(e) {
                    console.error('❌ Erro ao criar player:', e);
                }
            },
            
            onReady(event) {
                console.log('✅ Player PRONTO');
                this.isReady = true;
                event.target.setVolume(100);
                event.target.unMute();
                
                // Se havia uma música para tocar
                if (this.pendingVideo) {
                    console.log('▶️ Tocando vídeo pendente:', this.pendingVideo);
                    this.loadAndPlay(this.pendingVideo);
                    this.pendingVideo = null;
                }
            },
            
            onStateChange(event) {
                console.log('🔄 Estado do player:', event.data);
                
                if (event.data === YT.PlayerState.PLAYING) {
                    this.isPlaying = true;
                    window.playing = true;
                    updateUI(true);
                    startProgressBar();
                    console.log('▶️ Reproduzindo');
                } else if (event.data === YT.PlayerState.PAUSED) {
                    this.isPlaying = false;
                    window.playing = false;
                    updateUI(false);
                    stopProgressBar();
                    console.log('⏸️ Pausado');
                } else if (event.data === YT.PlayerState.ENDED) {
                    this.isPlaying = false;
                    window.playing = false;
                    stopProgressBar();
                    updateProgressBar(0);
                    console.log('⏹️ Terminou');
                    if (typeof nextTrack === 'function') nextTrack();
                }
            },
            
            onError(event) {
                console.error('❌ Erro no player:', event.data);
                this.isReady = false;
                toast('⚠️ Erro ao reproduzir. Tentando novamente...');
                
                // Tentar reinicializar
                setTimeout(() => {
                    this.init();
                }, 2000);
            },
            
            loadAndPlay(videoId) {
                if (!videoId) {
                    console.error('❌ Nenhum videoId fornecido');
                    return;
                }
                
                console.log('🎵 Carregando vídeo:', videoId);
                this.currentId = videoId;
                
                if (this.isReady && this.yt && this.yt.loadVideoById) {
                    try {
                        this.yt.loadVideoById({
                            videoId: videoId,
                            startSeconds: 0
                        });
                        
                        // Pequeno delay para garantir que o vídeo carregou
                        setTimeout(() => {
                            if (this.yt && this.yt.playVideo) {
                                this.yt.playVideo();
                                this.yt.unMute();
                                this.yt.setVolume(100);
                                console.log('▶️ Play executado');
                            }
                        }, 500);
                    } catch(e) {
                        console.error('❌ Erro ao carregar vídeo:', e);
                    }
                } else {
                    console.log('⏳ Player não está pronto, agendando...');
                    this.pendingVideo = videoId;
                    
                    // Se o player não está pronto, reinicializar
                    if (!this.isReady) {
                        this.init();
                    }
                }
            },
            
            play() {
                if (this.yt && this.yt.playVideo) {
                    this.yt.playVideo();
                    this.yt.unMute();
                    this.yt.setVolume(100);
                }
            },
            
            pause() {
                if (this.yt && this.yt.pauseVideo) {
                    this.yt.pauseVideo();
                }
            },
            
            toggle() {
                if (this.isPlaying) {
                    this.pause();
                } else if (this.currentId) {
                    this.play();
                }
            },
            
            getCurrentTime() {
                if (this.yt && this.yt.getCurrentTime) {
                    try { return this.yt.getCurrentTime(); } catch(e) { return 0; }
                }
                return 0;
            },
            
            getDuration() {
                if (this.yt && this.yt.getDuration) {
                    try { return this.yt.getDuration(); } catch(e) { return 0; }
                }
                return 0;
            },
            
            seekTo(seconds) {
                if (this.yt && this.yt.seekTo) {
                    this.yt.seekTo(seconds, true);
                }
            },
        };

        // ===== SISTEMA DE AUTENTICAÇÃO (SIMPLIFICADO) =====
        const Auth = {
            user: null,
            token: null,
            isLoggedIn: false,
            
            init() {
                const saved = localStorage.getItem('playtube_auth');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (Date.now() - data.timestamp < 24 * 60 * 60 * 1000) {
                            this.user = data.user;
                            this.token = data.token;
                            this.isLoggedIn = true;
                            this.updateUI();
                        } else {
                            localStorage.removeItem('playtube_auth');
                        }
                    } catch(e) {
                        localStorage.removeItem('playtube_auth');
                    }
                }
                
                if (!this.isLoggedIn && !localStorage.getItem('playtube_skip_login')) {
                    setTimeout(() => this.showLoginModal(), 1000);
                }
            },
            
            showLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); },
            hideLoginModal() { document.getElementById('loginModal').classList.add('hidden'); },
            
            login() {
                // Simulação de login para teste
                const mockUser = {
                    id: 'user_' + Date.now(),
                    name: 'Usuário Teste',
                    email: 'teste@playtube.com',
                    picture: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%234285f4"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="40">U</text></svg>'
                };
                
                this.user = mockUser;
                this.token = 'token_' + Date.now();
                this.isLoggedIn = true;
                this.saveAuth();
                this.updateUI();
                this.hideLoginModal();
                toast('✅ Bem-vindo, ' + mockUser.name + '!');
            },
            
            skip() {
                localStorage.setItem('playtube_skip_login', 'true');
                this.hideLoginModal();
                this.updateUI();
                toast('👤 Modo offline');
            },
            
            logout() {
                if (confirm('Sair da conta?')) {
                    this.user = null;
                    this.token = null;
                    this.isLoggedIn = false;
                    localStorage.removeItem('playtube_auth');
                    this.updateUI();
                    toast('👋 Até logo!');
                }
            },
            
            saveAuth() {
                localStorage.setItem('playtube_auth', JSON.stringify({
                    user: this.user,
                    token: this.token,
                    timestamp: Date.now()
                }));
            },
            
            updateUI() {
                const userProfile = document.getElementById('userProfile');
                const loginBtn = document.getElementById('loginBtn');
                const userAvatar = document.getElementById('userAvatar');
                const userName = document.getElementById('userName');
                
                if (this.isLoggedIn && this.user) {
                    userProfile.style.display = 'flex';
                    loginBtn.style.display = 'none';
                    userAvatar.src = this.user.picture || '';
                    userName.textContent = this.user.name?.split(' ')[0] || 'Usuário';
                } else {
                    userProfile.style.display = 'none';
                    loginBtn.style.display = 'flex';
                }
            },
            
            toggleMenu() {
                document.getElementById('userMenu').classList.toggle('active');
            },
            
            syncNow() { toast('🔄 Sincronizado!'); },
            exportData() { toast('📤 Dados exportados!'); },
            importData() { toast('📥 Dados importados!'); },
        };

        // ===== VARIÁVEIS GLOBAIS =====
        window.playing = false;
        let playlist = [];
        let currentIndex = -1;
        let progressInterval = null;
        let toastTimeout = null;

        // ===== FUNÇÕES DE UI =====
        function updateUI(isPlaying) {
            const spPlay = document.getElementById('spPlay');
            const spBar = document.getElementById('spotifyBar');
            const spArt = document.getElementById('spArt');
            const bgIndicator = document.getElementById('bgPlayIndicator');
            
            if (spPlay) {
                spPlay.textContent = isPlaying ? '⏸' : '▶';
                spPlay.classList.toggle('playing', isPlaying);
            }
            if (spBar) spBar.classList.toggle('playing', isPlaying);
            if (spArt) spArt.classList.toggle('playing', isPlaying);
            if (bgIndicator) bgIndicator.classList.toggle('active', isPlaying);
        }
        
        function updateProgressBar(percent) {
            const bar = document.getElementById('progressBar');
            if (bar) bar.style.width = percent + '%';
        }
        
        function startProgressBar() {
            stopProgressBar();
            progressInterval = setInterval(() => {
                if (Player.isPlaying && Player.yt) {
                    try {
                        const duration = Player.getDuration();
                        const current = Player.getCurrentTime();
                        if (duration > 0) {
                            updateProgressBar((current / duration) * 100);
                        }
                    } catch(e) {}
                }
            }, 1000);
        }
        
        function stopProgressBar() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        // ===== FUNÇÕES DE REPRODUÇÃO =====
        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentIndex = index;
            const track = playlist[index];
            
            console.log('🎵 Tocando faixa:', track.title, track.id);
            
            // Atualizar UI
            document.getElementById('spTitle').textContent = track.title || 'Sem título';
            document.getElementById('spArtist').textContent = track.channel || 'Canal desconhecido';
            document.getElementById('spArt').src = track.thumbnail || '';
            document.getElementById('spotifyBar').classList.add('active');
            document.title = '▶ ' + (track.title || 'Play Tube Music');
            
            // Tocar
            Player.loadAndPlay(track.id);
            
            // Atualizar Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title || '',
                    artist: track.channel || '',
                    artwork: [{ src: track.thumbnail || '', sizes: '96x96', type: 'image/jpeg' }]
                });
            }
        }
        
        window.togglePlay = () => {
            if (!Player.currentId && playlist.length > 0) {
                playTrack(0);
            } else {
                Player.toggle();
            }
        };
        
        window.nextTrack = () => {
            if (playlist.length === 0) return;
            updateProgressBar(0);
            const next = (currentIndex + 1) % playlist.length;
            playTrack(next);
        };
        
        window.prevTrack = () => {
            if (playlist.length === 0) return;
            updateProgressBar(0);
            const prev = (currentIndex - 1 + playlist.length) % playlist.length;
            playTrack(prev);
        };
        
        window.seekTrack = (e) => {
            if (!Player.currentId) return;
            const container = document.getElementById('progressContainer');
            const rect = container.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const duration = Player.getDuration();
            if (duration > 0) {
                Player.seekTo(percent * duration);
            }
        };
        
        window.playFromResults = (id, title, channel, thumb) => {
            console.log('🎵 playFromResults:', { id, title, channel, thumb });
            
            const track = { id, title, channel, thumbnail: thumb };
            
            // Adicionar ao início da playlist
            playlist = playlist.filter(t => t.id !== track.id);
            playlist.unshift(track);
            
            // Tocar imediatamente
            playTrack(0);
            
            toast('▶ ' + (title || 'Música').substring(0, 30));
        };
        
        window.downloadCurrent = () => {
            if (!Player.currentId || currentIndex < 0) {
                toast('⚠️ Nenhuma música tocando');
                return;
            }
            toast('⬇️ Download iniciado');
        };

        // ===== UTILITÁRIOS =====
        function esc(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toast(message) {
            const el = document.getElementById('toast');
            if (toastTimeout) clearTimeout(toastTimeout);
            el.textContent = message;
            el.classList.add('show');
            toastTimeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ===== BUSCA =====
        async function searchYT(query) {
            if (!query.trim()) {
                toast('⚠️ Digite algo para buscar');
                return;
            }
            
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>';
            
            try {
                const url = new URL(PROXY);
                url.searchParams.append('q', query + ' música');
                url.searchParams.append('maxResults', '50');
                url.searchParams.append('regionCode', 'BR');
                url.searchParams.append('relevanceLanguage', 'pt');
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Erro na busca');
                
                const data = await response.json();
                
                if (data.videos && data.videos.length > 0) {
                    container.innerHTML = data.videos.map(v => {
                        const isFav = Fav.isFav(v.id);
                        return `
                            <div class="video-card" onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">
                                <img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'">
                                <div class="video-info">
                                    <div class="video-title">${esc(v.title)}</div>
                                    <div class="video-channel">${esc(v.channel)}</div>
                                </div>
                                <div class="video-actions">
                                    <button class="v-btn fav${isFav?' fav-active':''}" onclick="event.stopPropagation();Fav.toggle('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">${isFav?'❤️':'🤍'}</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('resultCount').textContent = data.videos.length + ' resultados';
                } else {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado</div>';
                    document.getElementById('resultCount').textContent = '';
                }
            } catch(e) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Erro na busca</div>';
                toast('⚠️ Erro na busca');
            }
        }

        // ===== FAVORITOS =====
        const Fav = {
            favs: JSON.parse(localStorage.getItem('favs') || '[]'),
            
            isFav(id) {
                return this.favs.some(f => f.id === id);
            },
            
            toggle(id, title, channel, thumbnail) {
                const index = this.favs.findIndex(f => f.id === id);
                if (index > -1) {
                    this.favs.splice(index, 1);
                    toast('💔 Removido dos favoritos');
                } else {
                    this.favs.unshift({ id, title, channel, thumbnail });
                    toast('❤️ Adicionado aos favoritos');
                }
                localStorage.setItem('favs', JSON.stringify(this.favs));
                
                // Atualizar botões na tela
                document.querySelectorAll('.v-btn.fav').forEach(btn => {
                    const fid = btn.getAttribute('data-id') || btn.onclick?.toString().match(/'([^']+)'/)?.[1];
                    if (fid === id) {
                        const isFav = this.isFav(id);
                        btn.classList.toggle('fav-active', isFav);
                        btn.textContent = isFav ? '❤️' : '🤍';
                    }
                });
            }
        };

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }
        };
        T.apply();

        // ===== TABS =====
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                if (b.textContent.toLowerCase().includes(tab)) b.classList.add('active');
            });
            
            if (tab === 'favorites') {
                const container = document.getElementById('resultsContainer');
                if (Fav.favs.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">❤️ Nenhum favorito</div>';
                } else {
                    container.innerHTML = Fav.favs.map(v => `
                        <div class="video-card" onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">
                            <img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'">
                            <div class="video-info">
                                <div class="video-title">${esc(v.title)}</div>
                                <div class="video-channel">${esc(v.channel)}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        };

        // ===== INICIALIZAÇÃO =====
        function init() {
            console.log('🚀 Inicializando Play Tube Music...');
            
            // Inicializar player
            Player.init();
            
            // Inicializar auth
            Auth.init();
            
            // Configurar busca
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchInput').value;
                searchYT(query);
            });
            
            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = document.getElementById('searchInput').value;
                    searchYT(query);
                }
            });
            
            // Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
            
            // Fechar menu ao clicar fora
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('userMenu');
                const profile = document.getElementById('userProfile');
                if (menu.classList.contains('active') && !menu.contains(e.target) && !profile.contains(e.target)) {
                    menu.classList.remove('active');
                }
            });
            
            console.log('✅ Play Tube Music pronto!');
            console.log('💡 Clique em uma música para tocar');
        }

        // ===== YOUTUBE API CALLBACK =====
        window.onYouTubeIframeAPIReady = () => {
            console.log('📺 YouTube API pronta');
            Player.init();
        };

        // ===== START =====
        window.addEventListener('load', init);

        // Expor funções globalmente
        window.playFromResults = playFromResults;
        window.togglePlay = togglePlay;
        window.nextTrack = nextTrack;
        window.prevTrack = prevTrack;
        window.seekTrack = seekTrack;
        window.downloadCurrent = downloadCurrent;
        window.switchTab = switchTab;
        window.T = T;
        window.Auth = Auth;
        window.Fav = Fav;
    })();
    </script>
</body>
</html>
