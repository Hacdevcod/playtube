<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0f0f0f">
    <title>Play Tube - Player Suspenso</title>
    <style>
        :root {
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #272727;
            --yt-red: #ff0000;
            --yt-white: #fff;
            --yt-gray: #aaa;
            --yt-gray2: #717171;
            --yt-border: #303030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--yt-bg);
            color: var(--yt-white);
            min-height: 100vh;
        }

        /* Top Bar */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--yt-bg);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            border-bottom: 1px solid var(--yt-border);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .spacer {
            flex: 1;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        /* Player Container */
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botões flutuantes do player */
        .player-buttons {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }

        .float-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.2s, background 0.2s;
        }

        .float-btn:active {
            transform: scale(0.95);
        }

        .float-btn.download {
            background: #ff0000;
        }

        /* Mini Player (Suspenso) */
        .player-wrapper.mini {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 169px;
            z-index: 1000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: move;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .player-wrapper.mini .float-btn {
            width: 36px;
            height: 36px;
            font-size: 16px;
        }

        /* Playlist */
        .playlist-section {
            padding: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-card {
            display: flex;
            gap: 12px;
            background: var(--yt-surface);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .video-card:active {
            background: var(--yt-surface2);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            background: #333;
            object-fit: cover;
        }

        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-card-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-card-channel {
            font-size: 12px;
            color: var(--yt-gray);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 300;
            transition: transform 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Mini player toggle button */
        .mini-toggle {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 20;
        }

        @media (max-width: 400px) {
            .video-thumb {
                width: 100px;
                height: 56px;
            }
            .video-card-title {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">Play Tube<sup>PRO</sup></span>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" id="shareBtn">🔗</button>
    </div>

    <!-- Player Principal -->
    <div class="player-container">
        <div class="player-wrapper" id="playerWrapper">
            <div id="player"></div>
            <button class="mini-toggle" onclick="toggleMiniPlayer()">⤡</button>
            <div class="player-buttons">
                <button class="float-btn" id="pipBtn" onclick="togglePiP()">📺</button>
                <button class="float-btn download" id="downloadBtn" onclick="downloadVideo()">⬇</button>
            </div>
        </div>
    </div>

    <!-- Playlist de Vídeos Prontos -->
    <div class="playlist-section">
        <div class="section-title">📺 Recomendados</div>
        <div class="video-grid" id="playlist">
            <!-- Vídeos serão inseridos via JS -->
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // PLAY TUBE - PLAYER SUSPENSO
        // Vídeos prontos + PiP + Download
        // ============================================

        // Lista de vídeos (já incorporados, sem necessidade de URL)
        const VIDEOS = [
            {
                id: 'dQw4w9WgXcQ',
                title: 'Never Gonna Give You Up',
                channel: 'Rick Astley',
                thumbnail: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg'
            },
            {
                id: '9bZkp7q19f0',
                title: 'Gangnam Style',
                channel: 'PSY',
                thumbnail: 'https://i.ytimg.com/vi/9bZkp7q19f0/hqdefault.jpg'
            },
            {
                id: 'pRpeEdMmmQ0',
                title: 'Uptown Funk',
                channel: 'Mark Ronson ft. Bruno Mars',
                thumbnail: 'https://i.ytimg.com/vi/pRpeEdMmmQ0/hqdefault.jpg'
            },
            {
                id: 'OPf0YbXqDm0',
                title: 'See You Again',
                channel: 'Wiz Khalifa ft. Charlie Puth',
                thumbnail: 'https://i.ytimg.com/vi/OPf0YbXqDm0/hqdefault.jpg'
            },
            {
                id: 'JGwWNGJdvx8',
                title: 'Shape of You',
                channel: 'Ed Sheeran',
                thumbnail: 'https://i.ytimg.com/vi/JGwWNGJdvx8/hqdefault.jpg'
            },
            {
                id: 'kJQP7kiw5Fk',
                title: 'Despacito',
                channel: 'Luis Fonsi ft. Daddy Yankee',
                thumbnail: 'https://i.ytimg.com/vi/kJQP7kiw5Fk/hqdefault.jpg'
            },
            {
                id: 'RgKAFK5djSk',
                title: 'Waka Waka',
                channel: 'Shakira',
                thumbnail: 'https://i.ytimg.com/vi/RgKAFK5djSk/hqdefault.jpg'
            },
            {
                id: 'M7lc1UVf-VE',
                title: 'Bad Guy',
                channel: 'Billie Eilish',
                thumbnail: 'https://i.ytimg.com/vi/M7lc1UVf-VE/hqdefault.jpg'
            }
        ];

        let currentVideoId = VIDEOS[0].id;
        let player = null;
        let isMiniPlayer = false;
        let pipActive = false;

        // ===== INICIALIZAR PLAYER =====
        function initPlayer(videoId) {
            const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0&modestbranding=1&enablejsapi=1`;
            
            document.getElementById('player').innerHTML = `
                <iframe id="videoFrame" 
                    src="${embedUrl}"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                    allowfullscreen
                    style="width:100%;height:100%;border:none;">
                </iframe>
            `;
            
            currentVideoId = videoId;
        }

        // ===== CARREGAR PLAYLIST =====
        function loadPlaylist() {
            const playlistDiv = document.getElementById('playlist');
            playlistDiv.innerHTML = '';
            
            VIDEOS.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    initPlayer(video.id);
                    showToast(`▶ Reproduzindo: ${video.title}`);
                    // Se estiver em modo mini, sai do mini
                    if (isMiniPlayer) {
                        toggleMiniPlayer();
                    }
                };
                
                card.innerHTML = `
                    <img class="video-thumb" src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                    <div class="video-info">
                        <div class="video-card-title">${video.title}</div>
                        <div class="video-card-channel">${video.channel}</div>
                    </div>
                `;
                playlistDiv.appendChild(card);
            });
        }

        // ===== PICTURE-IN-PICTURE (NATIVO) =====
        async function togglePiP() {
            const video = document.querySelector('#videoFrame');
            if (!video) {
                showToast('Aguarde o vídeo carregar');
                return;
            }

            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    pipActive = false;
                    showToast('📺 PiP desativado');
                } else {
                    await video.requestPictureInPicture();
                    pipActive = true;
                    showToast('📺 PiP ativado - Vídeo flutuante');
                }
            } catch (error) {
                showToast('📺 PiP disponível no player');
            }
        }

        // ===== DOWNLOAD DO VÍDEO ATUAL =====
        function downloadVideo() {
            if (!currentVideoId) {
                showToast('Nenhum vídeo carregado');
                return;
            }
            
            // Abre serviço de download
            window.open(`https://yt5s.com/en?url=https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
            showToast('⬇ Download iniciado');
        }

        // ===== MINI PLAYER (SUSPENSO E ARRASTÁVEL) =====
        function toggleMiniPlayer() {
            const wrapper = document.getElementById('playerWrapper');
            
            isMiniPlayer = !isMiniPlayer;
            
            if (isMiniPlayer) {
                wrapper.classList.add('mini');
                makeDraggable(wrapper);
                showToast('📺 Player suspenso - Arraste para mover');
            } else {
                wrapper.classList.remove('mini');
                wrapper.style.position = '';
                wrapper.style.bottom = '';
                wrapper.style.right = '';
                wrapper.style.top = '';
                wrapper.style.left = '';
                showToast('📺 Player maximizado');
            }
        }

        // Função para arrastar o mini player
        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            const dragMouseDown = (e) => {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };
            
            const dragTouchStart = (e) => {
                e.preventDefault();
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = touchDrag;
            };
            
            const elementDrag = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
                element.style.bottom = 'auto';
                element.style.right = 'auto';
            };
            
            const touchDrag = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.touches[0].clientX;
                pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
                element.style.bottom = 'auto';
                element.style.right = 'auto';
            };
            
            const closeDragElement = () => {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            };
            
            element.onmousedown = dragMouseDown;
            element.ontouchstart = dragTouchStart;
        }

        // ===== COMPARTILHAR =====
        function shareVideo() {
            const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Play Tube',
                    text: 'Assista este vídeo!',
                    url: url
                });
            } else {
                navigator.clipboard.writeText(url);
                showToast('📋 Link copiado!');
            }
        }

        // ===== TOAST =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== EVENTOS =====
        document.getElementById('shareBtn').addEventListener('click', shareVideo);
        
        // Atualiza título quando o iframe carrega
        function updateTitleFromIframe() {
            // Tenta extrair título do vídeo atual
            const currentVideo = VIDEOS.find(v => v.id === currentVideoId);
            if (currentVideo) {
                document.title = `${currentVideo.title} - Play Tube`;
            }
        }

        // Detectar quando o iframe carrega
        setInterval(() => {
            const iframe = document.querySelector('#videoFrame');
            if (iframe && iframe.src && !iframe.hasAttribute('data-loaded')) {
                iframe.setAttribute('data-loaded', 'true');
                updateTitleFromIframe();
            }
        }, 1000);

        // ===== INICIALIZAR =====
        initPlayer(VIDEOS[0].id);
        loadPlaylist();

        // Expor funções globalmente
        window.toggleMiniPlayer = toggleMiniPlayer;
        window.togglePiP = togglePiP;
        window.downloadVideo = downloadVideo;
        window.shareVideo = shareVideo;

        console.log('✅ Play Tube PRO - Player Suspenso');
        console.log('   - Clique em ⤡ para player flutuante');
        console.log('   - Clique em 📺 para Picture-in-Picture');
        console.log('   - Clique em ⬇ para baixar');
    </script>
</body>
</html>
