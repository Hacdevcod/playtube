<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0f0f0f">
    <title>Play Tube - Busca de Músicas</title>
    <style>
        :root {
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #272727;
            --yt-red: #ff0000;
            --yt-white: #fff;
            --yt-gray: #aaa;
            --yt-gray2: #717171;
            --yt-border: #303030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--yt-bg);
            color: var(--yt-white);
            min-height: 100vh;
        }

        .topbar {
            position: sticky;
            top: 0;
            background: var(--yt-bg);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            border-bottom: 1px solid var(--yt-border);
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: #ff0000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-text { font-size: 20px; font-weight: 700; }
        .spacer { flex: 1; }

        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: none; border: none;
            color: #fff; font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .icon-btn:active { background: var(--yt-surface2); }

        .search-section {
            padding: 12px 16px;
            background: var(--yt-bg);
            border-bottom: 1px solid var(--yt-border);
        }

        .search-box {
            display: flex;
            background: var(--yt-surface);
            border: 1px solid var(--yt-border);
            border-radius: 24px;
            overflow: hidden;
        }

        .search-box input {
            flex: 1; padding: 12px 16px;
            background: transparent; border: none;
            color: #fff; font-size: 16px;
            outline: none;
        }
        .search-box input::placeholder { color: var(--yt-gray2); }

        .search-btn {
            width: 48px;
            background: var(--yt-surface2);
            border: none; color: #fff;
            cursor: pointer; font-size: 18px;
            transition: background 0.2s;
        }
        .search-btn:active { background: #444; }

        .player-container { position: relative; width: 100%; background: #000; }

        .player-wrapper {
            width: 100%; aspect-ratio: 16/9;
            position: relative;
            transition: all 0.3s ease;
        }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        .player-buttons {
            position: absolute; bottom: 16px; right: 16px;
            display: flex; gap: 12px; z-index: 20;
        }

        .float-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            border: none; color: #fff; font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.2s, background 0.2s;
        }
        .float-btn:active { transform: scale(0.95); }
        .float-btn.download { background: #ff0000; }
        .float-btn.download:active { background: #cc0000; }

        .mini-toggle {
            position: absolute; top: 8px; right: 56px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none; color: #fff; font-size: 14px;
            cursor: pointer; z-index: 20;
            transition: right 0.3s;
        }

        .player-wrapper.mini {
            position: fixed; bottom: 20px; right: 20px;
            width: 300px; height: 169px;
            z-index: 1000; border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            cursor: grab;
            animation: slideIn 0.3s ease;
        }
        .player-wrapper.mini:active { cursor: grabbing; }
        .player-wrapper.mini .mini-toggle { right: 8px; }
        .player-wrapper.mini .float-btn { width: 36px; height: 36px; font-size: 16px; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .results-section { padding: 16px; }

        .section-title {
            font-size: 18px; font-weight: 600;
            margin-bottom: 12px; padding-left: 4px;
            display: flex; align-items: center;
            justify-content: space-between;
        }
        .result-count { font-size: 12px; color: var(--yt-gray2); font-weight: 400; }

        .video-grid {
            display: flex; flex-direction: column;
            gap: 12px; max-height: 500px;
            overflow-y: auto; padding-bottom: 16px;
        }

        .video-card {
            display: flex; gap: 12px;
            background: var(--yt-surface);
            border-radius: 12px; padding: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .video-card:hover { background: var(--yt-surface2); }
        .video-card:active { background: var(--yt-surface2); transform: scale(0.98); }

        .video-thumb {
            width: 120px; height: 68px;
            border-radius: 8px; background: #333;
            object-fit: cover; flex-shrink: 0;
        }

        .video-info {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; min-width: 0;
        }

        .video-card-title {
            font-size: 14px; font-weight: 500;
            margin-bottom: 4px; line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .video-card-channel { font-size: 12px; color: var(--yt-gray); }
        .video-card-meta { font-size: 11px; color: var(--yt-gray2); margin-top: 2px; }

        .loading { text-align: center; padding: 40px 20px; color: var(--yt-gray); }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #333; color: #fff;
            padding: 12px 24px; border-radius: 24px;
            font-size: 13px; z-index: 300;
            transition: transform 0.3s ease;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .pagination { display: flex; justify-content: center; gap: 12px; padding: 16px; }
        .pagination button {
            padding: 10px 20px;
            background: var(--yt-surface);
            border: 1px solid var(--yt-border);
            color: #fff; border-radius: 20px;
            cursor: pointer; font-size: 14px;
            transition: background 0.2s;
        }
        .pagination button:hover { background: var(--yt-surface2); }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination .page-info { color: var(--yt-gray); font-size: 12px; display: flex; align-items: center; }

        .video-grid::-webkit-scrollbar { width: 4px; }
        .video-grid::-webkit-scrollbar-track { background: transparent; }
        .video-grid::-webkit-scrollbar-thumb { background: var(--yt-border); border-radius: 4px; }

        @media (max-width: 400px) {
            .video-thumb { width: 100px; height: 56px; }
            .video-card-title { font-size: 12px; }
            .player-wrapper.mini { width: 260px; height: 146px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">Play Tube<sup style="font-size:10px;color:#ff0000;">MUSIC</sup></span>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" id="shareBtn" title="Compartilhar">🔗</button>
        <button class="icon-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar música, artista ou banda..." autocomplete="off">
            <button class="search-btn" id="searchBtn" aria-label="Buscar">🔍</button>
        </div>
    </div>

    <div class="player-container">
        <div class="player-wrapper" id="playerWrapper">
            <div id="player"></div>
            <button class="mini-toggle" onclick="toggleMiniPlayer()" title="Mini player">⤡</button>
            <div class="player-buttons">
                <button class="float-btn" id="pipBtn" onclick="togglePiP()" title="Picture-in-Picture">📺</button>
                <button class="float-btn download" id="downloadBtn" onclick="downloadVideo()" title="Download">⬇</button>
            </div>
        </div>
    </div>

    <div class="results-section">
        <div class="section-title">
            <span>🎵 Resultados</span>
            <span class="result-count" id="resultCount"></span>
        </div>
        <div id="resultsContainer">
            <div style="text-align:center;padding:40px 20px;color:#aaa;">
                <div style="font-size:48px;margin-bottom:12px;">🎧</div>
                <div style="font-size:16px;margin-bottom:8px;">Busque por suas músicas favoritas</div>
                <div style="font-size:12px;color:#717171;">Artistas, nomes de músicas ou bandas</div>
            </div>
        </div>
        <div class="pagination" id="paginationContainer" style="display:none;"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // Callback global da YouTube IFrame API
        function onYouTubeIframeAPIReady() {
            console.log('🎵 YouTube IFrame API pronta');
        }

        (function() {
            'use strict';

            // ============================================
            // PLAY TUBE MUSIC - API KEY PROTEGIDA VIA PROXY
            // ============================================
            // Worker URL configurada - API Key NUNCA visível
            const PROXY_URL = 'https://playtube.402e3d94bfb32aba2b5d886c4743794f.workers.dev';

            let currentVideoId = null;
            let currentVideoTitle = '';
            let isMiniPlayer = false;
            let toastTimeout = null;
            let nextPageToken = null;
            let prevPageToken = null;
            let currentQuery = '';
            let ytPlayer = null;

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultCount = document.getElementById('resultCount');
            const paginationContainer = document.getElementById('paginationContainer');
            const playerWrapper = document.getElementById('playerWrapper');
            const playerDiv = document.getElementById('player');
            const toast = document.getElementById('toast');
            const shareBtn = document.getElementById('shareBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            searchBtn.addEventListener('click', () => performSearch());
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            shareBtn.addEventListener('click', shareVideo);
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            function performSearch() {
                currentQuery = searchInput.value;
                nextPageToken = null;
                prevPageToken = null;
                searchYouTube(currentQuery);
            }

            async function searchYouTube(query, pageToken = null) {
                const trimmedQuery = query.trim();
                if (!trimmedQuery) {
                    showToast('⚠️ Digite uma música para buscar');
                    return;
                }

                showLoading(true);
                paginationContainer.style.display = 'none';
                resultCount.textContent = '';

                try {
                    const proxyRequestUrl = new URL(PROXY_URL + '/search');
                    proxyRequestUrl.searchParams.append('q', trimmedQuery + ' música');
                    proxyRequestUrl.searchParams.append('maxResults', '15');
                    proxyRequestUrl.searchParams.append('regionCode', 'BR');
                    proxyRequestUrl.searchParams.append('relevanceLanguage', 'pt');
                    
                    if (pageToken) {
                        proxyRequestUrl.searchParams.append('pageToken', pageToken);
                    }

                    const response = await fetch(proxyRequestUrl);

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.message || errorData.error || 'Erro na requisição');
                    }

                    const data = await response.json();
                    nextPageToken = data.nextPageToken || null;
                    prevPageToken = data.prevPageToken || null;

                    displayResults(data.videos || [], data.totalResults || 0);
                    updatePagination();

                } catch (error) {
                    console.error('Erro:', error);
                    
                    if (error instanceof TypeError && error.message === 'Failed to fetch') {
                        showToast('⚠️ Erro de conexão. Verifique sua internet.');
                    } else {
                        showToast('⚠️ ' + error.message);
                    }
                    
                    resultsContainer.innerHTML = `
                        <div style="text-align:center;padding:40px 20px;color:#aaa;">
                            <div style="font-size:48px;margin-bottom:12px;">😢</div>
                            <div style="font-size:16px;margin-bottom:8px;">Erro ao buscar "${escapeHtml(trimmedQuery)}"</div>
                            <div style="font-size:12px;color:#ff4444;">${escapeHtml(error.message)}</div>
                        </div>
                    `;
                }

                showLoading(false);
            }

            function displayResults(videos, totalResults) {
                resultCount.textContent = totalResults ? `${totalResults.toLocaleString()} resultados` : '';

                if (!videos || videos.length === 0) {
                    resultsContainer.innerHTML = `
                        <div style="text-align:center;padding:40px 20px;color:#aaa;">
                            <div style="font-size:48px;margin-bottom:12px;">😢</div>
                            <div style="font-size:16px;margin-bottom:8px;">Nenhum resultado encontrado</div>
                            <div style="font-size:12px;color:#717171;">Tente outros termos de busca</div>
                        </div>
                    `;
                    return;
                }

                resultsContainer.innerHTML = `
                    <div class="video-grid">
                        ${videos.map(video => `
                            <div class="video-card" onclick="playVideoById('${video.id}', '${escapeHtml(video.title)}', '${escapeHtml(video.channel)}')" title="${escapeHtml(video.title)}">
                                <img class="video-thumb" src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy" onerror="this.style.opacity='0.3'">
                                <div class="video-info">
                                    <div class="video-card-title">${escapeHtml(video.title)}</div>
                                    <div class="video-card-channel">${escapeHtml(video.channel)}</div>
                                    <div class="video-card-meta">⏱ ${formatDuration(video.duration)} • 👁 ${formatViews(video.viewCount)} • ${formatDate(video.publishedAt)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                document.querySelector('.results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function updatePagination() {
                if (!nextPageToken && !prevPageToken) {
                    paginationContainer.style.display = 'none';
                    return;
                }
                paginationContainer.style.display = 'flex';
                paginationContainer.innerHTML = `
                    <button onclick="searchPage('prev')" ${!prevPageToken ? 'disabled' : ''}>⬅ Anterior</button>
                    <span class="page-info">Página</span>
                    <button onclick="searchPage('next')" ${!nextPageToken ? 'disabled' : ''}>Próximo ➡</button>
                `;
            }

            window.searchPage = function(direction) {
                const token = direction === 'next' ? nextPageToken : prevPageToken;
                if (token && currentQuery) {
                    searchYouTube(currentQuery, token);
                    document.querySelector('.results-section').scrollIntoView({ behavior: 'smooth' });
                }
            };

            window.playVideoById = function(videoId, title, channel) {
                currentVideoId = videoId;
                currentVideoTitle = title;
                
                if (ytPlayer) ytPlayer.destroy();

                ytPlayer = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1, playsinline: 1,
                        rel: 0, modestbranding: 1,
                        controls: 1, fs: 1,
                        iv_load_policy: 3
                    },
                    events: {
                        onReady: () => {
                            showToast(`▶ ${title}`);
                            document.title = `${title} - Play Tube`;
                        },
                        onError: () => fallbackPlayer(videoId)
                    }
                });

                if (isMiniPlayer) toggleMiniPlayer();
                document.querySelector('.player-container').scrollIntoView({ behavior: 'smooth' });
            };

            function fallbackPlayer(videoId) {
                playerDiv.innerHTML = `
                    <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0&modestbranding=1"
                        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
                        allowfullscreen style="width:100%;height:100%;border:none;">
                    </iframe>
                `;
            }

            window.togglePiP = async function() {
                const iframe = document.querySelector('#player iframe');
                if (!iframe && !ytPlayer) {
                    showToast('⚠️ Selecione uma música primeiro');
                    return;
                }
                try {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                        showToast('📺 PiP desativado');
                    } else {
                        const videoElement = iframe || document.querySelector('#player iframe');
                        if (videoElement) {
                            await videoElement.requestPictureInPicture();
                            showToast('📺 PiP ativado');
                        }
                    }
                } catch (error) {
                    showToast('📺 Clique com botão direito no vídeo > Picture in picture');
                }
            };

            window.downloadVideo = function() {
                if (!currentVideoId) {
                    showToast('⚠️ Selecione uma música primeiro');
                    return;
                }
                window.open(`https://yt5s.com/en?url=https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
                showToast('⬇ Abrindo download...');
            };

            window.toggleMiniPlayer = function() {
                isMiniPlayer = !isMiniPlayer;
                if (isMiniPlayer) {
                    playerWrapper.classList.add('mini');
                    setupDrag(playerWrapper);
                    showToast('📺 Player suspenso');
                } else {
                    playerWrapper.classList.remove('mini');
                    resetPosition(playerWrapper);
                    removeDrag(playerWrapper);
                    showToast('📺 Player maximizado');
                }
            };

            function setupDrag(element) {
                let posX = 0, posY = 0, initialX = 0, initialY = 0;

                const onMouseDown = (e) => {
                    if (e.target.closest('button') || e.target.closest('iframe')) return;
                    e.preventDefault();
                    initialX = e.clientX; initialY = e.clientY;
                    posX = element.offsetLeft; posY = element.offsetTop;
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                };
                const onMouseMove = (e) => {
                    e.preventDefault();
                    element.style.left = (posX + (e.clientX - initialX)) + 'px';
                    element.style.top = (posY + (e.clientY - initialY)) + 'px';
                    element.style.right = 'auto'; element.style.bottom = 'auto';
                };
                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                const onTouchStart = (e) => {
                    if (e.target.closest('button') || e.target.closest('iframe')) return;
                    e.preventDefault();
                    initialX = e.touches[0].clientX; initialY = e.touches[0].clientY;
                    posX = element.offsetLeft; posY = element.offsetTop;
                    document.addEventListener('touchmove', onTouchMove, { passive: false });
                    document.addEventListener('touchend', onTouchEnd);
                };
                const onTouchMove = (e) => {
                    e.preventDefault();
                    element.style.left = (posX + (e.touches[0].clientX - initialX)) + 'px';
                    element.style.top = (posY + (e.touches[0].clientY - initialY)) + 'px';
                    element.style.right = 'auto'; element.style.bottom = 'auto';
                };
                const onTouchEnd = () => {
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                };

                element.addEventListener('mousedown', onMouseDown);
                element.addEventListener('touchstart', onTouchStart, { passive: false });
                element._dragHandlers = { onMouseDown, onTouchStart };
            }

            function removeDrag(element) {
                if (element._dragHandlers) {
                    element.removeEventListener('mousedown', element._dragHandlers.onMouseDown);
                    element.removeEventListener('touchstart', element._dragHandlers.onTouchStart);
                    delete element._dragHandlers;
                }
            }

            function resetPosition(element) {
                element.style.position = '';
                element.style.bottom = '';
                element.style.right = '';
                element.style.top = '';
                element.style.left = '';
            }

            function shareVideo() {
                if (!currentVideoId) {
                    showToast('⚠️ Selecione uma música para compartilhar');
                    return;
                }
                const shareUrl = `https://youtu.be/${currentVideoId}`;
                if (navigator.share) {
                    navigator.share({ title: currentVideoTitle, text: `🎵 ${currentVideoTitle}`, url: shareUrl })
                        .catch(() => copyToClipboard(shareUrl));
                } else {
                    copyToClipboard(shareUrl);
                }
            }

            function copyToClipboard(text) {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(() => showToast('🔗 Link copiado!'))
                        .catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('🔗 Link copiado!');
            }

            function toggleFullscreen() {
                if (!currentVideoId) {
                    showToast('⚠️ Selecione uma música primeiro');
                    return;
                }
                const playerContainer = document.querySelector('.player-container');
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else if (playerContainer.requestFullscreen) {
                    playerContainer.requestFullscreen();
                }
            }

            function formatDuration(isoDuration) {
                if (!isoDuration) return '--:--';
                const match = isoDuration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
                if (!match) return '--:--';
                const hours = (match[1] || '').replace('H', '');
                const minutes = (match[2] || '').replace('M', '');
                const seconds = (match[3] || '').replace('S', '');
                let result = '';
                if (hours) result += hours + ':';
                result += (minutes ? minutes.padStart(2, '0') : '00') + ':';
                result += (seconds ? seconds.padStart(2, '0') : '00');
                return result;
            }

            function formatDate(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                const now = new Date();
                const diff = now - date;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                if (days === 0) return 'Hoje';
                if (days === 1) return 'Ontem';
                if (days < 7) return `${days} dias atrás`;
                if (days < 30) return `${Math.floor(days / 7)} semanas atrás`;
                if (days < 365) return `${Math.floor(days / 30)} meses atrás`;
                return `${Math.floor(days / 365)} anos atrás`;
            }

            function formatViews(views) {
                const num = parseInt(views);
                if (isNaN(num)) return '0';
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function showLoading(show) {
                if (show) {
                    resultsContainer.innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Buscando no YouTube...</div>
                        </div>
                    `;
                }
            }

            function showToast(message) {
                if (toastTimeout) clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            console.log('🔒 Play Tube Music - Modo Seguro');
            console.log('🌐 Worker: ' + PROXY_URL);
            console.log('✅ API Key protegida!');
        })();
    </script>
