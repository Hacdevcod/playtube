<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    
    <title>Play Tube Music</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 80px;
            --safe-b: 0px;
        }
        
        [data-theme="light"] {
            --bg: #fff; --surface: #f5f5f5; --surface2: #e8e8e8; --border: #ddd;
            --text: #000; --text2: #555; --text3: #888; --input-bg: #fff; --input-text: #000; --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000; --surface: #0a0a0a; --surface2: #111; --border: #1a1a1a;
            --text: #fff; --text2: #aaa; --text3: #717171; --input-bg: #0a0a0a; --input-text: #fff; --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden; transition: background 0.3s, color 0.3s;
            padding-bottom: calc(var(--player-h) + var(--safe-b) + 15px);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .hidden-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.99; }

        .topbar {
            position: sticky; top: 0; background: var(--bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            height: 50px; display: flex; align-items: center; padding: 0 12px; gap: 10px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon { width: 28px; height: 28px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; }
        .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; }

        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; }
        .search-box { display: flex; background: var(--input-bg); border: 2px solid var(--border); border-radius: 20px; overflow: hidden; }
        .search-box:focus-within { border-color: var(--red); }
        .search-box input { flex: 1; padding: 10px 14px; background: transparent; border: none; color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0; }
        .search-box input::placeholder { color: var(--input-ph); }
        .search-btn { width: 42px; background: var(--surface2); border: none; color: var(--text); cursor: pointer; font-size: 1rem; }

        .tabs-container { display: flex; gap: 4px; padding: 4px 12px 8px; background: var(--bg); overflow-x: auto; }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn { padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: var(--text2); text-transform: uppercase; }
        .video-card { display: flex; gap: 10px; background: var(--surface); border-radius: 8px; padding: 8px; cursor: pointer; margin-bottom: 6px; position: relative; border: 2px solid transparent; }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn { width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }

        .spotify-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            display: none; align-items: center; padding: 0 12px; gap: 10px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; }
        .sp-title { font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.7rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; }
        .sp-controls { display: flex; gap: 12px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 1rem; cursor: pointer; padding: 6px; }
        .sp-btn:active { transform: scale(0.85); }
        .sp-btn.play { width: 44px; height: 44px; background: #fff; border-radius: 50%; color: #000; font-size: 1rem; }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-dl { background: rgba(29,185,84,0.15); border: none; color: var(--green); font-size: 0.75rem; cursor: pointer; padding: 6px 10px; border-radius: 15px; }

        .toast { position: fixed; bottom: calc(var(--player-h) + 20px); left: 50%; transform: translateX(-50%) translateY(120px); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; z-index: 600; transition: transform 0.3s; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }

        @media (max-width: 360px) { .sp-art { width: 42px; height: 42px; } .sp-btn.play { width: 38px; height: 38px; } }
        @media (min-width: 768px) { body { max-width: 550px; margin: 0 auto; } }
        @media (orientation: landscape) and (max-height: 500px) { :root { --player-h: 60px; } .sp-art { width: 38px; height: 38px; } }
    </style>
</head>
<body data-theme="dark">

    <!-- PLAYER OCULTO (PRECISA SER VISÍVEL PARA O YOUTUBE) -->
    <div class="hidden-player" id="hiddenPlayer"></div>

    <div class="topbar">
        <div class="logo"><div class="logo-icon">♪</div><span class="logo-text">Play Tube<sup>MUSIC</sup></span></div>
        <div class="spacer"></div>
        <button class="theme-btn" onclick="T.cycle()">🎨</button>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🎵 Buscar música..." autocomplete="off">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('search')">🔍 Buscar</button>
        <button class="tab-btn" onclick="switchTab('favorites')">❤️ Favoritos</button>
        <button class="tab-btn" onclick="switchTab('history')">🕐 Histórico</button>
    </div>

    <div class="results-section">
        <div class="section-title" id="sectionTitle">Resultados</div>
        <div id="resultsContainer">
            <div style="text-align:center;padding:50px;color:var(--text2);">
                <div style="font-size:3rem;">🎧</div>
                <div style="font-size:1.1rem;color:var(--text);">Busque uma música</div>
            </div>
        </div>
    </div>

    <!-- BARRA SPOTIFY -->
    <div class="spotify-bar" id="spotifyBar">
        <div class="sp-progress" id="progressContainer" onclick="seekTrack(event)">
            <div class="sp-progress-bar" id="progressBar"></div>
        </div>
        <img class="sp-art" id="spArt" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23333'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%23fff' font-size='40'%3E♪%3C/text%3E%3C/svg%3E" alt="" onclick="togglePlay()">
        <div class="sp-info">
            <div class="sp-title" id="spTitle">Nenhuma música</div>
            <div class="sp-artist" id="spArtist">Toque para tocar</div>
        </div>
        <div class="sp-controls">
            <button class="sp-btn" onclick="prevTrack()">⏮</button>
            <button class="sp-btn play" id="spPlay" onclick="togglePlay()">▶</button>
            <button class="sp-btn" onclick="nextTrack()">⏭</button>
        </div>
        <button class="sp-dl" onclick="downloadCurrent()">⬇</button>
    </div>

    <div class="toast" id="toast"></div>

    <!-- YOUTUBE API (DEVE SER CARREGADA PRIMEIRO) -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
    // ===== CÓDIGO PRINCIPAL =====
    console.log('🚀 Play Tube Music - Iniciando...');

    // Variáveis globais
    let player = null;
    let playlist = [];
    let currentIndex = -1;
    let isPlaying = false;
    let currentVideoId = null;
    let toastTimeout = null;
    let progressInterval = null;
    let currentQuery = '';

    const PROXY_URL = 'https://playtube-proxy.codw23.workers.dev';

    // DOM Elements
    const $ = (id) => document.getElementById(id);
    const searchInput = $('searchInput');
    const searchBtn = $('searchBtn');
    const resultsContainer = $('resultsContainer');
    const toast = $('toast');
    const spotifyBar = $('spotifyBar');
    const spArt = $('spArt');
    const spTitle = $('spTitle');
    const spArtist = $('spArtist');
    const spPlay = $('spPlay');
    const progressBar = $('progressBar');
    const progressContainer = $('progressContainer');

    // ===== TEMA =====
    const T = {
        themes: ['dark', 'light', 'amoled'],
        current: 'dark',
        apply() {
            document.body.setAttribute('data-theme', this.current);
            localStorage.setItem('theme', this.current);
        },
        cycle() {
            const i = this.themes.indexOf(this.current);
            this.current = this.themes[(i + 1) % this.themes.length];
            this.apply();
            showToast('🎨 Tema: ' + this.current);
        }
    };
    T.apply();

    // ===== FAVORITOS =====
    const Fav = {
        favs: JSON.parse(localStorage.getItem('favs') || '[]'),
        hist: JSON.parse(localStorage.getItem('hist') || '[]'),
        toggle(tr) {
            const i = this.favs.findIndex(f => f.id === tr.id);
            if (i > -1) { this.favs.splice(i, 1); showToast('💔 Removido'); }
            else { this.favs.unshift(tr); showToast('❤️ Favoritado'); }
            localStorage.setItem('favs', JSON.stringify(this.favs));
            return i === -1;
        },
        is(id) { return this.favs.some(f => f.id === id); },
        addHist(tr) {
            this.hist = this.hist.filter(h => h.id !== tr.id);
            this.hist.unshift({...tr, at: new Date().toISOString()});
            if (this.hist.length > 50) this.hist.pop();
            localStorage.setItem('hist', JSON.stringify(this.hist));
        }
    };

    // ===== YOUTUBE API - FUNÇÃO PRINCIPAL =====
    function onYouTubeIframeAPIReady() {
        console.log('✅ YouTube API Ready');
        createPlayer();
    }

    function createPlayer() {
        if (player) {
            player.destroy();
        }
        
        try {
            player = new YT.Player('hiddenPlayer', {
                height: '360',
                width: '640',
                videoId: '',
                host: 'https://www.youtube-nocookie.com',
                playerVars: {
                    autoplay: 0,
                    playsinline: 1,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    rel: 0,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    origin: window.location.origin,
                    enablejsapi: 1,
                    mute: 0,
                    volume: 100
                },
                events: {
                    onReady: function(event) {
                        console.log('✅ Player pronto!');
                        event.target.setVolume(100);
                        event.target.unMute();
                    },
                    onStateChange: onPlayerStateChange,
                    onError: function(event) {
                        console.error('❌ Erro no player:', event.data);
                        showToast('❌ Erro ao carregar vídeo');
                    }
                }
            });
            
            console.log('✅ Player criado com sucesso');
        } catch(e) {
            console.error('❌ Falha ao criar player:', e);
        }
    }

    function onPlayerStateChange(event) {
        console.log('🔄 Estado do player:', event.data);
        
        if (event.data === YT.PlayerState.PLAYING) {
            console.log('▶ Tocando!');
            isPlaying = true;
            spPlay.textContent = '⏸';
            spPlay.classList.add('playing');
            spotifyBar.classList.add('playing');
            spArt.classList.add('playing');
            startProgress();
        } 
        else if (event.data === YT.PlayerState.PAUSED) {
            console.log('⏸ Pausado');
            isPlaying = false;
            spPlay.textContent = '▶';
            spPlay.classList.remove('playing');
            spotifyBar.classList.remove('playing');
            spArt.classList.remove('playing');
            stopProgress();
        } 
        else if (event.data === YT.PlayerState.ENDED) {
            console.log('⏹ Finalizado');
            stopProgress();
            progressBar.style.width = '0%';
            nextTrack();
        }
        else if (event.data === YT.PlayerState.BUFFERING) {
            console.log('🔄 Bufferizando...');
        }
    }

    // ===== PROGRESSO =====
    function startProgress() {
        stopProgress();
        progressInterval = setInterval(function() {
            if (!player || !isPlaying) return;
            try {
                const duration = player.getDuration();
                const currentTime = player.getCurrentTime();
                if (duration > 0) {
                    const percent = (currentTime / duration) * 100;
                    progressBar.style.width = percent + '%';
                }
            } catch(e) {}
        }, 1000);
    }

    function stopProgress() {
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
    }

    // ===== CONTROLES =====
    function playTrack(index) {
        console.log('🎵 playTrack chamado, index:', index, 'playlist length:', playlist.length);
        
        if (index >= 0 && index < playlist.length) {
            currentIndex = index;
        }
        
        if (currentIndex < 0 || currentIndex >= playlist.length) {
            console.warn('⚠️ Índice inválido');
            return;
        }
        
        const track = playlist[currentIndex];
        console.log('🎵 Tocando:', track.title, 'ID:', track.id);
        
        currentVideoId = track.id;
        progressBar.style.width = '0%';
        
        // Atualizar UI
        spTitle.textContent = track.title || 'Sem título';
        spArtist.textContent = track.channel || 'Desconhecido';
        spArt.src = track.thumbnail || '';
        document.title = '▶ ' + (track.title || 'Play Tube Music');
        spotifyBar.classList.add('active');
        
        // Tocar no YouTube
        if (player && player.loadVideoById) {
            console.log('✅ Carregando vídeo:', track.id);
            player.loadVideoById({
                videoId: track.id,
                startSeconds: 0
            });
            
            // Pequeno delay para garantir carregamento
            setTimeout(function() {
                if (player && player.playVideo) {
                    console.log('▶ Iniciando reprodução');
                    player.playVideo();
                    player.unMute();
                    player.setVolume(100);
                }
            }, 500);
        } else {
            console.error('❌ Player não está pronto!');
            showToast('❌ Player não carregado');
            
            // Tentar recriar o player
            if (typeof YT !== 'undefined' && YT.Player) {
                console.log('🔄 Tentando recriar player...');
                createPlayer();
                setTimeout(function() {
                    if (player && player.loadVideoById) {
                        player.loadVideoById({ videoId: track.id, startSeconds: 0 });
                        setTimeout(function() {
                            player.playVideo();
                            player.unMute();
                        }, 500);
                    }
                }, 1000);
            }
        }
        
        // Adicionar ao histórico
        Fav.addHist(track);
    }

    window.togglePlay = function() {
        console.log('🎮 togglePlay chamado, player existe?', !!player, 'isPlaying?', isPlaying);
        
        if (!player) {
            console.error('❌ Player não existe!');
            showToast('❌ Player não carregado');
            return;
        }
        
        if (isPlaying) {
            console.log('⏸ Pausando');
            player.pauseVideo();
        } else if (currentVideoId) {
            console.log('▶ Retomando');
            player.playVideo();
            player.unMute();
            player.setVolume(100);
        } else if (playlist.length > 0) {
            console.log('▶ Iniciando playlist');
            playTrack(0);
        } else {
            showToast('⚠️ Busque uma música primeiro');
        }
    };

    window.nextTrack = function() {
        if (playlist.length === 0) return;
        progressBar.style.width = '0%';
        const next = (currentIndex + 1) % playlist.length;
        playTrack(next);
        showToast('⏭ Próxima');
    };

    window.prevTrack = function() {
        if (playlist.length === 0) return;
        progressBar.style.width = '0%';
        const prev = (currentIndex - 1 + playlist.length) % playlist.length;
        playTrack(prev);
        showToast('⏮ Anterior');
    };

    window.seekTrack = function(event) {
        if (!player || !currentVideoId) return;
        const rect = progressContainer.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        const duration = player.getDuration();
        if (duration > 0) {
            player.seekTo(percent * duration, true);
        }
    };

    window.downloadCurrent = function() {
        if (!currentVideoId || currentIndex < 0) {
            showToast('⚠️ Nenhuma música');
            return;
        }
        showToast('⬇️ Download simulado');
    };

    // ===== RESULTADOS =====
    window.playFromResults = function(videoId, title, channel, thumbnail) {
        console.log('🎵 playFromResults:', title, videoId);
        
        const video = {
            id: videoId,
            title: title,
            channel: channel,
            thumbnail: thumbnail
        };
        
        // Adicionar à playlist
        const exists = playlist.findIndex(function(t) { return t.id === videoId; });
        if (exists === -1) {
            playlist.push(video);
            currentIndex = playlist.length - 1;
        } else {
            currentIndex = exists;
        }
        
        console.log('📋 Playlist agora tem', playlist.length, 'músicas');
        playTrack(currentIndex);
        showToast('▶ ' + title.substring(0, 30));
    };

    window.toggleFav = function(videoId, title, channel, thumbnail, event) {
        event.stopPropagation();
        const track = { id: videoId, title: title, channel: channel, thumbnail: thumbnail };
        Fav.toggle(track);
        updateFavButtons();
    };

    function updateFavButtons() {
        document.querySelectorAll('.v-btn.fav').forEach(function(btn) {
            const fid = btn.getAttribute('data-id');
            const isFav = Fav.is(fid);
            btn.classList.toggle('fav-active', isFav);
            btn.textContent = isFav ? '❤️' : '🤍';
        });
    }

    function createCard(v) {
        const isFav = Fav.is(v.id);
        return '<div class="video-card" onclick="playFromResults(\'' + v.id + '\',\'' + esc(v.title) + '\',\'' + esc(v.channel) + '\',\'' + (v.thumbnail || '') + '\')">' +
            '<img class="video-thumb" src="' + (v.thumbnail || '') + '" loading="lazy" onerror="this.style.opacity=\'0.3\'">' +
            '<div class="video-info">' +
                '<div class="video-title">' + esc(v.title) + '</div>' +
                '<div class="video-channel">' + esc(v.channel) + '</div>' +
            '</div>' +
            '<div class="video-actions">' +
                '<button class="v-btn fav' + (isFav ? ' fav-active' : '') + '" data-id="' + v.id + '" onclick="toggleFav(\'' + v.id + '\',\'' + esc(v.title) + '\',\'' + esc(v.channel) + '\',\'' + (v.thumbnail || '') + '\',event)">' + (isFav ? '❤️' : '🤍') + '</button>' +
            '</div>' +
        '</div>';
    }

    // ===== TABS =====
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        var buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(function(b) {
            if (b.textContent.toLowerCase().indexOf(tab === 'search' ? 'buscar' : tab === 'favorites' ? 'favoritos' : 'histórico') > -1) {
                b.classList.add('active');
            }
        });
        
        if (tab === 'search') {
            document.getElementById('sectionTitle').textContent = 'Resultados';
            if (currentQuery) searchYouTube(currentQuery);
        } else if (tab === 'favorites') {
            document.getElementById('sectionTitle').textContent = '❤️ Favoritos';
            var favs = Fav.favs;
            resultsContainer.innerHTML = favs.length === 0 ? 
                '<div style="text-align:center;padding:40px;color:var(--text2);">❤️ Nenhum favorito</div>' :
                favs.map(function(v) { return createCard(v); }).join('');
            updateFavButtons();
        } else if (tab === 'history') {
            document.getElementById('sectionTitle').textContent = '🕐 Histórico';
            var hist = Fav.hist;
            resultsContainer.innerHTML = hist.length === 0 ?
                '<div style="text-align:center;padding:40px;color:var(--text2);">🕐 Nenhum histórico</div>' :
                hist.map(function(v) { return createCard(v); }).join('');
            updateFavButtons();
        }
    };

    // ===== BUSCA =====
    searchBtn.addEventListener('click', function() {
        currentQuery = searchInput.value;
        searchYouTube(currentQuery);
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            currentQuery = searchInput.value;
            searchYouTube(currentQuery);
        }
    });

    async function searchYouTube(query) {
        var q = query.trim();
        if (!q) { showToast('⚠️ Digite algo'); return; }
        
        console.log('🔍 Buscando:', q);
        resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>';
        
        try {
            var proxyUrl = new URL(PROXY_URL);
            proxyUrl.searchParams.append('q', q + ' música oficial');
            proxyUrl.searchParams.append('maxResults', '10');
            proxyUrl.searchParams.append('regionCode', 'BR');
            proxyUrl.searchParams.append('relevanceLanguage', 'pt');
            
            console.log('📡 URL:', proxyUrl.toString());
            
            var response = await fetch(proxyUrl);
            console.log('📡 Response status:', response.status);
            
            if (!response.ok) throw new Error('Erro HTTP: ' + response.status);
            
            var data = await response.json();
            console.log('✅ Dados recebidos:', data.videos ? data.videos.length : 0, 'vídeos');
            
            if (data.videos && data.videos.length > 0) {
                resultsContainer.innerHTML = data.videos.map(function(v) {
                    return createCard(v);
                }).join('');
                updateFavButtons();
            } else {
                resultsContainer.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado</div>';
            }
        } catch(e) {
            console.error('❌ Erro na busca:', e);
            resultsContainer.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Erro na busca: ' + e.message + '</div>';
            showToast('⚠️ Erro na busca');
        }
    }

    // ===== UTILS =====
    function esc(text) {
        if (!text) return '';
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message) {
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.textContent = message;
        toast.classList.add('show');
        toastTimeout = setTimeout(function() {
            toast.classList.remove('show');
        }, 2500);
    }

    // ===== BACKGROUND PLAY =====
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && isPlaying && player) {
            try {
                if (player.getPlayerState() !== 1) {
                    player.playVideo();
                    player.unMute();
                }
            } catch(e) {}
        }
    });

    // Keep-alive
    setInterval(function() {
        if (isPlaying && player) {
            try {
                var state = player.getPlayerState();
                if (state !== 1 && state !== 3) {
                    player.playVideo();
                    player.unMute();
                }
            } catch(e) {
                console.log('🔄 Reconectando player...');
                createPlayer();
                if (currentVideoId) {
                    setTimeout(function() {
                        if (player && player.loadVideoById) {
                            player.loadVideoById({ videoId: currentVideoId, startSeconds: 0 });
                            setTimeout(function() {
                                player.playVideo();
                                player.unMute();
                            }, 500);
                        }
                    }, 1000);
                }
            }
        }
    }, 1000);

    // ===== MEDIA SESSION =====
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', togglePlay);
        navigator.mediaSession.setActionHandler('pause', togglePlay);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
    }

    // ===== INIT =====
    function init() {
        console.log('🎧 Play Tube Music inicializado');
        console.log('⏳ Aguardando YouTube API...');
        
        // Fallback: se a API não carregar em 5 segundos
        setTimeout(function() {
            if (!player) {
                console.warn('⚠️ API não carregou, tentando manualmente...');
                if (typeof YT !== 'undefined' && YT.Player) {
                    onYouTubeIframeAPIReady();
                }
            }
        }, 5000);
    }

    // Expor funções globalmente
    window.togglePlay = togglePlay;
    window.nextTrack = nextTrack;
    window.prevTrack = prevTrack;
    window.playFromResults = playFromResults;
    window.toggleFav = toggleFav;
    window.seekTrack = seekTrack;
    window.downloadCurrent = downloadCurrent;
    window.switchTab = switchTab;
    window.T = T;

    // Iniciar quando carregar
    window.addEventListener('load', init);

    console.log('📜 Script carregado com sucesso');
    </script>
</body>
</html>
