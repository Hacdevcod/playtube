<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='96' fill='%23ff0000'/><polygon points='80,60 80,132 140,96' fill='white'/></svg>">
    
    <title>Play Tube Music</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 80px;
            --safe-b: 0px;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-bottom: calc(var(--player-h) + var(--safe-b) + 15px);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky; top: 0; background: var(--bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            height: 50px; display: flex; align-items: center; padding: 0 12px; gap: 10px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 1rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; }

        /* ===== SEARCH ===== */
        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); opacity: 1; }
        .search-btn {
            width: 42px; background: var(--surface2); border: none; color: var(--text);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .search-btn:active { background: var(--red); color: #fff; }

        /* ===== TABS ===== */
        .tabs-container { display: flex; gap: 4px; padding: 4px 12px 8px; background: var(--bg); overflow-x: auto; }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* ===== RESULTS ===== */
        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title {
            font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 10px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }
        .v-btn.dl:active { background: var(--green); }

        /* ===== SPOTIFY BAR ===== */
        .spotify-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; padding: 0 12px; gap: 10px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art {
            width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; cursor: pointer; transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; box-shadow: 0 0 15px rgba(29,185,84,0.3); }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .sp-title { font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.7rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; animation: progressGlow 2s ease-in-out infinite; }
        .sp-controls { display: flex; gap: 12px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 1rem; cursor: pointer; padding: 6px; transition: all 0.2s; }
        .sp-btn:active { transform: scale(0.85); color: #fff; }
        .sp-btn.play {
            width: 44px; height: 44px; background: #fff; border-radius: 50%;
            color: #000; font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-dl {
            background: rgba(29,185,84,0.15); border: none; color: var(--green);
            font-size: 0.75rem; cursor: pointer; padding: 6px 10px; border-radius: 15px;
            transition: all 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .sp-dl:active { background: rgba(29,185,84,0.3); transform: scale(0.95); }
        .sp-dl.downloading { animation: downloading 0.8s infinite; background: rgba(29,185,84,0.3); }

        /* ===== TOAST & LOADING ===== */
        .toast {
            position: fixed; bottom: calc(var(--player-h) + 20px); left: 50%;
            transform: translateX(-50%) translateY(120px); background: #333;
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem;
            z-index: 600; transition: transform 0.3s; white-space: nowrap;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--red); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        .dl-progress {
            position: fixed; bottom: calc(var(--player-h) + 10px); left: 12px; right: 12px;
            background: var(--surface); border-radius: 10px; padding: 10px;
            z-index: 300; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dl-progress.active { display: block; }
        .dl-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .dl-fill { height: 100%; background: linear-gradient(90deg, #1db954, #00e676); width: 0%; transition: width 0.3s; }

        /* ===== PLAYER VIDEO ===== */
        .player-container {
            width: 100%; background: #000; display: none; position: relative;
            animation: slideUp 0.4s ease; border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-container.rainbow-border { animation: rainbow 3s linear infinite; border-width: 2px; border-style: solid; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
            border-radius: 50%; background: rgba(0,0,0,0.7); border: none;
            color: #fff; font-size: 16px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 360px) { .sp-art { width: 42px; height: 42px; } .sp-btn.play { width: 38px; height: 38px; } .video-thumb { width: 40px; height: 40px; } }
        @media (min-width: 768px) { body { max-width: 550px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); } }
        @media (orientation: landscape) and (max-height: 500px) {
            :root { --player-h: 60px; }
            .sp-art { width: 38px; height: 38px; }
            .results-section { max-height: 35vh; overflow-y: auto; }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">♪</div>
            <span class="logo-text">Play Tube<sup>MUSIC</sup></span>
        </div>
        <div class="spacer"></div>
        <button class="theme-btn" onclick="calibrarTela();T.cycle()" title="Tema">🎨</button>
    </div>

    <!-- PLAYER VIDEO -->
    <div class="player-container" id="playerContainer">
        <div class="player-wrapper" id="playerWrapper"></div>
        <button class="player-close" onclick="closeVideo()">✕</button>
    </div>

    <!-- BUSCA -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🎵 Buscar música..." autocomplete="off" enterkeyhint="search">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('search')">🔍 Buscar</button>
        <button class="tab-btn" onclick="switchTab('favorites')">❤️ Favoritos</button>
        <button class="tab-btn" onclick="switchTab('history')">🕐 Histórico</button>
        <button class="tab-btn" onclick="switchTab('downloads')">⬇️ Downloads</button>
    </div>

    <!-- RESULTADOS -->
    <div class="results-section">
        <div class="section-title" id="sectionTitle"><span>Resultados</span><span class="result-count" id="resultCount"></span></div>
        <div id="resultsContainer">
            <div style="text-align:center;padding:50px;color:var(--text2);">
                <div style="font-size:3rem;">🎧</div>
                <div style="font-size:1.1rem;color:var(--text);">Play Tube Music</div>
            </div>
        </div>
    </div>

    <!-- BARRA SPOTIFY -->
    <div class="spotify-bar" id="spotifyBar">
        <div class="sp-progress" id="progressContainer" onclick="seekTrack(event)">
            <div class="sp-progress-bar" id="progressBar"></div>
        </div>
        <img class="sp-art" id="spArt" src="" alt="" onclick="showVideo()">
        <div class="sp-info" onclick="showVideo()">
            <div class="sp-title" id="spTitle">Nenhuma música</div>
            <div class="sp-artist" id="spArtist">Toque para tocar</div>
        </div>
        <div class="sp-controls">
            <button class="sp-btn" onclick="prevTrack()">⏮</button>
            <button class="sp-btn play" id="spPlay" onclick="togglePlay()">▶</button>
            <button class="sp-btn" onclick="nextTrack()">⏭</button>
        </div>
        <button class="sp-dl" id="spDL" onclick="downloadCurrent()" title="Download">⬇</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- DOWNLOAD PROGRESS -->
    <div class="dl-progress" id="dlProgress">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="color:var(--text);font-size:0.75rem;">⬇️ Baixando...</span>
            <span style="color:var(--text2);font-size:0.7rem;" id="dlPercent">0%</span>
        </div>
        <div class="dl-bar"><div class="dl-fill" id="dlFill"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
    (function() {
        'use strict';
        const PROXY = 'https://playtube-proxy.codw23.workers.dev';

        // ===== ELEMENTO DE ÁUDIO NATIVO =====
        let audioElement = null;
        
        function createAudioElement() {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
                audioElement.remove();
            }
            
            audioElement = new Audio();
            audioElement.setAttribute('playsinline', '');
            audioElement.setAttribute('webkit-playsinline', '');
            audioElement.preload = 'auto';
            
            audioElement.addEventListener('play', () => {
                playing = true;
                updateUI(true);
                startProg();
                document.body.classList.add('audio-playing');
            });
            
            audioElement.addEventListener('pause', () => {
                playing = false;
                updateUI(false);
                stopProg();
                document.body.classList.remove('audio-playing');
            });
            
            audioElement.addEventListener('ended', () => {
                stopProg();
                progBar.style.width = '0%';
                nextTrack();
            });
            
            audioElement.addEventListener('timeupdate', () => {
                if (audioElement.duration > 0) {
                    const progress = (audioElement.currentTime / audioElement.duration) * 100;
                    progBar.style.width = progress + '%';
                }
            });
            
            audioElement.addEventListener('loadedmetadata', () => {
                if ('mediaSession' in navigator && idx >= 0 && idx < playlist.length) {
                    const t = playlist[idx];
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: t.title || 'Sem título',
                        artist: t.channel || 'Desconhecido',
                        artwork: [{ src: t.thumbnail || '', sizes: '96x96', type: 'image/jpg' }]
                    });
                }
            });
            
            audioElement.addEventListener('error', (e) => {
                console.error('Erro no áudio:', e);
                toast('⚠️ Erro ao carregar áudio');
                // Tentar próximo serviço
                if (vid && currentServiceIndex < audioServices.length - 1) {
                    currentServiceIndex++;
                    playTrack(idx);
                } else {
                    toast('❌ Falha ao reproduzir');
                }
            });
            
            document.body.appendChild(audioElement);
        }

        // ===== SERVIÇOS DE ÁUDIO =====
        const audioServices = [
            // Serviço 1: Vevioz (gratuito, sem API key)
            async (videoId) => {
                const url = `https://api.vevioz.com/@api/button/mp3/${videoId}`;
                const response = await fetch(url, { 
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error('Serviço indisponível');
                const data = await response.json();
                if (data.url) return data.url;
                if (data.link) return data.link;
                throw new Error('URL não encontrada');
            },
            
            // Serviço 2: Loader.to (backup)
            async (videoId) => {
                const url = `https://loader.to/api/card/?url=https://www.youtube.com/watch?v=${videoId}&format=mp3`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Serviço indisponível');
                const data = await response.json();
                if (data.url) return data.url;
                if (data.link) return data.link;
                throw new Error('URL não encontrada');
            },
            
            // Serviço 3: Seu proxy personalizado
            async (videoId) => {
                const url = `${PROXY}/audio?id=${videoId}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Proxy indisponível');
                const data = await response.json();
                return data.url || data.audio || data.stream;
            }
        ];
        
        let currentServiceIndex = 0;

        // ===== CALIBRAR TELA =====
        function calibrarTela() {
            const w = window.innerWidth, h = window.innerHeight;
            const portrait = h > w, mobile = w < 768;
            let ph = mobile ? (portrait ? 70 : 55) : 80;
            document.documentElement.style.setProperty('--player-h', ph + 'px');
            const sb = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-bottom)')) || 0;
            document.documentElement.style.setProperty('--safe-b', sb + 'px');
            document.body.style.paddingBottom = `calc(${ph}px + ${sb}px + 15px)`;
            let fs = w < 360 ? 13 : w < 768 ? 14 : 16;
            document.documentElement.style.fontSize = fs + 'px';
            const art = document.getElementById('spArt'), play = document.getElementById('spPlay');
            if (art && mobile) { const s = portrait ? '44px' : '38px'; art.style.width = s; art.style.height = s; }
            if (play && mobile) { const s = portrait ? '40px' : '36px'; play.style.width = s; play.style.height = s; }
        }

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                document.querySelector('meta[name="theme-color"]').setAttribute('content',
                    this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f');
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }
        };
        T.apply();

        // ===== FAVORITOS =====
        const Fav = {
            favs: JSON.parse(localStorage.getItem('favs') || '[]'),
            hist: JSON.parse(localStorage.getItem('hist') || '[]'),
            toggle(tr) {
                const i = this.favs.findIndex(f => f.id === tr.id);
                i > -1 ? (this.favs.splice(i, 1), toast('💔 Removido')) : (this.favs.unshift(tr), toast('❤️ Favoritado'));
                localStorage.setItem('favs', JSON.stringify(this.favs));
                return i === -1;
            },
            is(id) { return this.favs.some(f => f.id === id); },
            addHist(tr) {
                this.hist = this.hist.filter(h => h.id !== tr.id);
                this.hist.unshift({...tr, at: new Date().toISOString()});
                if (this.hist.length > 50) this.hist.pop();
                localStorage.setItem('hist', JSON.stringify(this.hist));
            }
        };

        // ===== DOWNLOADS =====
        const DL = {
            items: JSON.parse(localStorage.getItem('dls') || '[]'),
            async download(id, title, channel, thumb) {
                toast('⬇️ Baixando...');
                const el = document.getElementById('dlProgress'), fill = document.getElementById('dlFill'), pct = document.getElementById('dlPercent');
                el.classList.add('active'); fill.style.width = '0%'; pct.textContent = '0%';
                for (let i = 0; i <= 100; i += 25) { await new Promise(r => setTimeout(r, 250)); fill.style.width = i + '%'; pct.textContent = i + '%'; }
                this.items.unshift({id, title, channel, thumbnail:thumb, at: new Date().toISOString()});
                localStorage.setItem('dls', JSON.stringify(this.items));
                toast('✅ Concluído!');
                setTimeout(() => el.classList.remove('active'), 800);
            },
            has(id) { return this.items.some(d => d.id === id); },
            all() { return this.items; }
        };

        // ===== ESTADO =====
        let yt = null, ytTop = null, playlist = [], idx = -1, playing = false, vid = null;
        let toastTO = null, query = '', progInt = null, isVideo = false;

        // ===== DOM =====
        const $ = id => document.getElementById(id);
        const sInput = $('searchInput'), sBtn = $('searchBtn'), resCont = $('resultsContainer'), resCount = $('resultCount');
        const sTitle = $('sectionTitle'), toastEl = $('toast');
        const spBar = $('spotifyBar'), spArt = $('spArt'), spTitle = $('spTitle'), spArtist = $('spArtist');
        const spPlay = $('spPlay'), spDL = $('spDL'), progBar = $('progressBar'), progCont = $('progressContainer');
        const vidCont = $('playerContainer'), vidWrap = $('playerWrapper');

        // ===== YOUTUBE (FALLBACK) =====
        window.onYouTubeIframeAPIReady = () => {
            // Não inicializar automaticamente, apenas quando necessário
        };
        
        function initYT() {
            if (yt) yt.destroy();
            const hiddenDiv = document.createElement('div');
            hiddenDiv.id = 'hiddenPlayer';
            hiddenDiv.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1';
            document.body.appendChild(hiddenDiv);
            
            yt = new YT.Player('hiddenPlayer', {
                height: '360', width: '640', videoId: '', 
                host: 'https://www.youtube-nocookie.com',
                playerVars: { 
                    autoplay: 0, playsinline: 1, controls: 0, disablekb: 1, 
                    fs: 0, rel: 0, modestbranding: 1, iv_load_policy: 3, 
                    origin: window.location.origin, enablejsapi: 1, mute: 0, volume: 100 
                },
                events: { 
                    onReady: e => { e.target.setVolume(100); e.target.unMute(); }, 
                    onStateChange: onState, 
                    onError: e => console.error('Erro YT:', e.data) 
                }
            });
        }
        
        function onState(e) {
            if (e.data === 1) { playing = true; updateUI(true); startProg(); }
            else if (e.data === 2) { playing = false; updateUI(false); stopProg(); }
            else if (e.data === 0) { stopProg(); progBar.style.width = '0%'; nextTrack(); }
        }
        
        function startProg() { 
            stopProg(); 
            progInt = setInterval(() => { 
                if (audioElement && audioElement.duration > 0) {
                    progBar.style.width = (audioElement.currentTime / audioElement.duration) * 100 + '%';
                } else if (yt && playing) { 
                    try { 
                        const d = yt.getDuration(), c = yt.getCurrentTime(); 
                        if (d > 0) progBar.style.width = (c / d) * 100 + '%'; 
                    } catch(e) {} 
                }
            }, 1000); 
        }
        
        function stopProg() { if (progInt) { clearInterval(progInt); progInt = null; } }
        
        function updateUI(p) {
            spPlay.textContent = p ? '⏸' : '▶';
            spPlay.classList.toggle('playing', p);
            spBar.classList.toggle('playing', p);
            spArt.classList.toggle('playing', p);
        }

        // ===== CONTROLES PRINCIPAIS =====
        async function playTrack(i = -1) {
            if (i >= 0 && i < playlist.length) idx = i;
            if (idx < 0 || idx >= playlist.length) return;
            
            const t = playlist[idx];
            vid = t.id;
            Fav.addHist(t);
            progBar.style.width = '0%';
            
            spTitle.textContent = t.title || '';
            spArtist.textContent = t.channel || '';
            spArt.src = t.thumbnail || '';
            document.title = '▶ ' + (t.title || 'Play Tube Music');
            spBar.classList.add('active');
            isVideo = false;
            closeVideo();
            
            // Criar elemento de áudio se necessário
            if (!audioElement) createAudioElement();
            
            // Tentar serviços de áudio em ordem
            spPlay.textContent = '⏳';
            let success = false;
            
            for (let i = 0; i < audioServices.length; i++) {
                try {
                    const audioUrl = await audioServices[i](t.id);
                    audioElement.src = audioUrl;
                    audioElement.volume = 1.0;
                    await audioElement.play();
                    currentServiceIndex = i;
                    success = true;
                    toast('▶ Tocando: ' + t.title.substring(0, 30));
                    break;
                } catch (error) {
                    console.warn(`Serviço ${i + 1} falhou:`, error);
                    if (i < audioServices.length - 1) {
                        continue;
                    }
                }
            }
            
            if (!success) {
                // Fallback para YouTube
                toast('⚠️ Usando player de vídeo');
                spPlay.textContent = '▶';
                if (!yt) initYT();
                if (yt?.loadVideoById) {
                    yt.loadVideoById({ videoId: t.id, startSeconds: 0 });
                    setTimeout(() => {
                        if (yt?.playVideo) {
                            yt.playVideo();
                            yt.unMute();
                            yt.setVolume(100);
                        }
                    }, 300);
                }
            }
        }
        
        window.togglePlay = () => {
            if (audioElement && audioElement.src) {
                if (playing) {
                    audioElement.pause();
                } else {
                    audioElement.play().catch(() => {
                        toast('⚠️ Erro ao reproduzir');
                    });
                }
            } else if (yt && vid) {
                if (playing) {
                    yt.pauseVideo();
                    if (ytTop) ytTop.pauseVideo();
                } else {
                    yt.playVideo();
                    yt.unMute();
                    yt.setVolume(100);
                }
            } else if (playlist.length > 0) {
                playTrack(0);
            }
        };
        
        window.nextTrack = () => { 
            if (!playlist.length) return; 
            progBar.style.width = '0%'; 
            playTrack((idx + 1) % playlist.length); 
        };
        
        window.prevTrack = () => { 
            if (!playlist.length) return; 
            progBar.style.width = '0%'; 
            playTrack((idx - 1 + playlist.length) % playlist.length); 
        };
        
        window.seekTrack = e => { 
            const rect = progCont.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            
            if (audioElement && audioElement.duration > 0) {
                audioElement.currentTime = percent * audioElement.duration;
            } else if (yt && vid) {
                const duration = yt.getDuration();
                if (duration > 0) yt.seekTo(percent * duration, true);
            }
        };
        
        function stopPlayback() { 
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            if (yt) yt.stopVideo(); 
            if (ytTop) ytTop.stopVideo(); 
            playing = false; 
            updateUI(false); 
            stopProg(); 
            progBar.style.width = '0%'; 
            spBar.classList.remove('active'); 
            vidCont.classList.remove('active'); 
        }

        // ===== VIDEO =====
        window.showVideo = () => {
            if (!vid) return;
            isVideo = true; 
            vidCont.classList.add('active', 'rainbow-border');
            
            if (!yt) initYT();
            
            if (!ytTop) { 
                vidWrap.innerHTML = '<div id="topPlayerElement"></div>'; 
                ytTop = new YT.Player('topPlayerElement', { 
                    videoId: vid, 
                    playerVars: { 
                        autoplay: 1, playsinline: 1, controls: 1, rel: 0, 
                        modestbranding: 1, fs: 1 
                    }, 
                    events: { 
                        onReady: () => { 
                            if (audioElement && audioElement.currentTime > 0) {
                                ytTop.seekTo(audioElement.currentTime);
                            }
                            if (playing && audioElement) {
                                audioElement.pause();
                            }
                        }, 
                        onStateChange: e => { 
                            if (e.data === 1 && audioElement && playing) {
                                audioElement.pause();
                            }
                            if (e.data === 0) closeVideo(); 
                        } 
                    } 
                }); 
            } else {
                ytTop.loadVideoById({ 
                    videoId: vid, 
                    startSeconds: audioElement ? audioElement.currentTime || 0 : 0 
                });
                if (playing && audioElement) {
                    audioElement.pause();
                }
            }
            vidCont.scrollIntoView({ behavior: 'smooth' });
        };
        
        window.closeVideo = () => { 
            vidCont.classList.remove('active', 'rainbow-border'); 
            if (ytTop) ytTop.stopVideo(); 
            isVideo = false;
        };

        // ===== DOWNLOAD =====
        window.downloadCurrent = () => {
            if (!vid || idx < 0) { toast('⚠️ Nenhuma música'); return; }
            const t = playlist[idx]; 
            spDL.classList.add('downloading');
            DL.download(t.id, t.title, t.channel, t.thumbnail).finally(() => 
                spDL.classList.remove('downloading')
            );
        };

        // ===== RESULTADOS =====
        window.playFromResults = (id, title, channel, thumb) => {
            const v = { id, title, channel, thumbnail: thumb };
            playlist = playlist.filter(t => t.id !== v.id); 
            playlist.unshift(v);
            idx = 0; 
            playTrack(0); 
            toast('▶ ' + title.substring(0, 30));
        };
        
        window.toggleFav = (id, title, channel, thumb, e) => { 
            e.stopPropagation(); 
            Fav.toggle({ id, title, channel, thumbnail: thumb }); 
            updateFavBtns(); 
        };
        
        window.dlFromCard = (id, title, channel, thumb, e) => { 
            e.stopPropagation(); 
            DL.download(id, title, channel, thumb); 
        };

        function updateFavBtns() {
            document.querySelectorAll('.v-btn.fav').forEach(b => {
                const fid = b.getAttribute('data-id'), f = Fav.is(fid);
                b.classList.toggle('fav-active', f); 
                b.textContent = f ? '❤️' : '🤍';
            });
        }

        function card(v) {
            const f = Fav.is(v.id), d = DL.has(v.id);
            return `<div class="video-card" onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">
                <img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'">
                <div class="video-info"><div class="video-title">${esc(v.title)}</div><div class="video-channel">${esc(v.channel)}</div>${v.at?`<div style="font-size:0.65rem;color:var(--text3);margin-top:1px;">🕐 ${new Date(v.at).toLocaleDateString()}</div>`:''}</div>
                <div class="video-actions">
                    <button class="v-btn fav${f?' fav-active':''}" data-id="${v.id}" onclick="toggleFav('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">${f?'❤️':'🤍'}</button>
                    ${!d?`<button class="v-btn dl" onclick="dlFromCard('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">⬇</button>`:''}
                </div></div>`;
        }

        // ===== TABS =====
        window.switchTab = t => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            [...document.querySelectorAll('.tab-btn')].forEach(b => { 
                if (b.textContent.toLowerCase().includes(t === 'search' ? 'buscar' : t === 'favorites' ? 'favoritos' : t === 'history' ? 'histórico' : 'downloads')) 
                    b.classList.add('active'); 
            });
            sTitle.innerHTML = '<span>' + (t === 'search' ? 'Resultados' : t === 'favorites' ? '❤️ Favoritos' : t === 'history' ? '🕐 Histórico' : '⬇️ Downloads') + '</span>';
            
            if (t === 'search') { 
                if (query) searchYT(query); 
                else resCont.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text2);"><div style="font-size:3rem;">🎧</div><div>Busque suas músicas</div></div>'; 
            }
            else if (t === 'favorites') { 
                const f = Fav.favs; 
                resCount.textContent = f.length + ' items'; 
                resCont.innerHTML = f.length ? f.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">❤️ Vazio</div>'; 
                updateFavBtns(); 
            }
            else if (t === 'history') { 
                const h = Fav.hist; 
                resCount.textContent = h.length + ' itens'; 
                resCont.innerHTML = h.length ? h.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">🕐 Vazio</div>'; 
                updateFavBtns(); 
            }
            else if (t === 'downloads') { 
                const d = DL.all(); 
                resCount.textContent = d.length + ' itens'; 
                resCont.innerHTML = d.length ? d.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">📥 Vazio</div>'; 
                updateFavBtns(); 
            }
        };

        // ===== BUSCA =====
        sBtn.addEventListener('click', () => { query = sInput.value; searchYT(query); });
        sInput.addEventListener('keydown', e => { if (e.key === 'Enter') { query = sInput.value; searchYT(query); } });
        
        async function searchYT(q) {
            if (!q.trim()) { toast('⚠️ Digite algo'); return; }
            showLoad(true); 
            resCount.textContent = '';
            try {
                const u = new URL(PROXY); 
                u.searchParams.append('q', q + ' música'); 
                u.searchParams.append('maxResults', '15'); 
                u.searchParams.append('regionCode', 'BR'); 
                u.searchParams.append('relevanceLanguage', 'pt');
                const r = await fetch(u); 
                if (!r.ok) throw new Error('Erro');
                const d = await r.json();
                resCount.textContent = d.totalResults ? `${d.totalResults} resultados` : '';
                resCont.innerHTML = d.videos?.length ? d.videos.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado</div>';
                updateFavBtns();
            } catch(e) { 
                toast('⚠️ Erro na busca'); 
            }
            showLoad(false);
        }

        // ===== UTILS =====
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showLoad(s) { if (s) resCont.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>'; }
        function toast(m) { if (toastTO) clearTimeout(toastTO); toastEl.textContent = m; toastEl.classList.add('show'); toastTO = setTimeout(() => toastEl.classList.remove('show'), 2500); }

        // ===== MEDIA SESSION =====
        function setupMS() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.setActionHandler('play', togglePlay);
            navigator.mediaSession.setActionHandler('pause', togglePlay);
            navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
            navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            navigator.mediaSession.setActionHandler('stop', stopPlayback);
        }

        // ===== BACKGROUND PLAY =====
        async function lock() { 
            try { 
                if ('wakeLock' in navigator) { 
                    const w = await navigator.wakeLock.request('screen'); 
                    w.addEventListener('release', () => { 
                        if (playing) lock(); 
                    }); 
                } 
            } catch(e) {} 
        }
        
        // Configurar Audio Session para iOS
        if ('audioSession' in navigator) {
            navigator.audioSession.type = 'playback';
        }
        
        // Manter reprodução em segundo plano
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && playing && audioElement) {
                // O áudio continua tocando naturalmente
                lock();
            }
        });
        
        lock();

        // ===== INIT =====
        function init() {
            setupMS(); 
            calibrarTela();
            createAudioElement(); // Criar elemento de áudio ao iniciar
            console.log('✅ Play Tube Music v6 - Audio Nativo');
        }
        
        window.addEventListener('resize', () => { 
            clearTimeout(window._rt); 
            window._rt = setTimeout(calibrarTela, 250); 
        });
        
        window.addEventListener('orientationchange', () => setTimeout(calibrarTela, 300));
        window.addEventListener('load', init);

        // EXPORTAR GLOBAIS
        window.calibrarTela = calibrarTela; 
        window.T = T;
        window.togglePlay = togglePlay; 
        window.nextTrack = nextTrack; 
        window.prevTrack = prevTrack;
        window.playFromResults = playFromResults; 
        window.toggleFav = toggleFav; 
        window.dlFromCard = dlFromCard;
        window.downloadCurrent = downloadCurrent; 
        window.switchTab = switchTab; 
        window.seekTrack = seekTrack;
        window.showVideo = showVideo; 
        window.closeVideo = closeVideo;
    })();
    </script>
</body>
</html>
