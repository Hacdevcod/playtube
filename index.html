}.avatar-leg-left,.avatar-leg-right{width:16px;height:40px;background:linear-gradient(180deg,#0f3460,#16213e);border-radius:5px 5px 8px 8px;border:1px solid rgba(255,0,100,0.3);transform-origin:top center}.avatar-leg-left{animation:pragmataLegs 0.8s ease-in-out infinite}.avatar-leg-right{animation:pragmataLegs 0.8s ease-in-out 0.4s infinite}.music-notes{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none}.note{position:absolute;font-size:20px;animation:noteFloat 2s ease-out infinite}.note:nth-child(1){left:-20px;top:30px;animation-delay:0s}.note:nth-child(2){right:-20px;top:40px;animation-delay:0.6s}.note:nth-child(3){left:-10px;top:10px;animation-delay:1.2s;font-size:14px}.note:nth-child(4){right:-10px;top:15px;animation-delay:1.8s;font-size:16px}.bg-stars{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:starPulse 2s ease-in-out infinite}.star:nth-child(1){left:10%;top:20%;animation-delay:0s}.star:nth-child(2){left:80%;top:15%;animation-delay:0.5s}.star:nth-child(3){left:30%;top:60%;animation-delay:1s}.star:nth-child(4){left:70%;top:50%;animation-delay:1.5s}.star:nth-child(5){left:50%;top:10%;animation-delay:0.3s}.star:nth-child(6){left:15%;top:80%;animation-delay:0.8s}.star:nth-child(7){left:85%;top:75%;animation-delay:1.3s}.star:nth-child(8){left:45%;top:40%;animation-delay:1.8s}.star:nth-child(9){left:60%;top:30%;animation-delay:0.2s}.star:nth-child(10){left:25%;top:45%;animation-delay:0.7s}

        .loading{text-align:center;padding:40px;color:var(--yt-gray)}.spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#f00;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%)translateY(120px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;z-index:600;transition:transform 0.3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%)translateY(0)}.pagination{display:flex;justify-content:center;gap:12px;padding:16px}.pagination button{padding:8px 16px;background:var(--yt-surface);border:1px solid var(--yt-border);color:#fff;border-radius:20px;cursor:pointer;font-size:13px;transition:background 0.2s}.pagination button:hover{background:var(--yt-surface2)}.pagination button:disabled{opacity:0.4;cursor:not-allowed}

<body>

    <div class="topbar">
        <div class="logo"><div class="logo-icon">♪</div><span class="logo-text">Play Tube<sup>MUSIC</sup></span></div>

    <div class="search-section">

    <div class="playlist-bar" id="playlistBar" style="display:none;"><span style="font-size:11px;color:#aaa;flex-shrink:0;">Lista:</span><span class="playlist-tag active" id="playlistCount">0 músicas</span></div>
    <div class="playlist-actions" id="playlistActions" style="display:none;">

    <div class="side-buttons hidden" id="sideButtons">

    <div class="results-section">

        <div class="section-subtitle" id="sectionSubtitle" style="display:none;"></div>
        <div id="resultsContainer"><div style="text-align:center;padding:60px 20px;color:#aaa;"><div style="font-size:64px;margin-bottom:16px;">🎧</div><div style="font-size:18px;margin-bottom:8px;">Busque suas músicas</div><div style="font-size:12px;color:#717171;">📱 Player toca com tela bloqueada!</div></div></div>
        <div id="paginationContainer" class="pagination" style="display:none;"></div>

    <div class="now-playing-bar" id="nowPlayingBar" style="display:none;">

        <div class="np-equalizer" id="npEqualizer" style="display:none;"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="np-controls">
            <button class="np-btn" onclick="previousTrack()">⏮</button>
            <button class="np-btn play-btn" id="playPauseBtn" onclick="togglePlayPause()">▶</button>

    <!-- SIMULADOR DE TELA BLOQUEADA COM AVATAR DANÇANTE -->
    <div class="screen-lock-simulator" id="screenLockSimulator" onclick="hideLockScreen()">
        <div class="bg-stars">
            <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
            <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        </div>
        <div class="pragmata-avatar">
            <div class="avatar-body">
                <div class="avatar-head"><div class="avatar-visor"></div></div>
                <div class="avatar-torso"><div class="avatar-arm-left"></div><div class="avatar-arm-right"></div></div>
                <div class="avatar-legs"><div class="avatar-leg-left"></div><div class="avatar-leg-right"></div></div>
            </div>
            <div class="music-notes"><span class="note">🎵</span><span class="note">🎶</span><span class="note">♪</span><span class="note">♫</span></div>
        </div>
        <div class="lock-text">Tocando em Segundo Plano</div>
        <div class="lock-hint">(Toque para voltar ao app)</div>
        <div class="lock-now-playing" onclick="event.stopPropagation()">
            <div class="lock-np-title" id="lockNpTitle">Nenhuma música</div>
            <div class="lock-np-artist" id="lockNpArtist">---</div>
            <div class="lock-controls">
                <button class="lock-btn" onclick="event.stopPropagation();previousTrack()">⏮</button>
                <button class="lock-btn" onclick="event.stopPropagation();togglePlayPause()" id="lockPlayBtn" style="font-size:32px;background:rgba(255,255,255,0.2);border-radius:50%;width:50px;height:50px;">▶</button>
                <button class="lock-btn" onclick="event.stopPropagation();nextTrack()">⏭</button>
            </div>
        </div>
    </div>

    <div class="download-modal" id="downloadModal">
        <div class="download-box">
            <div class="download-title" id="downloadTitle">⬇ Download</div>
            <div class="download-progress"><div class="download-bar" id="downloadBar"></div></div>
            <div class="download-percent" id="downloadPercent">0%</div>
            <div class="download-status" id="downloadStatus">Preparando...</div>
            <div class="download-options" id="downloadOptions">
                <button class="download-option" onclick="downloadDirectMP3()">🎵 Baixar MP3</button>
                <button class="download-option" onclick="downloadViaSite()">🌐 Sites</button>
                <button class="download-option" onclick="copyVideoURL()">📋 Copiar URL</button>
            </div>
            <button class="download-close" onclick="closeDownloadModal()">✕ Fechar</button>
        </div>
    </div>

    <div class="playlist-modal" id="playlistModal">
        <div class="playlist-modal-header"><span class="playlist-modal-title">📼 Lista de Reprodução</span><button class="playlist-modal-close" onclick="togglePlaylistModal()">✕</button></div>
        <div class="playlist-modal-list" id="playlistModalList"></div>
        <div style="padding:12px;display:flex;gap:8px;"><button class="playlist-action-btn play-all" onclick="playAllPlaylist()" style="flex:1;">▶ Tocar Tudo</button><button class="playlist-action-btn clear" onclick="clearPlaylist()">🗑</button></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        (function() {
            'use strict';
            const PROXY_URL = 'https://playtube-proxy.codw23.workers.dev';

            // ESTADO
            let ytPlayer = null, ytTopPlayer = null, playlist = [], selectedVideos = new Set();
            let currentTrackIndex = -1, isPlaying = false, currentVideoId = null, currentArtist = '';
            let toastTimeout = null, nextPageToken = null, prevPageToken = null, currentQuery = '';
            let hideButtonsTimeout = null, isNookieMode = false, hasShownRelatedVideos = false;
            let isVideoMode = true, downloadInterval = null, wakeLock = null;

            // DOM
            const $ = (id) => document.getElementById(id);
            const searchInput = $('searchInput'), searchBtn = $('searchBtn');
            const resultsContainer = $('resultsContainer'), resultCount = $('resultCount');
            const sectionTitle = $('sectionTitle'), sectionSubtitle = $('sectionSubtitle');
            const paginationContainer = $('paginationContainer');
            const playerTop = $('playerTop'), playerWrapper = $('playerWrapper');
            const playerInfoTitle = $('playerInfoTitle'), playerInfoArtist = $('playerInfoArtist');
            const nowPlayingBar = $('nowPlayingBar'), npThumb = $('npThumb');
            const npTitle = $('npTitle'), npArtist = $('npArtist'), npEqualizer = $('npEqualizer');
            const playPauseBtn = $('playPauseBtn'), hiddenPlayer = $('hiddenPlayer');
            const sideButtons = $('sideButtons'), nookieBtn = $('nookieBtn'), toast = $('toast');
            const playlistBar = $('playlistBar'), playlistActions = $('playlistActions'), playlistCount = $('playlistCount');
            const playlistModal = $('playlistModal'), playlistModalList = $('playlistModalList');
            const modeToggleBtn = $('modeToggleBtn'), playerModeBtn = $('playerModeBtn');
            const downloadModal = $('downloadModal'), bgIndicator = $('bgIndicator');
            const screenLockSimulator = $('screenLockSimulator');
            const lockNpTitle = $('lockNpTitle'), lockNpArtist = $('lockNpArtist'), lockPlayBtn = $('lockPlayBtn');

            // SERVICE WORKER
            if ('serviceWorker' in navigator) {
                const swCode = `const CACHE_NAME='playtube-v1';self.addEventListener('install',(e)=>{self.skipWaiting()});self.addEventListener('activate',(e)=>{self.clients.claim()});self.addEventListener('message',(event)=>{const{action,title,artist,artwork}=event.data;self.clients.matchAll().then(clients=>{clients.forEach(client=>client.postMessage({action,title,artist,artwork}))});if(action==='UPDATE_MEDIA'&&'mediaSession' in self){self.registration.mediaSession.metadata=new MediaMetadata({title:title||'Play Tube',artist:artist||'YouTube',album:'Play Tube Music',artwork:artwork||[]})}});`;
                const blob = new Blob([swCode], {type:'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
                navigator.serviceWorker.addEventListener('message', (event) => {
                    const {action} = event.data;
                    switch(action){case'PLAY':if(ytPlayer&&currentVideoId)ytPlayer.playVideo();break;case'PAUSE':if(ytPlayer)ytPlayer.pauseVideo();break;case'NEXT':nextTrack();break;case'PREVIOUS':previousTrack();break;}
                });
            }
            function notifySW(action, data = {}) { if (navigator.serviceWorker && navigator.serviceWorker.controller) { navigator.serviceWorker.controller.postMessage({action, ...data}); } }

            // SIMULADOR
            window.simulateLockScreen = function() { if (isPlaying) { screenLockSimulator.classList.add('active'); lockNpTitle.textContent = npTitle.textContent; lockNpArtist.textContent = npArtist.textContent; lockPlayBtn.textContent = isPlaying ? '⏸' : '▶'; } else { showToast('⚠️ Toque uma música primeiro'); } };
            window.hideLockScreen = function() { screenLockSimulator.classList.remove('active'); };

            // MODO
            window.togglePlayMode = function() { isVideoMode = !isVideoMode; if (isVideoMode) { modeToggleBtn.textContent = '🎬'; modeToggleBtn.classList.add('video-mode'); playerModeBtn.textContent = '🎬'; playerModeBtn.classList.remove('audio-mode'); if (currentVideoId) showPlayer(); } else { modeToggleBtn.textContent = '🎵'; modeToggleBtn.classList.remove('video-mode'); playerModeBtn.textContent = '🎵'; playerModeBtn.classList.add('audio-mode'); closePlayer(); if (currentVideoId) togglePiP(); } };

            // PLAYLIST
            window.togglePlaylistModal = function() { playlistModal.classList.toggle('active'); if (playlistModal.classList.contains('active')) updatePlaylistModal(); };
            function updatePlaylistModal() { if (playlist.length === 0) { playlistModalList.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">📼 Vazia</div>'; return; } playlistModalList.innerHTML = playlist.map((t, i) => `<div class="playlist-item ${i===currentTrackIndex&&isPlaying?'playing':''}" onclick="playPlaylistTrack(${i})"><img class="playlist-item-thumb" src="${t.thumbnail||''}" onerror="this.style.opacity='0.3'"><div class="playlist-item-info"><div class="playlist-item-title">${escapeHtml(t.title)}</div><div class="playlist-item-artist">${escapeHtml(t.channel)}</div></div><button class="playlist-item-remove" onclick="event.stopPropagation();removeFromPlaylist(${i})">✕</button></div>`).join(''); }
            window.playPlaylistTrack = function(i) { currentTrackIndex = i; playTrack(i); playlistModal.classList.remove('active'); };
            window.removeFromPlaylist = function(i) { if (i === currentTrackIndex) stopPlayback(); playlist.splice(i, 1); if (i < currentTrackIndex) currentTrackIndex--; updatePlaylistUI(); updatePlaylistModal(); };
            window.playAllPlaylist = function() { if (playlist.length === 0) return; currentTrackIndex = 0; playTrack(0); };
            window.playSelected = function() { if (selectedVideos.size === 0) { showToast('⚠️ Selecione vídeos'); return; } playlist = playlist.filter(t => selectedVideos.has(t.id)); selectedVideos.clear(); currentTrackIndex = 0; playTrack(0); updatePlaylistUI(); };
            window.clearPlaylist = function() { stopPlayback(); playlist = []; selectedVideos.clear(); currentTrackIndex = -1; updatePlaylistUI(); updatePlaylistModal(); };
            function updatePlaylistUI() { if (playlist.length > 0) { playlistBar.style.display = 'flex'; playlistActions.style.display = 'flex'; playlistCount.textContent = playlist.length + ' músicas'; } else { playlistBar.style.display = 'none'; playlistActions.style.display = 'none'; } }

            // BOTÕES
            document.addEventListener('click', (e) => { if (currentVideoId && !e.target.closest('.side-btn') && !e.target.closest('.nookie-btn-fixed') && !e.target.closest('.tape-btn') && !e.target.closest('.player-close') && !e.target.closest('.mode-toggle') && !e.target.closest('.player-mode-btn')) showSideButtons(); });
            document.addEventListener('touchstart', (e) => { if (currentVideoId && !e.target.closest('.side-btn') && !e.target.closest('.nookie-btn-fixed') && !e.target.closest('.tape-btn') && !e.target.closest('.player-close') && !e.target.closest('.mode-toggle') && !e.target.closest('.player-mode-btn')) showSideButtons(); }, {passive:true});
            function showSideButtons() { sideButtons.classList.remove('hidden'); if (hideButtonsTimeout) clearTimeout(hideButtonsTimeout); hideButtonsTimeout = setTimeout(() => sideButtons.classList.add('hidden'), 4000); }

            // PLAYER TOPO
            window.showPlayer = function() { if (!currentVideoId || !isVideoMode) return; playerTop.classList.add('active'); playerTop.classList.add('rainbow-border'); if (!ytTopPlayer) initTopPlayer(); else ytTopPlayer.loadVideoById({videoId:currentVideoId, startSeconds:ytPlayer?.getCurrentTime?ytPlayer.getCurrentTime():0}); playerTop.scrollIntoView({behavior:'smooth'}); };
            window.closePlayer = function() { playerTop.classList.remove('active'); playerTop.classList.remove('rainbow-border'); if (ytTopPlayer) ytTopPlayer.stopVideo(); };
            function initTopPlayer() { playerWrapper.innerHTML = '<div id="topPlayerElement"></div>'; ytTopPlayer = new YT.Player('topPlayerElement', {videoId:currentVideoId, playerVars:{autoplay:1,playsinline:1,controls:1,rel:0,modestbranding:1,fs:1}, events:{onReady:()=>{if(ytPlayer?.getCurrentTime)ytTopPlayer.seekTo(ytPlayer.getCurrentTime());}, onStateChange:(e)=>{if(e.data===YT.PlayerState.PLAYING&&ytPlayer?.pauseVideo)ytPlayer.pauseVideo();}}}); }

            // NO-COOKIES
            window.toggleNookieMode = function() { isNookieMode = !isNookieMode; if (isNookieMode) { nookieBtn.classList.add('liked'); nookieBtn.textContent = '🔒'; } else { nookieBtn.classList.remove('liked'); nookieBtn.textContent = '🍪'; } if (currentVideoId) reloadPlayer(); };
            function reloadPlayer() { if (!currentVideoId || !ytPlayer) return; const ct = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0; const wp = isPlaying; if (ytPlayer) ytPlayer.destroy(); ytPlayer = new YT.Player('hiddenPlayer', {height:'100%',width:'100%',host:'https://www.youtube-nocookie.com',playerVars:{autoplay:wp?1:0,playsinline:1,controls:0,disablekb:1,fs:0,rel:0,modestbranding:1,iv_load_policy:3,origin:window.location.origin,enablejsapi:1,mute:0,volume:100},events:{onReady:(e)=>{e.target.setVolume(100);e.target.unMute();e.target.loadVideoById({videoId:currentVideoId,startSeconds:ct});if(wp){setTimeout(()=>{e.target.playVideo();e.target.unMute();},200);}},onStateChange:onPlayerStateChange,onError:()=>showToast('⚠️ Erro')}}); if (playerTop.classList.contains('active') && ytTopPlayer) { ytTopPlayer.destroy(); initTopPlayer(); } }
            window.openInYouTube = function() { if (!currentVideoId) return; window.open(isNookieMode?`https://www.yout-ube.com/watch?v=${currentVideoId}`:`https://www.youtube.com/watch?v=${currentVideoId}`, '_blank'); };
            if (window.history?.replaceState) window.history.replaceState({}, document.title, window.location.pathname);

            // YOUTUBE IFRAME API
            window.onYouTubeIframeAPIReady = function() { initHiddenPlayer(); };
            function initHiddenPlayer() { if (ytPlayer) ytPlayer.destroy(); ytPlayer = new YT.Player('hiddenPlayer', {height:'100%',width:'100%',host:'https://www.youtube-nocookie.com',playerVars:{autoplay:0,playsinline:1,controls:0,disablekb:1,fs:0,rel:0,modestbranding:1,iv_load_policy:3,origin:window.location.origin,enablejsapi:1,widgetid:1,mute:0,volume:100},events:{onReady:function(event){console.log('✅ Player BG pronto');event.target.setVolume(100);event.target.unMute();},onStateChange:onPlayerStateChange,onError:function(e){console.error('❌ Erro:',e.data);}}}); }
            function onPlayerStateChange(event) { if (event.data === YT.PlayerState.PLAYING) { isPlaying = true; playPauseBtn.textContent = '⏸'; lockPlayBtn.textContent = '⏸'; npEqualizer.style.display = 'flex'; bgIndicator.style.display = 'flex'; hasShownRelatedVideos = false; updateMediaSession(true); } else if (event.data === YT.PlayerState.PAUSED) { isPlaying = false; playPauseBtn.textContent = '▶'; lockPlayBtn.textContent = '▶'; npEqualizer.style.display = 'none'; bgIndicator.style.display = 'none'; updateMediaSession(false); } else if (event.data === YT.PlayerState.ENDED) { if (!hasShownRelatedVideos && currentArtist) { hasShownRelatedVideos = true; showRelatedVideos(currentArtist); } else nextTrack(); } }
            async function showRelatedVideos(artist) { showToast(`🎵 Mais de ${artist}...`); sectionTitle.innerHTML = `<span>🎤 Mais de ${escapeHtml(artist)}</span>`; sectionSubtitle.style.display = 'block'; nextPageToken = null; prevPageToken = null; currentQuery = artist; await searchYouTube(artist, null, true); document.querySelector('.results-section').scrollIntoView({behavior:'smooth'}); }

            // MEDIA SESSION
            function setupMediaSession() { if (!('mediaSession' in navigator)) return; navigator.mediaSession.setActionHandler('play', togglePlayPause); navigator.mediaSession.setActionHandler('pause', togglePlayPause); navigator.mediaSession.setActionHandler('previoustrack', previousTrack); navigator.mediaSession.setActionHandler('nexttrack', nextTrack); navigator.mediaSession.setActionHandler('stop', stopPlayback); }
            function updateMediaSession(playing) { if (!('mediaSession' in navigator)) return; navigator.mediaSession.playbackState = playing ? 'playing' : 'paused'; if (currentTrackIndex >= 0 && playlist[currentTrackIndex]) { const t = playlist[currentTrackIndex]; const artwork = [{src:t.thumbnail||'',sizes:'512x512',type:'image/jpg'}]; navigator.mediaSession.metadata = new MediaMetadata({title:t.title||'Play Tube',artist:t.channel||'YouTube',album:'Play Tube Music',artwork:artwork}); notifySW('UPDATE_MEDIA', {title:t.title,artist:t.channel,artwork:artwork}); } }

            // CONTROLES
            function playTrack(index = -1) { if (index >= 0 && index < playlist.length) currentTrackIndex = index; if (currentTrackIndex < 0 || currentTrackIndex >= playlist.length) return; const track = playlist[currentTrackIndex]; currentVideoId = track.id; currentArtist = track.channel; hasShownRelatedVideos = false; if (ytPlayer?.loadVideoById) { ytPlayer.loadVideoById({videoId:track.id,startSeconds:0}); setTimeout(() => { if (ytPlayer && ytPlayer.playVideo) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); } }, 300); } if (playerTop.classList.contains('active') && ytTopPlayer?.loadVideoById) ytTopPlayer.loadVideoById({videoId:track.id,startSeconds:0}); updateNowPlaying(track); updatePlayerTopInfo(track); showNowPlayingBar(); showSideButtons(); lockNpTitle.textContent = track.title||''; lockNpArtist.textContent = track.channel||''; if (isVideoMode) showPlayer(); else togglePiP(); updatePlaylistModal(); }
            window.togglePlayPause = function() { if (!ytPlayer) return; if (isPlaying) { ytPlayer.pauseVideo(); if (ytTopPlayer) ytTopPlayer.pauseVideo(); } else if (currentVideoId) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); if (ytTopPlayer) { ytTopPlayer.playVideo(); ytTopPlayer.unMute(); } } else if (playlist.length > 0) playTrack(0); };
            window.nextTrack = function() { if (playlist.length === 0) return; playTrack((currentTrackIndex + 1) % playlist.length); };
            window.previousTrack = function() { if (playlist.length === 0) return; playTrack((currentTrackIndex - 1 + playlist.length) % playlist.length); };
            function stopPlayback() { if (ytPlayer) ytPlayer.stopVideo(); if (ytTopPlayer) ytTopPlayer.stopVideo(); isPlaying = false; playPauseBtn.textContent = '▶'; lockPlayBtn.textContent = '▶'; npEqualizer.style.display = 'none'; bgIndicator.style.display = 'none'; nowPlayingBar.style.display = 'none'; playerTop.classList.remove('active'); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none'; }
            function updateNowPlaying(track) { npTitle.textContent = track.title||''; npArtist.textContent = track.channel||''; npThumb.src = track.thumbnail||''; document.title = `▶ ${track.title||'Play Tube'}`; }
            function updatePlayerTopInfo(track) { playerInfoTitle.textContent = track.title||''; playerInfoArtist.textContent = track.channel||''; }
            function showNowPlayingBar() { nowPlayingBar.style.display = 'flex'; }

            // SELEÇÃO
            window.toggleSelectVideo = function(videoId, event) { event.stopPropagation(); if (selectedVideos.has(videoId)) selectedVideos.delete(videoId); else selectedVideos.add(videoId); document.querySelectorAll('.video-card').forEach(c => { if (c.getAttribute('data-video-id') === videoId) c.classList.toggle('selected', selectedVideos.has(videoId)); }); updatePlaylistUI(); };
            window.playVideoFromResults = function(videoId, title, channel, thumbnail) { const video = {id:videoId,title,channel,thumbnail}; playlist = playlist.filter(t => t.id !== video.id); playlist.unshift(video); currentTrackIndex = 0; selectedVideos.clear(); playTrack(0); updatePlaylistUI(); showToast('▶ Tocando agora'); };

            // PIP
            window.togglePiP = async function() { if (!currentVideoId) { showToast('⚠️ Selecione uma música'); return; } try { if (document.pictureInPictureElement) await document.exitPictureInPicture(); else { const iframe = document.querySelector('#playerTop iframe') || document.querySelector('#hiddenPlayer iframe'); if (iframe) await iframe.requestPictureInPicture(); } } catch (e) { window.open(`https://www.youtube.com/watch?v=${currentVideoId}`, '_blank'); } };

            // DOWNLOAD
            window.downloadVideo = function() { if (!currentVideoId) { showToast('⚠️ Selecione uma música'); return; } downloadModal.classList.add('active'); const track = playlist[currentTrackIndex]||{}; $('downloadTitle').textContent = `⬇ ${track.title||'Música'}`; $('downloadBar').style.width = '0%'; $('downloadPercent').textContent = '0%'; simulateDownload(); };
            function simulateDownload() { let p = 0; if (downloadInterval) clearInterval(downloadInterval); downloadInterval = setInterval(() => { p += Math.random() * 15; if (p >= 100) { p = 100; clearInterval(downloadInterval); $('downloadStatus').textContent = '✅ Pronto!'; } $('downloadBar').style.width = p + '%'; $('downloadPercent').textContent = Math.floor(p) + '%'; }, 400); }
            window.downloadDirectMP3 = function() { if (!currentVideoId) return; window.open(`https://yt5s.com/en?url=https://www.youtube.com/watch?v=${currentVideoId}`, '_blank'); closeDownloadModal(); };
            window.downloadViaSite = function() { if (!currentVideoId) return; $('downloadOptions').innerHTML = [{name:'YT5S',url:`https://yt5s.com/en?url=https://www.youtube.com/watch?v=${currentVideoId}`},{name:'Y2Mate',url:`https://www.y2mate.com/youtube/${currentVideoId}`}].map(s=>`<button class="download-option" onclick="window.open('${s.url}','_blank');closeDownloadModal();">🌐 ${s.name}</button>`).join(''); };
            window.copyVideoURL = function() { if (!currentVideoId) return; const url = `https://www.youtube.com/watch?v=${currentVideoId}`; if (navigator.clipboard) navigator.clipboard.writeText(url).then(()=>showToast('📋 URL copiada!')); };
            window.closeDownloadModal = function() { downloadModal.classList.remove('active'); if (downloadInterval) clearInterval(downloadInterval); };

            // BUSCA
            searchBtn.addEventListener('click', () => { currentQuery = searchInput.value; nextPageToken = null; prevPageToken = null; sectionTitle.innerHTML = '<span>Resultados</span>'; sectionSubtitle.style.display = 'none'; searchYouTube(currentQuery); });
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { currentQuery = searchInput.value; nextPageToken = null; prevPageToken = null; sectionTitle.innerHTML = '<span>Resultados</span>'; sectionSubtitle.style.display = 'none'; searchYouTube(currentQuery); } });
            async function searchYouTube(query, pageToken = null) { const q = query.trim(); if (!q) { showToast('⚠️ Digite uma música'); return; } showLoading(true); paginationContainer.style.display = 'none'; resultCount.textContent = ''; try { const proxyUrl = new URL(PROXY_URL); proxyUrl.searchParams.append('q', q + ' música'); proxyUrl.searchParams.append('maxResults', '15'); proxyUrl.searchParams.append('regionCode', 'BR'); proxyUrl.searchParams.append('relevanceLanguage', 'pt'); if (pageToken) proxyUrl.searchParams.append('pageToken', pageToken); const response = await fetch(proxyUrl); if (!response.ok) throw new Error('Erro'); const data = await response.json(); nextPageToken = data.nextPageToken||null; prevPageToken = data.prevPageToken||null; displayResults(data.videos||[], data.totalResults||0); updatePagination(); } catch (e) { showToast('⚠️ ' + e.message); } showLoading(false); }
            function displayResults(videos, totalResults) { resultCount.textContent = totalResults ? `${totalResults} resultados` : ''; if (!videos?.length) { resultsContainer.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">Nenhum resultado</div>'; return; } resultsContainer.innerHTML = videos.map(v => `<div class="video-card ${selectedVideos.has(v.id)?'selected':''}" data-video-id="${v.id}" onclick="playVideoFromResults('${v.id}','${escapeHtml(v.title)}','${escapeHtml(v.channel)}','${v.thumbnail}')"><img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'"><div class="video-info"><div class="video-card-title">${escapeHtml(v.title)}</div><div class="video-card-channel">${escapeHtml(v.channel)}</div><div class="video-card-meta">⏱ ${formatDuration(v.duration)} • 👁 ${formatViews(v.viewCount)}</div></div><div class="video-check" onclick="toggleSelectVideo('${v.id}', event)">✓</div></div>`).join(''); }
            function updatePagination() { if (!nextPageToken && !prevPageToken) { paginationContainer.style.display = 'none'; return; } paginationContainer.style.display = 'flex'; paginationContainer.innerHTML = `<button onclick="searchPage('prev')" ${!prevPageToken?'disabled':''}>⬅</button><button onclick="searchPage('next')" ${!nextPageToken?'disabled':''}>➡</button>`; }
            window.searchPage = function(d) { const t = d === 'next' ? nextPageToken : prevPageToken; if (t && currentQuery) searchYouTube(currentQuery, t); };

            // UTILS
            function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
            function formatDuration(dur) { if (!dur) return '--:--'; const m = dur.match(/PT(\d+H)?(\d+M)?(\d+S)?/); if (!m) return '--:--'; const h = (m[1]||'').replace('H',''), min = (m[2]||'').replace('M',''), s = (m[3]||'').replace('S',''); let r = ''; if (h) r += h + ':'; r += (min ? min.padStart(2,'0') : '00') + ':'; r += (s ? s.padStart(2,'0') : '00'); return r; }
            function formatViews(v) { const n = parseInt(v); if (isNaN(n)) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; return n.toString(); }
            function showLoading(s) { if (s) resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>'; }
            function showToast(msg) { if (toastTimeout) clearTimeout(toastTimeout); toast.textContent = msg; toast.classList.add('show'); toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500); }

            // ===== BACKGROUND PLAY ABSOLUTO =====
            async function lockScreen() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { if (isPlaying) lockScreen(); }); } } catch (err) {} }
            document.addEventListener('visibilitychange', function() { if (document.hidden && isPlaying) { if (ytPlayer) { try { if (ytPlayer.getPlayerState() !== 1) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); } } catch(e) {} } lockScreen(); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing'; } });
            window.addEventListener('pagehide', function(e) { if (isPlaying) { e.preventDefault(); e.returnValue = 'Música tocando...'; return 'Música tocando...'; } });
            window.addEventListener('freeze', function(e) { if (isPlaying) e.preventDefault(); });
            setInterval(function() { if (isPlaying && ytPlayer) { try { var state = ytPlayer.getPlayerState(); if (state !== 1 && state !== 3) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); } } catch(e) { initHiddenPlayer(); if (currentVideoId) { setTimeout(function() { if (ytPlayer && ytPlayer.loadVideoById) { ytPlayer.loadVideoById({videoId: currentVideoId, startSeconds: 0}); setTimeout(() => { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); }, 500); } }, 500); } } } }, 1000);
            if ('audioSession' in navigator) { navigator.audioSession.type = 'playback'; }
            if ('connection' in navigator && navigator.connection) { navigator.connection.addEventListener('change', function() { if (isPlaying && ytPlayer) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); } }); }
            document.addEventListener('visibilitychange', function() { if (!document.hidden && isPlaying && ytPlayer) { var state = ytPlayer.getPlayerState(); if (state !== 1) { ytPlayer.playVideo(); ytPlayer.unMute(); ytPlayer.setVolume(100); } } });
            lockScreen();

            // INIT
            setupMediaSession();
            console.log('🔊 Play Tube - Background Play ABSOLUTO');
            console.log('✅ Player 100% | Wake Lock | Monitor 1s | pagehide | freeze | audioSession | Auto-recreate');
        })();
    </script>
</body>
</html>
