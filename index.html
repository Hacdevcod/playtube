<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    
    <title>Play Tube Music Pro</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 80px;
            --safe-b: 0px;
            --scale: 1;
            --content-width: 100%;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { 
            font-size:16px;
            /* Auto-ajuste de escala baseado na largura */
            --base-width: 390;
        }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-bottom: calc(var(--player-h) + var(--safe-b) + 15px);
            /* Centralizar conteúdo com largura máxima */
            max-width: 100vw;
            margin: 0 auto;
            position: relative;
        }
        
        /* Container principal com auto-ajuste */
        .app-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            transform-origin: top center;
        }
        
        /* Indicador de escala/zoom */
        .scale-indicator {
            position: fixed;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .scale-indicator.show {
            opacity: 1;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }
        @keyframes detectedPulse { 0%,100% { border-color: #1db954; box-shadow: 0 0 10px rgba(29,185,84,0.5); } 50% { border-color: #00ff88; box-shadow: 0 0 20px rgba(29,185,84,0.8); } }

        .hidden-player { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -1; }

        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; background: var(--bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            height: 50px; display: flex; align-items: center; padding: 0 12px; gap: 10px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: clamp(0.8rem, 2.5vw, 1rem); font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn, .zoom-btn { 
            background: none; border: none; color: var(--text); 
            font-size: clamp(0.9rem, 2.5vw, 1.1rem); cursor: pointer; padding: 4px; 
        }
        .mir-btn {
            background: var(--surface2); border: 2px solid var(--green); border-radius: 15px;
            color: var(--green); padding: 4px 10px; font-size: clamp(0.6rem, 1.5vw, 0.7rem); 
            cursor: pointer; transition: all 0.2s; margin-left: 8px; white-space: nowrap;
        }
        .mir-btn.active { background: var(--green); color: #000; animation: detectedPulse 1.5s ease-in-out infinite; }

        /* SEARCH */
        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 14px); 
            background: transparent; border: none;
            color: var(--input-text); font-size: clamp(0.8rem, 2vw, 0.9rem); outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); }
        .search-btn {
            width: clamp(36px, 10vw, 42px); background: var(--surface2); border: none; 
            color: var(--text); cursor: pointer; font-size: clamp(0.9rem, 2.5vw, 1rem); 
            display: flex; align-items: center; justify-content: center;
        }

        /* TABS */
        .tabs-container { 
            display: flex; gap: 4px; padding: 4px 12px 8px; background: var(--bg); 
            overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: clamp(5px, 1.5vw, 6px) clamp(10px, 3vw, 14px); 
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); 
            font-size: clamp(0.65rem, 1.8vw, 0.75rem); cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
            flex-shrink: 0;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* PAGE COUNTER */
        .page-counter {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 8px 0; margin-top: 8px;
        }
        .page-info {
            font-size: clamp(0.7rem, 1.5vw, 0.8rem); color: var(--text2);
            min-width: 80px; text-align: center;
        }
        .page-btn {
            padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text); 
            font-size: clamp(0.7rem, 1.5vw, 0.8rem); cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .page-btn:active { background: var(--red); color: #fff; }
        .page-btn:disabled { opacity: 0.3; pointer-events: none; }
        .page-jump {
            width: clamp(30px, 8vw, 40px); text-align: center;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); 
            font-size: clamp(0.7rem, 1.5vw, 0.8rem); padding: 6px;
        }
        .page-jump:focus { outline: none; border-color: var(--red); }

        /* MIR PANEL */
        .mir-panel {
            display: none; background: linear-gradient(135deg, #0a1a0a, #1a2a1a);
            border: 2px solid var(--green); border-radius: 12px; margin: 0 12px 8px;
            padding: 12px; animation: slideUp 0.4s ease;
        }
        .mir-panel.active { display: block; }
        .mir-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .mir-title { font-size: clamp(0.75rem, 2vw, 0.85rem); font-weight: 600; color: var(--green); }
        .mir-status { font-size: clamp(0.6rem, 1.5vw, 0.7rem); color: var(--text2); }
        .mir-visualizer { width: 100%; height: clamp(40px, 15vw, 60px); background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .mir-waveform { display: flex; align-items: flex-end; height: 100%; padding: 4px; gap: 2px; }
        .mir-bar { flex: 1; background: linear-gradient(to top, var(--green), #00ff88); border-radius: 1px; transition: height 0.05s; min-height: 2px; }
        .mir-segments { max-height: clamp(100px, 30vh, 150px); overflow-y: auto; }
        .mir-segment {
            display: flex; align-items: center; gap: 8px; padding: 6px 8px;
            background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s; font-size: clamp(0.65rem, 1.5vw, 0.75rem);
        }
        .mir-seg-time { color: var(--green); font-weight: 600; min-width: clamp(35px, 10vw, 45px); }
        .mir-seg-name { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mir-seg-arrow { color: var(--text3); }

        /* RESULTS */
        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem); font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: clamp(0.6rem, 1.5vw, 0.65rem); color: var(--text3); }
        .video-card {
            display: flex; gap: clamp(6px, 2vw, 10px); background: var(--surface); border-radius: 8px;
            padding: clamp(6px, 1.5vw, 8px); cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { 
            width: clamp(36px, 12vw, 48px); height: clamp(36px, 12vw, 48px); 
            border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); 
        }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { 
            font-size: clamp(0.75rem, 2vw, 0.85rem); font-weight: 500; color: var(--text); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .video-channel { font-size: clamp(0.65rem, 1.5vw, 0.7rem); color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: clamp(22px, 7vw, 26px); height: clamp(22px, 7vw, 26px); 
            border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: clamp(9px, 2.5vw, 11px); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }

        /* SPOTIFY BAR */
        .spotify-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; padding: 0 12px; gap: clamp(6px, 2vw, 10px);
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art { 
            width: clamp(38px, 13vw, 52px); height: clamp(38px, 13vw, 52px); 
            border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; background: var(--surface2); 
        }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .sp-title { 
            font-size: clamp(0.75rem, 2vw, 0.9rem); font-weight: 600; color: #fff; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .sp-artist { 
            font-size: clamp(0.6rem, 1.5vw, 0.7rem); color: rgba(255,255,255,0.7); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; }
        .sp-controls { display: flex; gap: clamp(8px, 3vw, 12px); align-items: center; }
        .sp-btn { 
            background: none; border: none; color: rgba(255,255,255,0.9); 
            font-size: clamp(0.8rem, 2.5vw, 1rem); cursor: pointer; padding: clamp(4px, 1.5vw, 6px); 
            transition: all 0.2s; 
        }
        .sp-btn.play { 
            width: clamp(36px, 11vw, 44px); height: clamp(36px, 11vw, 44px); 
            background: #fff; border-radius: 50%; color: #000; font-size: clamp(0.8rem, 2.5vw, 1rem); 
        }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-btn.segment { font-size: clamp(0.7rem, 2vw, 0.8rem); color: var(--green); }
        .sp-dl {
            background: rgba(29,185,84,0.15); border: none; color: var(--green);
            font-size: clamp(0.65rem, 1.5vw, 0.75rem); cursor: pointer; 
            padding: clamp(4px, 1.5vw, 6px) clamp(8px, 2.5vw, 10px); border-radius: 15px;
        }
        .sp-dl.downloading { animation: downloading 0.8s infinite; }

        /* TOAST */
        .toast {
            position: fixed; bottom: calc(var(--player-h) + 20px); left: 50%;
            transform: translateX(-50%) translateY(120px); background: #333;
            color: #fff; padding: 8px 16px; border-radius: 20px; 
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            z-index: 600; transition: transform 0.3s; white-space: nowrap;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { 
            width: clamp(24px, 7vw, 30px); height: clamp(24px, 7vw, 30px); 
            border: 3px solid var(--border); border-top-color: var(--red); 
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; 
        }

        /* PLAYER VIDEO */
        .player-container {
            width: 100%; background: #000; display: none; position: relative;
            animation: slideUp 0.4s ease; border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px; width: clamp(28px, 8vw, 32px); 
            height: clamp(28px, 8vw, 32px); border-radius: 50%; background: rgba(0,0,0,0.7); 
            border: none; color: #fff; font-size: clamp(14px, 4vw, 16px); cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <div class="hidden-player" id="hiddenPlayer"></div>
        
        <!-- Indicador de escala -->
        <div class="scale-indicator" id="scaleIndicator">100%</div>

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="logo">
                <div class="logo-icon">♪</div>
                <span class="logo-text">Play Tube<sup>MUSIC</sup></span>
            </div>
            <div class="spacer"></div>
            <button class="zoom-btn" onclick="toggleZoom()" title="Ajustar Tela">🔍</button>
            <button class="mir-btn" id="mirToggleBtn" onclick="toggleMIR()" title="Detecção Inteligente">🎼 MIR</button>
            <button class="theme-btn" onclick="T.cycle()" title="Tema">🎨</button>
        </div>

        <!-- MIR PANEL -->
        <div class="mir-panel" id="mirPanel">
            <div class="mir-header">
                <span class="mir-title">🎼 Detecção Musical Inteligente</span>
                <span class="mir-status" id="mirStatus">🔴 Inativo</span>
            </div>
            <div class="mir-visualizer">
                <div class="mir-waveform" id="mirWaveform"></div>
            </div>
            <div class="mir-segments" id="mirSegments">
                <div style="text-align:center;color:var(--text3);font-size:0.7rem;">Ative o MIR durante a reprodução</div>
            </div>
        </div>

        <!-- PLAYER VIDEO -->
        <div class="player-container" id="playerContainer">
            <div class="player-wrapper" id="playerWrapper"></div>
            <button class="player-close" onclick="closeVideo()">✕</button>
        </div>

        <!-- BUSCA -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🎵 Buscar música..." autocomplete="off">
                <button class="search-btn" id="searchBtn">🔍</button>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Buscar</button>
            <button class="tab-btn" onclick="switchTab('favorites')">❤️ Favoritos</button>
            <button class="tab-btn" onclick="switchTab('history')">🕐 Histórico</button>
            <button class="tab-btn" onclick="switchTab('downloads')">⬇️ Downloads</button>
            <button class="tab-btn" onclick="switchTab('segments')">🎼 Segmentos</button>
        </div>

        <!-- RESULTADOS -->
        <div class="results-section">
            <div class="section-title" id="sectionTitle">
                <span>Resultados</span>
                <span class="result-count" id="resultCount"></span>
            </div>
            <div id="resultsContainer">
                <div style="text-align:center;padding:50px;color:var(--text2);">
                    <div style="font-size:clamp(2rem, 8vw, 3rem);">🎧</div>
                    <div style="font-size:clamp(0.9rem, 3vw, 1.1rem);color:var(--text);">Play Tube Music Pro</div>
                    <div style="font-size:clamp(0.7rem, 2vw, 0.8rem);color:var(--text3);">com Detecção Inteligente de Músicas</div>
                </div>
            </div>
            <!-- CONTROLE DE PÁGINAS -->
            <div class="page-counter" id="pageCounter" style="display:none;">
                <button class="page-btn" onclick="changePage('first')" title="Primeira">⏮</button>
                <button class="page-btn" onclick="changePage('prev')" title="Anterior">◀</button>
                <span class="page-info" id="pageInfo">Pág 1 de 1</span>
                <button class="page-btn" onclick="changePage('next')" title="Próxima">▶</button>
                <button class="page-btn" onclick="changePage('last')" title="Última">⏭</button>
                <input type="number" class="page-jump" id="pageJump" min="1" placeholder="Pág" onkeydown="if(event.key==='Enter')jumpToPage()">
            </div>
        </div>
    </div>

    <!-- BARRA SPOTIFY -->
    <div class="spotify-bar" id="spotifyBar">
        <div class="sp-progress" id="progressContainer" onclick="seekTrack(event)">
            <div class="sp-progress-bar" id="progressBar"></div>
        </div>
        <img class="sp-art" id="spArt" src="" alt="" onclick="showVideo()">
        <div class="sp-info" onclick="showVideo()">
            <div class="sp-title" id="spTitle">Nenhuma música</div>
            <div class="sp-artist" id="spArtist">Toque para tocar</div>
        </div>
        <div class="sp-controls">
            <button class="sp-btn" onclick="prevTrack()">⏮</button>
            <button class="sp-btn segment" onclick="jumpToPrevSegment()" title="Segmento anterior">⏪</button>
            <button class="sp-btn play" id="spPlay" onclick="togglePlay()">▶</button>
            <button class="sp-btn segment" onclick="jumpToNextSegment()" title="Próximo segmento">⏩</button>
            <button class="sp-btn" onclick="nextTrack()">⏭</button>
        </div>
        <button class="sp-dl" id="spDL" onclick="downloadCurrent()" title="Download">⬇</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';
        
        // ===== AUTO AJUSTE DE TELA =====
        const AutoSize = {
            currentZoom: 1,
            zoomLevels: [0.8, 0.9, 1, 1.1, 1.2],
            zoomIndex: 2, // Começa em 100%
            
            calibrate() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                const portrait = h > w;
                const mobile = w < 768;
                
                // Ajustar altura do player
                let ph = mobile ? (portrait ? 70 : 55) : 80;
                document.documentElement.style.setProperty('--player-h', ph + 'px');
                
                // Safe area para notch
                const sb = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-bottom)')) || 0;
                document.documentElement.style.setProperty('--safe-b', sb + 'px');
                document.body.style.paddingBottom = `calc(${ph}px + ${sb}px + 15px)`;
                
                // Auto font-size baseado na largura
                let fs;
                if (w < 320) fs = 12;
                else if (w < 360) fs = 13;
                else if (w < 400) fs = 14;
                else if (w < 480) fs = 15;
                else if (w < 768) fs = 16;
                else fs = 17;
                
                document.documentElement.style.fontSize = (fs * this.currentZoom) + 'px';
                
                // Ajustar largura do container
                const container = document.querySelector('.app-container');
                if (container) {
                    if (w > 768) {
                        container.style.maxWidth = Math.min(550, w * 0.9) + 'px';
                    } else {
                        container.style.maxWidth = '100%';
                    }
                }
                
                this.updateScaleIndicator();
            },
            
            toggleZoom() {
                this.zoomIndex = (this.zoomIndex + 1) % this.zoomLevels.length;
                this.currentZoom = this.zoomLevels[this.zoomIndex];
                this.calibrate();
                
                const percent = Math.round(this.currentZoom * 100);
                toast(`🔍 Zoom: ${percent}%`);
                this.showScaleIndicator();
            },
            
            updateScaleIndicator() {
                const indicator = document.getElementById('scaleIndicator');
                if (indicator) {
                    const percent = Math.round(this.currentZoom * 100);
                    indicator.textContent = `📱 ${percent}% | ${window.innerWidth}x${window.innerHeight}`;
                }

            showScaleIndicator() {
                const indicator = document.getElementById('scaleIndicator');
                if (indicator) {
                    indicator.classList.add('show');

        };

        // ===== SISTEMA DE PÁGINAS =====
        const Paginator = {
            currentPage: 1,
            totalPages: 1,
            itemsPerPage: 10,
            currentItems: [],
            
            init(items, itemsPerPage = 10) {
                this.currentItems = items || [];
                this.itemsPerPage = itemsPerPage;
                this.totalPages = Math.ceil(this.currentItems.length / this.itemsPerPage) || 1;
                this.currentPage = 1;
                this.updateUI();
            },
            
            getPageItems() {
                const start = (this.currentPage - 1) * this.itemsPerPage;
                const end = start + this.itemsPerPage;
                return this.currentItems.slice(start, end);
            },
            
            changePage(action) {
                switch(action) {
                    case 'first': this.currentPage = 1; break;
                    case 'prev': if (this.currentPage > 1) this.currentPage--; break;
                    case 'next': if (this.currentPage < this.totalPages) this.currentPage++; break;
                    case 'last': this.currentPage = this.totalPages; break;
                }
                this.updateUI();
                
                // Disparar evento para recarregar conteúdo
                if (typeof window.onPageChange === 'function') {
                    window.onPageChange(this.currentPage, this.getPageItems());
                }
            },
            
            jumpTo(page) {
                page = parseInt(page);
                if (page >= 1 && page <= this.totalPages) {
                    this.currentPage = page;
                    this.updateUI();
                    
                    if (typeof window.onPageChange === 'function') {
                        window.onPageChange(this.currentPage, this.getPageItems());
                    }
                }
            },
            
            updateUI() {
                const counter = document.getElementById('pageCounter');
                const info = document.getElementById('pageInfo');
                const jump = document.getElementById('pageJump');
                
                if (this.totalPages <= 1) {
                    if (counter) counter.style.display = 'none';
                } else {
                    if (counter) counter.style.display = 'flex';
                    if (info) info.textContent = `Pág ${this.currentPage} de ${this.totalPages}`;
                    if (jump) {
                        jump.max = this.totalPages;
                        jump.value = '';
                        jump.placeholder = `1-${this.totalPages}`;
                    }
                    
                    // Atualizar estado dos botões
                    const buttons = document.querySelectorAll('.page-btn');
                    buttons.forEach(btn => {
                        const action = btn.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
                        if (action === 'first' || action === 'prev') {
                            btn.disabled = this.currentPage === 1;
                        }
                        if (action === 'next' || action === 'last') {
                            btn.disabled = this.currentPage === this.totalPages;
                        }
                    });
                }
                
                // Atualizar contador de resultados
                const total = this.currentItems.length;
                const start = (this.currentPage - 1) * this.itemsPerPage + 1;
                const end = Math.min(this.currentPage * this.itemsPerPage, total);
                
                const resultCount = document.getElementById('resultCount');
                if (resultCount && total > 0) {
                    resultCount.textContent = total > this.itemsPerPage ? 
                        `${start}-${end} de ${total}` : 
                        `${total} itens`;
                }
            }
        };

                    this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f');
                try { localStorage.setItem('theme', this.current); } catch(e) {}
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }

            stop() {
                this.active = false;
                if (this._animFrame) cancelAnimationFrame(this._animFrame);
                this.updateUI();
                document.getElementById('mirWaveform').innerHTML = '';
                toast('🎼 MIR Desativado');
            },
            
            detectMusic() {
                if (!this.active || !playing) return;
                const time = yt?.getCurrentTime?.() || 0;
                if (isNaN(time)) return;
                
                const shouldDetect = Math.random() < 0.01;
                if (shouldDetect || this.segments.length === 0) {
                    this.musicCount++;
                    const seg = { id: Date.now(), start: time, end: null, name: `Música ${this.musicCount}`, duration: null };
                    
                    if (this.segments.length > 0) {
                        const last = this.segments[this.segments.length - 1];
                        if (!last.end) { last.end = time; last.duration = time - last.start; }
                    }
                    
                    this.segments.push(seg);
                    this.currentSegment = this.segments.length - 1;
                    this.updateSegmentsList();
                    setStorage('mir_segments', this.segments);
                    
                    if (this.segments.length > 1) toast(`🎵 ${seg.name} detectada!`);
                }
            },
            
            startVisualization() {
                const container = document.getElementById('mirWaveform');
                if (!container) return;
                
                const update = () => {
                    if (!this.active) return;
                    const numBars = 40;
                    let bars = '';
                    const energy = playing ? 0.5 + Math.random() * 0.5 : 0.1;
                    
                    for (let i = 0; i < numBars; i++) {
                        const height = Math.min(100, Math.max(2, energy * 80 + Math.sin(Date.now() * 0.005 + i * 0.5) * 20));
                        bars += `<div class="mir-bar" style="height:${height}px"></div>`;
                    }
                    container.innerHTML = bars;
                    this.detectMusic();
                    this._animFrame = requestAnimationFrame(update);
                };
                
                this._animFrame = requestAnimationFrame(update);
            },
            
            jumpToSegment(index) {
                if (!yt || index < 0 || index >= this.segments.length) return;
                const seg = this.segments[index];
                if (seg.start !== null && !isNaN(seg.start)) {
                    yt.seekTo(seg.start, true);
                    this.currentSegment = index;
                    toast(`⏩ ${seg.name} - ${formatTime(seg.start)}`);
                    this.updateSegmentsList();
                }
            },
            
            jumpNext() { if (this.currentSegment < this.segments.length - 1) this.jumpToSegment(this.currentSegment + 1); },
            jumpPrev() { if (this.currentSegment > 0) this.jumpToSegment(this.currentSegment - 1); },
            
            updateSegmentsList() {
                const container = document.getElementById('mirSegments');
                if (!container) return;
                if (!this.segments.length) {
                    container.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:0.7rem;">Nenhum segmento detectado</div>';
                    return;
                }
                container.innerHTML = this.segments.map((seg, i) => `
                    <div class="mir-segment" onclick="MIR.jumpToSegment(${i})"
                         style="${i === this.currentSegment ? 'background:rgba(29,185,84,0.2);border:1px solid var(--green);' : ''}">
                        <span class="mir-seg-time">${formatTime(seg.start)}${seg.end ? ' - ' + formatTime(seg.end) : ''}</span>
                        <span class="mir-seg-name">${seg.name} ${seg.duration ? '(' + Math.round(seg.duration) + 's)' : ''}</span>
                        <span class="mir-seg-arrow">▶</span>
                    </div>
                `).join('');
            },
            
            updateUI() {
                const btn = document.getElementById('mirToggleBtn');
                const panel = document.getElementById('mirPanel');
                const status = document.getElementById('mirStatus');
                if (this.active) {
                    btn.classList.add('active'); btn.textContent = '🎼 MIR ON';
                    panel.classList.add('active');
                    status.textContent = '🟢 Analisando'; status.style.color = '#1db954';
                } else {
                    btn.classList.remove('active'); btn.textContent = '🎼 MIR';

                }
            }
        };

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === null) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // ===== YOUTUBE PLAYER =====
        let yt = null, ytTop = null, playlist = [], idx = -1, playing = false, vid = null;
        let toastTO = null, query = '', progInt = null, isVideo = false;

        function initPlayer() {
            if (yt) { try { yt.destroy(); } catch(e) {} }
            yt = new YT.Player('hiddenPlayer', {
                height: '360', width: '640', videoId: '',
                playerVars: { autoplay: 0, playsinline: 1, controls: 0, disablekb: 1, fs: 0, rel: 0, modestbranding: 1, iv_load_policy: 3, origin: window.location.origin, enablejsapi: 1, mute: 0, volume: 100 },
                events: {
                    onReady: (e) => { e.target.setVolume(100); e.target.unMute(); },
                    onStateChange: onState,
                    onError: (e) => { if (e.data === 2 || e.data === 5) setTimeout(() => { if (vid) yt?.loadVideoById?.({ videoId: vid, startSeconds: 0 }); }, 2000); }
                }
            });
        }

        window.onYouTubeIframeAPIReady = () => initPlayer();
        if (typeof YT !== 'undefined') setTimeout(initPlayer, 100);

        function onState(e) {
            if (e.data === 1) { playing = true; updatePlayBtn(true); startProgress(); }
            else if (e.data === 2) { playing = false; updatePlayBtn(false); stopProgress(); }
            else if (e.data === 0) { stopProgress(); document.getElementById('progressBar').style.width = '0%'; nextTrack(); }
        }

        function startProgress() {
            stopProgress();
            progInt = setInterval(() => {
                if (!yt || !playing) return;
                try { const d = yt.getDuration(), c = yt.getCurrentTime(); if (d > 0) document.getElementById('progressBar').style.width = (c / d) * 100 + '%'; } catch(e) {}
            }, 1000);
        }

        function stopProgress() { if (progInt) { clearInterval(progInt); progInt = null; } }
        function updatePlayBtn(p) { const btn = document.getElementById('spPlay'); btn.textContent = p ? '⏸' : '▶'; btn.classList.toggle('playing', p); }

        function playTrack(i = -1) {
            if (i >= 0 && i < playlist.length) idx = i;
            if (idx < 0 || idx >= playlist.length) return;
            const t = playlist[idx]; vid = t.id; Fav.addHist(t);
            document.getElementById('progressBar').style.width = '0%';
            if (MIR.active) { MIR.segments = []; MIR.musicCount = 0; MIR.currentSegment = -1; MIR.updateSegmentsList(); }
            if (yt?.loadVideoById) {
                yt.loadVideoById({ videoId: t.id, startSeconds: 0 });
                setTimeout(() => { if (yt?.playVideo) { yt.playVideo(); yt.unMute(); yt.setVolume(100); } }, 300);
            }
            document.getElementById('spTitle').textContent = t.title || '';
            document.getElementById('spArtist').textContent = t.channel || '';
            document.getElementById('spArt').src = t.thumbnail || '';
            document.title = '▶ ' + (t.title || 'Play Tube Music');
            document.getElementById('spotifyBar').classList.add('active');
            closeVideo();
        }

            if (!yt) return;
            if (playing) { yt.pauseVideo(); if (ytTop) ytTop.pauseVideo(); }
            else if (vid) { yt.playVideo(); yt.unMute(); }
            else if (playlist.length > 0) playTrack(0);
        };
        window.nextTrack = () => { if (!playlist.length) return; document.getElementById('progressBar').style.width = '0%'; playTrack((idx + 1) % playlist.length); };
        window.prevTrack = () => { if (!playlist.length) return; document.getElementById('progressBar').style.width = '0%'; playTrack((idx - 1 + playlist.length) % playlist.length); };
        window.seekTrack = (e) => {
            if (!yt || !vid) return;
            const r = document.getElementById('progressContainer').getBoundingClientRect();

        async function searchYT(q) {
            if (!q) { toast('⚠️ Digite algo para buscar'); return; }
            const resCont = document.getElementById('resultsContainer');
            resCont.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>';
            document.getElementById('resultCount').textContent = '';
            
            try {
                // Simulação com mais resultados para testar paginação
                const mockResults = [];
                for (let i = 1; i <= 25; i++) {
                    mockResults.push({ id: `video${i}`, title: `${q} - Resultado ${i}`, channel: `Canal ${i}`, thumbnail: '' });
                }
                
                window.onPageChange = function(page, items) { resCont.innerHTML = items.map(v => card(v)).join(''); updateFavButtons(); };
                Paginator.init(mockResults, 10);
                resCont.innerHTML = Paginator.getPageItems().map(v => card(v)).join('');
                updateFavButtons();
            } catch(e) { toast('⚠️ Erro na busca'); }
        }

        // ===== CONTROLES DE PÁGINA =====
        window.changePage = (action) => Paginator.changePage(action);
        window.jumpToPage = () => {
            const page = parseInt(document.getElementById('pageJump').value);
            if (page) Paginator.jumpTo(page);
        };

        // ===== ZOOM =====
        window.toggleZoom = () => AutoSize.toggleZoom();

        // ===== UTILS =====
        function toast(m) {
            if (toastTO) clearTimeout(toastTO);
            const el = document.getElementById('toast');
            el.textContent = m; el.classList.add('show');
            toastTO = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ===== MEDIA SESSION =====
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
        }

        // ===== INIT =====
        function init() {
            AutoSize.calibrate();
            const waveform = document.getElementById('mirWaveform');
            if (waveform) { let bars = ''; for (let i = 0; i < 40; i++) bars += '<div class="mir-bar" style="height:2px"></div>'; waveform.innerHTML = bars; }
            console.log('✅ Play Tube Music Pro v8 - Auto Size + Pages');
        }
        
        window.addEventListener('resize', () => { clearTimeout(window._rt); window._rt = setTimeout(() => AutoSize.calibrate(), 250); });
        window.addEventListener('orientationchange', () => setTimeout(() => AutoSize.calibrate(), 300));
        window.addEventListener('load', init);
        window.addEventListener('error', (e) => { if (e.target && e.target.tagName === 'IMG') e.target.style.display = 'none'; }, true);

        // Expor globais
        window.T = T; window.MIR = MIR; window.AutoSize = AutoSize; window.Paginator = Paginator;
        window.changePage = window.changePage; window.jumpToPage = window.jumpToPage;
    })();
    </script>
</body>
</html>
