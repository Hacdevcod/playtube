<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https: http:;
        media-src 'self' https: http:;
        frame-src https://www.youtube.com https://www.youtube-nocookie.com;
        connect-src 'self' https: http:;
        font-src 'self' data:;
    ">
    
    <title>Play Tube Music Pro - MIR Detection</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --player-h: 80px;
            --safe-b: 0px;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-bottom: calc(var(--player-h) + var(--safe-b) + 15px);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }
        @keyframes detectedPulse { 0%,100% { border-color: #1db954; box-shadow: 0 0 10px rgba(29,185,84,0.5); } 50% { border-color: #00ff88; box-shadow: 0 0 20px rgba(29,185,84,0.8); } }

        .hidden-player { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -1; }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky; top: 0; background: var(--bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            height: 50px; display: flex; align-items: center; padding: 0 12px; gap: 10px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 1rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .mir-btn {
            background: var(--surface2); border: 2px solid var(--green); border-radius: 15px;
            color: var(--green); padding: 4px 10px; font-size: 0.7rem; cursor: pointer;
            transition: all 0.2s; margin-left: 8px;
        }
        .mir-btn.active { background: var(--green); color: #000; animation: detectedPulse 1.5s ease-in-out infinite; }
        .mir-btn:active { transform: scale(0.95); }

        /* ===== SEARCH ===== */
        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); opacity: 1; }
        .search-btn {
            width: 42px; background: var(--surface2); border: none; color: var(--text);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .search-btn:active { background: var(--red); color: #fff; }

        /* ===== TABS ===== */
        .tabs-container { display: flex; gap: 4px; padding: 4px 12px 8px; background: var(--bg); overflow-x: auto; }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        /* ===== MIR PANEL ===== */
        .mir-panel {
            display: none; background: linear-gradient(135deg, #0a1a0a, #1a2a1a);
            border: 2px solid var(--green); border-radius: 12px; margin: 0 12px 8px;
            padding: 12px; animation: slideUp 0.4s ease;
        }
        .mir-panel.active { display: block; }
        .mir-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .mir-title { font-size: 0.85rem; font-weight: 600; color: var(--green); }
        .mir-status { font-size: 0.7rem; color: var(--text2); }
        .mir-visualizer {
            width: 100%; height: 60px; background: rgba(0,0,0,0.3);
            border-radius: 8px; overflow: hidden; position: relative;
            margin-bottom: 10px;
        }
        .mir-waveform {
            display: flex; align-items: flex-end; height: 100%; padding: 4px;
            gap: 2px;
        }
        .mir-bar {
            flex: 1; background: linear-gradient(to top, var(--green), #00ff88);
            border-radius: 1px; transition: height 0.05s; min-height: 2px;
        }
        .mir-segments {
            max-height: 150px; overflow-y: auto;
        }
        .mir-segment {
            display: flex; align-items: center; gap: 8px; padding: 6px 8px;
            background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s; font-size: 0.75rem;
        }
        .mir-segment:active { background: rgba(29,185,84,0.3); transform: scale(0.98); }
        .mir-seg-time { color: var(--green); font-weight: 600; min-width: 45px; }
        .mir-seg-name { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mir-seg-arrow { color: var(--text3); }

        /* ===== RESULTS ===== */
        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title {
            font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 10px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { 
            width: 48px; height: 48px; border-radius: 6px; object-fit: cover; 
            flex-shrink: 0; background: var(--surface2);
        }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }
        .v-btn.dl:active { background: var(--green); }

        /* ===== SPOTIFY BAR ===== */
        .spotify-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; padding: 0 12px; gap: 10px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art {
            width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; cursor: pointer; transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background: var(--surface2);
        }
        .sp-art.playing { animation: spin 8s linear infinite; border-radius: 50%; box-shadow: 0 0 15px rgba(29,185,84,0.3); }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .sp-title { font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.7rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; animation: progressGlow 2s ease-in-out infinite; }
        .sp-controls { display: flex; gap: 12px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 1rem; cursor: pointer; padding: 6px; transition: all 0.2s; }
        .sp-btn:active { transform: scale(0.85); color: #fff; }
        .sp-btn.play {
            width: 44px; height: 44px; background: #fff; border-radius: 50%;
            color: #000; font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-btn.segment { font-size: 0.8rem; color: var(--green); }
        .sp-dl {
            background: rgba(29,185,84,0.15); border: none; color: var(--green);
            font-size: 0.75rem; cursor: pointer; padding: 6px 10px; border-radius: 15px;
            transition: all 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .sp-dl:active { background: rgba(29,185,84,0.3); transform: scale(0.95); }
        .sp-dl.downloading { animation: downloading 0.8s infinite; background: rgba(29,185,84,0.3); }

        /* ===== TOAST & LOADING ===== */
        .toast {
            position: fixed; bottom: calc(var(--player-h) + 20px); left: 50%;
            transform: translateX(-50%) translateY(120px); background: #333;
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem;
            z-index: 600; transition: transform 0.3s; white-space: nowrap;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--red); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        .dl-progress {
            position: fixed; bottom: calc(var(--player-h) + 10px); left: 12px; right: 12px;
            background: var(--surface); border-radius: 10px; padding: 10px;
            z-index: 300; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dl-progress.active { display: block; }
        .dl-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .dl-fill { height: 100%; background: linear-gradient(90deg, #1db954, #00e676); width: 0%; transition: width 0.3s; }

        /* ===== PLAYER VIDEO ===== */
        .player-container {
            width: 100%; background: #000; display: none; position: relative;
            animation: slideUp 0.4s ease; border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-container.rainbow-border { animation: rainbow 3s linear infinite; border-width: 2px; border-style: solid; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
            border-radius: 50%; background: rgba(0,0,0,0.7); border: none;
            color: #fff; font-size: 16px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 360px) { .sp-art { width: 42px; height: 42px; } .sp-btn.play { width: 38px; height: 38px; } .video-thumb { width: 40px; height: 40px; } }
        @media (min-width: 768px) { body { max-width: 550px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); } }
        @media (orientation: landscape) and (max-height: 500px) {
            :root { --player-h: 60px; }
            .sp-art { width: 38px; height: 38px; }
            .results-section { max-height: 35vh; overflow-y: auto; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="hidden-player" id="hiddenPlayer"></div>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">♪</div>
            <span class="logo-text">Play Tube<sup>MUSIC</sup></span>
        </div>
        <div class="spacer"></div>
        <button class="mir-btn" id="mirToggleBtn" onclick="toggleMIR()" title="Detecção Inteligente">🎼 MIR</button>
        <button class="theme-btn" onclick="calibrarTela();T.cycle()" title="Tema">🎨</button>
    </div>

    <!-- MIR PANEL -->
    <div class="mir-panel" id="mirPanel">
        <div class="mir-header">
            <span class="mir-title">🎼 Detecção Musical Inteligente</span>
            <span class="mir-status" id="mirStatus">🔴 Inativo</span>
        </div>
        <div class="mir-visualizer">
            <div class="mir-waveform" id="mirWaveform">
                <!-- Barras serão geradas via JS -->
            </div>
        </div>
        <div class="mir-segments" id="mirSegments">
            <div style="text-align:center;color:var(--text3);font-size:0.7rem;">Ative o MIR durante a reprodução para detectar músicas</div>
        </div>
    </div>

    <!-- PLAYER VIDEO -->
    <div class="player-container" id="playerContainer">

    <!-- BUSCA -->

    <!-- RESULTADOS -->
    <div class="results-section">
        <div class="section-title" id="sectionTitle"><span>Resultados</span><span class="result-count" id="resultCount"></span></div>
        <div id="resultsContainer">
            <div style="text-align:center;padding:50px;color:var(--text2);">
                <div style="font-size:3rem;">🎧</div>
                <div style="font-size:1.1rem;color:var(--text);">Play Tube Music Pro</div>
                <div style="font-size:0.8rem;color:var(--text3);">com Detecção Inteligente de Músicas</div>
            </div>
        </div>
    </div>

    <!-- BARRA SPOTIFY -->
    <div class="spotify-bar" id="spotifyBar">
        <div class="sp-progress" id="progressContainer" onclick="seekTrack(event)">
            <div class="sp-progress-bar" id="progressBar"></div>
        </div>
        <img class="sp-art" id="spArt" src="" alt="" onclick="showVideo()" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23777%22 font-size=%2214%22%3E♪%3C/text%3E%3C/svg%3E'">

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- DOWNLOAD PROGRESS -->
    <div class="dl-progress" id="dlProgress">

            <span style="color:var(--text);font-size:0.75rem;">⬇️ Baixando...</span>
            <span style="color:var(--text2);font-size:0.7rem;" id="dlPercent">0%</span>
        </div>
        <div class="dl-bar"><div class="dl-fill" id="dlFill"></div></div>
    </div>

    <!-- MEYDA (MIR Library) -->
    <script src="https://cdn.jsdelivr.net/npm/meyda@5.5.2/dist/web/meyda.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
    (function() {
        'use strict';
        const PROXY = 'https://playtube-proxy.codw23.workers.dev';

        // ===== CALIBRAR TELA =====
        function calibrarTela() {
            const w = window.innerWidth, h = window.innerHeight;
            const portrait = h > w, mobile = w < 768;
            let ph = mobile ? (portrait ? 70 : 55) : 80;
            document.documentElement.style.setProperty('--player-h', ph + 'px');
            const sb = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-bottom)')) || 0;
            document.documentElement.style.setProperty('--safe-b', sb + 'px');
            document.body.style.paddingBottom = `calc(${ph}px + ${sb}px + 15px)`;
            let fs = w < 360 ? 13 : w < 768 ? 14 : 16;
            document.documentElement.style.fontSize = fs + 'px';
        }

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                document.querySelector('meta[name="theme-color"]').setAttribute('content',
                    this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f');
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();

        // ===== MIR - Detecção Inteligente de Músicas =====
        const MIR = {
            active: false,
            audioContext: null,
            source: null,
            analyser: null,
            meyda: null,
            segments: JSON.parse(localStorage.getItem('mir_segments') || '[]'),
            currentSegment: -1,
            silenceThreshold: 0.02,
            minSegmentDuration: 3,
            silenceDuration: 0,
            lastEnergy: 0,
            energyHistory: [],
            peakDetected: false,
            musicCount: 0,
            animationFrame: null,

            async init() {
                if (this.active) return;
                try {
                    // Verificar se Meyda está disponível
                    if (typeof Meyda === 'undefined') {
                        throw new Error('Meyda não carregado');
                    }

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Criar analisador
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 2048;
                    this.analyser.smoothingTimeConstant = 0.8;

                    // Inicializar Meyda com configuração correta
                    this.meyda = Meyda.createMeydaAnalyzer({
                        audioContext: this.audioContext,
                        source: this.analyser,
                        bufferSize: 512,
                        featureExtractors: ['rms', 'energy', 'spectralCentroid', 'zcr'],
                        callback: (features) => {
                            if (features && this.active) {
                                this.analyzeFeatures(features);
                            }
                        }
                    });

                    if (this.meyda) {
                        this.meyda.start();
                        this.active = true;
                        this.updateUI();
                        this.startVisualization();
                        toast('🎼 MIR Ativado - Detectando músicas...');
                    }
                } catch(e) {
                    console.error('Erro MIR:', e);
                    toast('⚠️ Erro ao ativar MIR: ' + e.message);
                    this.active = false;
                    this.updateUI();
                }
            },

            analyzeFeatures(features) {
                if (!features || !this.active || !yt || !playing) return;

                const energy = features.rms || 0;
                const spectralCentroid = features.spectralCentroid || 0;

                // Atualizar histórico de energia
                this.lastEnergy = energy;
                this.energyHistory.push(energy);
                if (this.energyHistory.length > 10) this.energyHistory.shift();

                const time = yt.getCurrentTime() || 0;

                // Detecção de silêncio
                if (energy < this.silenceThreshold) {
                    this.silenceDuration += 0.1;
                    if (this.silenceDuration > 1.5 && this.peakDetected) {
                        this.markSegmentEnd(time);
                        this.peakDetected = false;
                        this.silenceDuration = 0;
                    }
                } else {
                    if (this.silenceDuration > 0.5 && !this.peakDetected) {
                        this.markSegmentStart(time);
                        this.peakDetected = true;
                    }
                    this.silenceDuration = 0;
                }

                // Detecção de picos de energia
                const avgEnergy = this.energyHistory.reduce((a,b) => a + b, 0) / this.energyHistory.length;
                if (energy > avgEnergy * 2.5 && !this.peakDetected && this.energyHistory.length >= 5) {
                    this.peakDetected = true;
                    this.markSegmentStart(time);
                }
            },

            markSegmentStart(time) {
                if (isNaN(time)) return;
                
                const lastSeg = this.segments[this.segments.length - 1];
                if (lastSeg && (time - lastSeg.start) < this.minSegmentDuration) return;

                this.musicCount++;
                this.segments.push({
                    id: Date.now(),
                    start: time,
                    end: null,
                    name: `Música ${this.musicCount}`,
                    energy: this.lastEnergy
                });
                
                this.currentSegment = this.segments.length - 1;
                this.updateSegmentsList();
                this.saveSegments();
                
                if (this.segments.length > 1) {
                    toast(`🎵 ${this.segments[this.currentSegment].name} detectada!`);
                }
            },

            markSegmentEnd(time) {
                if (isNaN(time)) return;
                
                const lastSeg = this.segments[this.segments.length - 1];
                if (lastSeg && !lastSeg.end) {
                    lastSeg.end = time;
                    lastSeg.duration = time - lastSeg.start;
                    this.updateSegmentsList();
                    this.saveSegments();
                }
            },

            startVisualization() {
                const updateVis = () => {
                    if (!this.active) return;
                    
                    const container = document.getElementById('mirWaveform');
                    if (container && this.energyHistory.length > 0) {
                        const numBars = 40;
                        const avgEnergy = this.energyHistory.reduce((a,b) => a + b, 0) / this.energyHistory.length;
                        let bars = '';
                        
                        for (let i = 0; i < numBars; i++) {
                            const variation = Math.sin(Date.now() * 0.005 + i * 0.5) * 0.3;
                            const height = Math.min(100, Math.max(2, 
                                (avgEnergy * 400) + 
                                variation * 30 + 
                                Math.random() * 5
                            ));
                            bars += `<div class="mir-bar" style="height:${height}px"></div>`;
                        }
                        container.innerHTML = bars;
                    }
                    
                    this.animationFrame = requestAnimationFrame(updateVis);
                };
                
                this.animationFrame = requestAnimationFrame(updateVis);
            },

            jumpToSegment(index) {
                if (!yt || index < 0 || index >= this.segments.length) return;
                const seg = this.segments[index];
                if (seg.start !== null && !isNaN(seg.start)) {
                    yt.seekTo(seg.start, true);
                    this.currentSegment = index;
                    toast(`⏩ ${seg.name} - ${formatTime(seg.start)}`);
                    this.updateSegmentsList();
                }
            },

            jumpToNextSegment() {
                if (this.currentSegment < this.segments.length - 1) {
                    this.jumpToSegment(this.currentSegment + 1);
                } else {
                    toast('📌 Última música detectada');
                }
            },

            jumpToPrevSegment() {
                if (this.currentSegment > 0) {
                    this.jumpToSegment(this.currentSegment - 1);
                } else {
                    toast('📌 Primeira música detectada');
                }
            },

            updateSegmentsList() {
                const container = document.getElementById('mirSegments');
                if (!container) return;
                
                if (!this.segments.length) {
                    container.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:0.7rem;">Nenhum segmento detectado ainda</div>';
                    return;
                }
                
                container.innerHTML = this.segments.map((seg, i) => `
                    <div class="mir-segment ${i === this.currentSegment ? 'active' : ''}" 
                         onclick="MIR.jumpToSegment(${i})"
                         style="${i === this.currentSegment ? 'background:rgba(29,185,84,0.2);border:1px solid var(--green);' : ''}">
                        <span class="mir-seg-time">${formatTime(seg.start)}${seg.end && !isNaN(seg.end) ? ' - ' + formatTime(seg.end) : ''}</span>
                        <span class="mir-seg-name">${seg.name} ${seg.duration ? '(' + Math.round(seg.duration) + 's)' : '(em andamento)'}</span>
                        <span class="mir-seg-arrow">▶</span>
                    </div>
                `).join('');
            },

            updateUI() {
                const btn = document.getElementById('mirToggleBtn');
                const panel = document.getElementById('mirPanel');
                const status = document.getElementById('mirStatus');
                
                if (btn && panel && status) {
                    if (this.active) {

                        status.textContent = '🔴 Inativo';
                        status.style.color = 'var(--text2)';

                }
            },

            saveSegments() {

                } catch(e) {

            },

            stop() {

                }

                    } catch(e) {}
                    this.meyda = null;
                }
                
                if (this.audioContext) {
                    try {
                        this.audioContext.close();
                    } catch(e) {}
                    this.audioContext = null;
                }
                
                this.updateUI();
                
                const waveform = document.getElementById('mirWaveform');
                if (waveform) {
                    let bars = '';
                    for (let i = 0; i < 40; i++) bars += '<div class="mir-bar" style="height:2px"></div>';
                    waveform.innerHTML = bars;
                }
                
                toast('🎼 MIR Desativado');
            }
        };

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === null || seconds === undefined) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);

        }

        }, 3000);

        function onState(e) {
            if (e.data === 1) { // Playing
                playing = true; 
                updateUI(true); 
                startProg(); 
                if (MIR.active && !MIR.audioContext) {
                    MIR.init();
                }
            } else if (e.data === 2) { // Paused
                playing = false; 
                updateUI(false); 
                stopProg(); 
            } else if (e.data === 0) { // Ended
                stopProg(); 
                progBar.style.width = '0%'; 
                if (MIR.active && yt) {
                    MIR.markSegmentEnd(yt.getDuration());
                }
                nextTrack();

            progInt = setInterval(() => { 
                if (!yt || !playing) return; 
                try { 
                    const d = yt.getDuration(); 
                    const c = yt.getCurrentTime(); 
                    if (d > 0) {
                        const percent = (c / d) * 100;
                        if (!isNaN(percent)) {
                            progBar.style.width = percent + '%';
                        }
                    }
                } catch(e) {} 
            }, 1000);

                MIR.musicCount = 0;
                MIR.updateSegmentsList();

                try {

                const f = Fav.favs; 
                resCount.textContent = f.length + ' items';
                resCont.innerHTML = f.length ? f.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">❤️ Nenhum favorito</div>';
                updateFavBtns();
            } else if (t === 'history') {
                const h = Fav.hist; 
                resCount.textContent = h.length + ' itens';
                resCont.innerHTML = h.length ? h.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">🕐 Histórico vazio</div>';
                updateFavBtns();
            } else if (t === 'downloads') {
                const d = DL.all(); 
                resCount.textContent = d.length + ' itens';
                resCont.innerHTML = d.length ? d.map(v => card(v)).join('') : '<div style="text-align:center;padding:40px;color:var(--text2);">📥 Nenhum download</div>';
                updateFavBtns();
            }
        };

        // ===== BUSCA =====
        sBtn.addEventListener('click', () => { 
            query = sInput.value.trim(); 
            searchYT(query); 
        });
        
        sInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') { 
                query = sInput.value.trim(); 
                searchYT(query); 
            } 
        });
        
        async function searchYT(q) {
            if (!q) { 
                toast('⚠️ Digite algo para buscar'); 
                return; 
            }
            
            showLoad(true); 
            resCount.textContent = '';
            
            try {
                const u = new URL(PROXY); 
                u.searchParams.append('q', q + ' música'); 
                u.searchParams.append('maxResults', '15'); 
                u.searchParams.append('regionCode', 'BR'); 
                u.searchParams.append('relevanceLanguage', 'pt');
                
                const r = await fetch(u); 
                if (!r.ok) throw new Error('Erro na busca');
                
                const d = await r.json();
                resCount.textContent = d.totalResults ? `${d.totalResults} resultados` : '';
                resCont.innerHTML = d.videos?.length ? 
                    d.videos.map(v => card(v)).join('') : 
                    '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado encontrado</div>';
                updateFavBtns();
            } catch(e) { 
                console.error('Erro na busca:', e);
                toast('⚠️ Erro na busca. Tente novamente.'); 
                resCont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Erro ao buscar. Verifique sua conexão.</div>';
            }
            
            showLoad(false);
        }

        // ===== UTILS =====
        function esc(t) { 
            if (!t) return ''; 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }
        
        function showLoad(s) { 
            if (s) {
                resCont.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>'; 
            }
        }
        
        function toast(m) { 
            if (toastTO) clearTimeout(toastTO); 
            toastEl.textContent = m; 
            toastEl.classList.add('show'); 
            toastTO = setTimeout(() => toastEl.classList.remove('show'), 2500); 
        }

        // ===== MEDIA SESSION =====
        function setupMS() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.setActionHandler('play', togglePlay);
            navigator.mediaSession.setActionHandler('pause', togglePlay);
            navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
            navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            navigator.mediaSession.setActionHandler('stop', stopPlayback);
        }

        // ===== INIT =====
        function init() {
            setupMS(); 
            calibrarTela();
            
            // Inicializar visualizador MIR vazio
            const waveform = document.getElementById('mirWaveform');
            if (waveform) {
                let bars = '';
                for (let i = 0; i < 40; i++) bars += '<div class="mir-bar" style="height:2px"></div>';
                waveform.innerHTML = bars;
            }
            
            console.log('✅ Play Tube Music Pro v6 - MIR Integrated (Fixed)');
        }
        
        window.addEventListener('resize', () => { 
            clearTimeout(window._rt); 
            window._rt = setTimeout(calibrarTela, 250); 
        });
        
        window.addEventListener('orientationchange', () => setTimeout(calibrarTela, 300));
        window.addEventListener('load', init);

        // ===== ERROR HANDLING =====
        window.addEventListener('error', (e) => {
            if (e.target.tagName === 'IMG') {
                e.target.style.display = 'none';
            }
        }, true);

        // EXPORT GLOBAIS
        window.calibrarTela = calibrarTela; 
        window.T = T; 
        window.MIR = MIR;
        window.togglePlay = togglePlay; 
        window.nextTrack = nextTrack; 
        window.prevTrack = prevTrack;
        window.playFromResults = playFromResults; 
        window.toggleFav = toggleFav; 
        window.dlFromCard = dlFromCard;
        window.downloadCurrent = downloadCurrent; 
        window.switchTab = switchTab; 
        window.seekTrack = seekTrack;
        window.showVideo = showVideo; 
        window.closeVideo = closeVideo; 
        window.toggleMIR = toggleMIR;
        window.jumpToNextSegment = jumpToNextSegment; 
        window.jumpToPrevSegment = jumpToPrevSegment;
    })();
    </script>
</body>
</html>
