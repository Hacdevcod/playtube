<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    <meta name="google-signin-client_id" content="1015083213340-69q19u0bd6f232l6kmdcmk2hf3lqgrtj.apps.googleusercontent.com">
    
    <meta http-equiv="Content-Security-Policy" content="
        media-src * blob: mediastream:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com https://accounts.google.com https://apis.google.com;
        connect-src * blob: https://accounts.google.com https://apis.google.com;
        worker-src blob:;
        frame-src https://accounts.google.com;
    ">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='96' fill='%23ff0000'/><polygon points='80,60 80,132 140,96' fill='white'/></svg>">
    
    <title>Play Tube Music</title>
    
    <style>
        :root { 
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #272727;
            --red: #f00;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --border: #303030;
            --input-bg: #1a1a1a;
            --input-text: #fff;
            --input-ph: #717171;
            --green: #1db954;
            --blue: #4285f4;
            --player-h: 65px;
            --topbar-h: 50px;
            --safe-t: 0px;
            --safe-b: 0px;
            --nav-bar-h: 0px;
        }
        
        [data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --surface2: #e8e8e8;
            --border: #ddd;
            --text: #000;
            --text2: #555;
            --text3: #888;
            --input-bg: #fff;
            --input-text: #000;
            --input-ph: #888;
        }
        
        [data-theme="amoled"] {
            --bg: #000;
            --surface: #0a0a0a;
            --surface2: #111;
            --border: #1a1a1a;
            --text: #fff;
            --text2: #aaa;
            --text3: #717171;
            --input-bg: #0a0a0a;
            --input-text: #fff;
            --input-ph: #555;
        }

        * { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        html { font-size:16px; height: 100%; height: 100dvh; }
        body { 
            font-family: -apple-system, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            padding-top: calc(var(--safe-t) + var(--topbar-h));
            padding-bottom: calc(var(--player-h) + 8px + var(--nav-bar-h) + var(--safe-b));
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes pulseLogo { 0%,100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } }
        @keyframes progressGlow { 0%,100% { box-shadow: 0 0 5px rgba(29,185,84,0.5); } 50% { box-shadow: 0 0 15px rgba(29,185,84,0.8); } }
        @keyframes downloading { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rainbow { 0% { border-color: #f00; } 25% { border-color: #f80; } 50% { border-color: #0c0; } 75% { border-color: #21f; } 100% { border-color: #f00; } }

        /* ===== MODAL DE LOGIN ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.hidden { display: none; }
        
        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            border: 1px solid var(--border);
        }
        
        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .modal p {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 25px;
            line-height: 1.4;
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .google-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .google-btn:active { 
            transform: scale(0.98); 
        }
        .google-btn img {
            width: 24px;
            height: 24px;
        }
        
        .skip-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .skip-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        /* ===== PERFIL DO USUÁRIO ===== */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .user-profile:hover {
            background: var(--surface2);
        }
        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--red);
        }
        .user-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-menu {
            position: absolute;
            top: calc(var(--safe-t) + var(--topbar-h) + 5px);
            right: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 200px;
            z-index: 400;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            animation: slideDown 0.2s ease;
        }
        .user-menu.active { display: block; }
        .user-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .user-menu-item:hover {
            background: var(--surface2);
        }
        .user-menu-item.danger {
            color: #f44;
        }
        .user-menu-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }
        .user-menu-header {
            padding: 10px 16px;
            font-size: 0.75rem;
            color: var(--text2);
            font-weight: 600;
        }

        /* ===== SINCRONIZAÇÃO ===== */
        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: var(--green);
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* Componentes existentes */
        .audio-player-container {
            position: fixed; top: 0; left: 0;
            width: 1px; height: 1px; opacity: 0.01;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .audio-player-container iframe {
            width: 300px; height: 200px;
            position: absolute; top: -200px; left: -200px;
        }

        .topbar {
            position: fixed;
            top: var(--safe-t);
            left: 0; right: 0;
            height: var(--topbar-h);
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 6px; animation: float 3s ease-in-out infinite; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; animation: pulseLogo 2s ease-in-out infinite;
        }
        .logo-text {
            font-size: 1rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), #f44, var(--text), #f66);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
        }
        .logo-text sup { font-size: 7px; background: var(--red); color: #fff; padding: 1px 3px; border-radius: 3px; -webkit-text-fill-color: #fff; }
        .spacer { flex: 1; }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .bg-play-indicator {
            display: none; width: 8px; height: 8px;
            background: var(--green); border-radius: 50%;
            margin-right: 5px; animation: pulse 1.5s infinite;
        }
        .bg-play-indicator.active { display: inline-block; }

        .page-counter {
            display: none; align-items: center; justify-content: center;
            gap: 8px; padding: 8px 10px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .page-counter.active { display: flex; }
        .page-btn-pg {
            padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text); font-size: 0.7rem; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .page-btn-pg:active { background: var(--red); color: #fff; }
        .page-btn-pg:disabled { opacity: 0.3; pointer-events: none; }
        .page-info-pg {
            font-size: 0.75rem; color: var(--text2); min-width: 90px; text-align: center; font-weight: 600;
        }
        .page-info-pg .pg-current { color: var(--red); font-size: 0.9rem; }
        .page-jump-pg {
            width: 42px; text-align: center; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 10px; 
            color: var(--text); font-size: 0.7rem; padding: 5px;
        }
        .page-items-range { font-size: 0.65rem; color: var(--text3); }

        .search-section { padding: 8px 12px; background: var(--bg); z-index: 50; position: relative; }
        .search-box {
            display: flex; background: var(--input-bg); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,0,0,0.2); }
        .search-box input {
            flex: 1; padding: 10px 14px; background: transparent; border: none;
            color: var(--input-text); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .search-box input::placeholder { color: var(--input-ph); opacity: 1; }
        .search-btn {
            width: 42px; background: var(--surface2); border: none; color: var(--text);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .search-btn:active { background: var(--red); color: #fff; }

        .tabs-container { 
            display: flex; gap: 4px; padding: 4px 12px 8px; 
            background: var(--bg); overflow-x: auto; position: relative; z-index: 40;
        }
        .tabs-container::-webkit-scrollbar { height: 0; }
        .tab-btn {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text2); font-size: 0.75rem; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

        .results-section { padding: 4px 12px 20px; background: var(--bg); min-height: 200px; }
        .section-title {
            font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
        }
        .result-count { font-size: 0.65rem; color: var(--text3); }
        .video-card {
            display: flex; gap: 10px; background: var(--surface); border-radius: 8px;
            padding: 8px; cursor: pointer; transition: background 0.15s, transform 0.15s;
            animation: fadeInUp 0.3s ease forwards; opacity: 0;
            border: 2px solid transparent; margin-bottom: 6px; position: relative;
        }
        .video-card:active { background: var(--surface2); transform: scale(0.98); }
        .video-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
        .video-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .video-title { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-channel { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .video-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
        .v-btn {
            width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: none; color: #fff; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .v-btn:active { transform: scale(1.1); }
        .v-btn.fav-active { color: #f00; background: rgba(255,0,0,0.3); }
        .v-btn.dl:active { background: var(--green); }

        .spotify-bar {
            position: fixed;
            bottom: calc(var(--nav-bar-h) + var(--safe-b));
            left: 0; right: 0;
            height: var(--player-h);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; padding: 0 10px; gap: 8px;
            z-index: 200; border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); animation: slideUp 0.4s ease;
        }
        .spotify-bar.active { display: flex; }
        .spotify-bar.playing { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); }
        .sp-art {
            width: 46px; height: 46px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; cursor: pointer; transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-art.playing { 
            animation: spin 8s linear infinite; border-radius: 50%; 
            box-shadow: 0 0 15px rgba(29,185,84,0.3); 
        }
        .sp-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .sp-title { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 0.7rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-progress { position: absolute; top: -2px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .sp-progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #1ed760); width: 0%; transition: width 0.3s linear; animation: progressGlow 2s ease-in-out infinite; }
        .sp-controls { display: flex; gap: 8px; align-items: center; }
        .sp-btn { background: none; border: none; color: rgba(255,255,255,0.9); font-size: 0.9rem; cursor: pointer; padding: 6px; transition: all 0.2s; }
        .sp-btn:active { transform: scale(0.85); color: #fff; }
        .sp-btn.play {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            color: #000; font-size: 0.9rem; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sp-btn.play.playing { background: var(--green); color: #fff; }
        .sp-dl {
            background: rgba(29,185,84,0.15); border: none; color: var(--green);
            font-size: 0.7rem; cursor: pointer; padding: 6px 8px; border-radius: 15px;
            transition: all 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .sp-dl:active { background: rgba(29,185,84,0.3); transform: scale(0.95); }
        .sp-dl.downloading { animation: downloading 0.8s infinite; background: rgba(29,185,84,0.3); }

        .toast {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 15px);
            left: 50%; transform: translateX(-50%) translateY(120px);
            background: #333; color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 0.75rem; z-index: 600;
            transition: transform 0.3s; white-space: nowrap;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--red); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        .dl-progress {
            position: fixed;
            bottom: calc(var(--player-h) + var(--nav-bar-h) + var(--safe-b) + 10px);
            left: 12px; right: 12px; background: var(--surface);
            border-radius: 10px; padding: 10px; z-index: 300;
            display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dl-progress.active { display: block; }
        .dl-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .dl-fill { height: 100%; background: linear-gradient(90deg, #1db954, #00e676); width: 0%; transition: width 0.3s; }

        .player-container {
            width: 100%; background: #000; display: none;
            position: relative; animation: slideUp 0.4s ease; border-bottom: 2px solid var(--red);
        }
        .player-container.active { display: block; }
        .player-container.rainbow-border { animation: rainbow 3s linear infinite; border-width: 2px; border-style: solid; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-close {
            position: absolute; top: 8px; right: 8px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: none;
            color: #fff; font-size: 16px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 360px) { 
            :root { --player-h: 58px; --topbar-h: 44px; }
            .sp-art { width: 38px; height: 38px; } 
            .sp-btn.play { width: 34px; height: 34px; } 
            .video-thumb { width: 40px; height: 40px; }
            .sp-title { font-size: 0.8rem; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 6px + var(--nav-bar-h) + var(--safe-b));
            }
        }
        
        @media (min-width: 768px) { 
            body { max-width: 550px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
            .topbar { max-width: 550px; left: 50%; transform: translateX(-50%); }
            .spotify-bar { max-width: 550px; left: 50%; transform: translateX(-50%); }
            .user-menu { right: calc(50% - 262px); }
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            :root { --player-h: 46px; --topbar-h: 40px; }
            .sp-art { width: 30px; height: 30px; }
            .sp-btn.play { width: 28px; height: 28px; font-size: 0.7rem; }
            .results-section { max-height: 35vh; overflow-y: auto; }
            .sp-title { font-size: 0.75rem; }
            body {
                padding-top: calc(var(--safe-t) + var(--topbar-h));
                padding-bottom: calc(var(--player-h) + 4px + var(--nav-bar-h) + var(--safe-b));
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- Player de áudio oculto -->
    <div class="audio-player-container" id="audioPlayerContainer"></div>

    <!-- MODAL DE LOGIN -->
    <div class="modal-overlay hidden" id="loginModal">
        <div class="modal">
            <div style="font-size:3rem;margin-bottom:15px;">🎧</div>
            <h2>Bem-vindo ao Play Tube</h2>
            <p>Faça login com sua conta Google para salvar suas músicas, playlists e configurações na nuvem.</p>
            <button class="google-btn" onclick="Auth.login()">

    <!-- Google Identity Services -->

    <script>
    (function() {
        'use strict';
        const PROXY = 'https://playtube-proxy.codw23.workers.dev';
        
        // Client ID do Google
        const GOOGLE_CLIENT_ID = '1015083213340-69q19u0bd6f232l6kmdcmk2hf3lqgrtj.apps.googleusercontent.com';

        // ===== SISTEMA DE AUTENTICAÇÃO =====
        const Auth = {
            user: null,
            token: null,
            isLoggedIn: false,
            
            init() {
                // Verificar se já existe sessão
                const saved = localStorage.getItem('playtube_auth');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        this.user = data.user;
                        this.token = data.token;
                        this.isLoggedIn = true;
                        this.updateUI();
                        this.loadCloudData();
                    } catch(e) {
                        localStorage.removeItem('playtube_auth');
                    }
                }
                
                // Inicializar Google Identity Services
                this.initGoogleAuth();
                
                // Mostrar modal de login se não estiver logado
                if (!this.isLoggedIn && !localStorage.getItem('playtube_skip_login')) {
                    setTimeout(() => this.showLoginModal(), 800);
                }
                
                if (!this.isLoggedIn && localStorage.getItem('playtube_skip_login')) {
                    this.updateUI();
                }
            },
            
            initGoogleAuth() {
                if (typeof google === 'undefined' || !google.accounts) {
                    console.warn('⚠️ Google Identity Services não carregado ainda');
                    return;
                }
                
                try {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: (response) => this.handleGoogleResponse(response),
                        auto_select: false,
                        cancel_on_tap_outside: true,
                    });
                    console.log('✅ Google Auth inicializado');
                } catch(e) {
                    console.error('Erro ao inicializar Google Auth:', e);
                }
            },
            
            showLoginModal() {
                document.getElementById('loginModal').classList.remove('hidden');
            },
            
            hideLoginModal() {
                document.getElementById('loginModal').classList.add('hidden');
            },
            
            login() {
                if (typeof google === 'undefined' || !google.accounts) {
                    toast('⏳ Carregando Google...');
                    setTimeout(() => this.login(), 1000);
                    return;
                }
                
                try {
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            console.log('Prompt não exibido, tentando fallback');
                            // Fallback: tentar login com redirect
                            const client = google.accounts.oauth2.initTokenClient({
                                client_id: GOOGLE_CLIENT_ID,
                                scope: 'email profile',
                                callback: (response) => {
                                    if (response.access_token) {
                                        this.handleTokenResponse(response);
                                    }
                                },
                            });
                            client.requestAccessToken();
                        }
                    });
                } catch(e) {
                    console.error('Erro ao iniciar login:', e);
                    toast('⚠️ Erro ao iniciar login');
                }
            },
            
            handleGoogleResponse(response) {
                try {
                    // Decodificar JWT para obter dados do usuário
                    const payload = JSON.parse(atob(response.credential.split('.')[1]));
                    
                    this.user = {
                        id: payload.sub,
                        name: payload.name,
                        email: payload.email,
                        picture: payload.picture
                    };
                    this.token = response.credential;
                    this.isLoggedIn = true;
                    
                    this.saveAuth();
                    this.updateUI();
                    this.hideLoginModal();
                    this.loadCloudData();
                    toast('✅ Bem-vindo, ' + (payload.given_name || payload.name) + '!');
                    
                    console.log('👤 Usuário logado:', this.user.email);
                } catch(e) {
                    console.error('Erro ao processar resposta:', e);
                    toast('⚠️ Erro ao processar login');
                }
            },
            
            handleTokenResponse(response) {
                // Buscar informações do usuário
                fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { 'Authorization': 'Bearer ' + response.access_token }
                })
                .then(r => r.json())
                .then(data => {
                    this.user = {
                        id: data.sub,
                        name: data.name,
                        email: data.email,
                        picture: data.picture
                    };
                    this.token = response.access_token;
                    this.isLoggedIn = true;
                    
                    this.saveAuth();
                    this.updateUI();
                    this.hideLoginModal();
                    this.loadCloudData();
                    toast('✅ Bem-vindo, ' + (data.given_name || data.name) + '!');
                })
                .catch(e => {
                    console.error('Erro ao buscar dados do usuário:', e);
                    toast('⚠️ Erro ao obter dados do perfil');
                });
            },
            
            skip() {
                localStorage.setItem('playtube_skip_login', 'true');
                this.hideLoginModal();
                this.updateUI();
                toast('👤 Modo offline - Dados salvos localmente');
            },
            
            logout() {
                if (confirm('Tem certeza que deseja sair? Seus dados locais serão mantidos.')) {
                    // Salvar dados localmente antes de sair
                    Auth.saveLocalData();
                    
                    // Fazer upload para nuvem antes de sair
                    if (this.isLoggedIn) {
                        this.uploadToCloud();
                    }
                    
                    this.user = null;
                    this.token = null;
                    this.isLoggedIn = false;
                    localStorage.removeItem('playtube_auth');
                    
                    // Desabilitar login automático do Google
                    if (typeof google !== 'undefined' && google.accounts) {
                        google.accounts.id.disableAutoSelect();
                    }
                    
                    // Recarregar dados locais
                    this.loadLocalData();
                    this.updateUI();
                    this.hideMenu();
                    
                    toast('👋 Até logo! Seus dados estão salvos.');
                }
            },
            
            saveAuth() {
                localStorage.setItem('playtube_auth', JSON.stringify({
                    user: this.user,
                    token: this.token,
                    timestamp: Date.now()
                }));
            },
            
            updateUI() {
                const userProfile = document.getElementById('userProfile');
                const loginBtn = document.getElementById('loginBtn');
                const userAvatar = document.getElementById('userAvatar');
                const userName = document.getElementById('userName');
                const syncIndicator = document.getElementById('syncIndicator');
                const menuUserEmail = document.getElementById('menuUserEmail');
                
                if (this.isLoggedIn && this.user) {
                    userProfile.style.display = 'flex';
                    loginBtn.style.display = 'none';
                    userAvatar.src = this.user.picture || '';
                    userName.textContent = this.user.name?.split(' ')[0] || 'Usuário';
                    syncIndicator.style.display = 'flex';
                    if (menuUserEmail) {
                        menuUserEmail.textContent = '👤 ' + (this.user.email || 'MINHA CONTA');
                    }
                } else {
                    userProfile.style.display = 'none';
                    loginBtn.style.display = localStorage.getItem('playtube_skip_login') ? 'none' : 'flex';
                    syncIndicator.style.display = 'none';
                }
            },
            
            toggleMenu() {
                const menu = document.getElementById('userMenu');
                menu.classList.toggle('active');
            },
            
            hideMenu() {
                document.getElementById('userMenu').classList.remove('active');
            },
            
            // Sincronização com nuvem
            async syncNow() {
                if (!this.isLoggedIn) {
                    toast('⚠️ Faça login primeiro');
                    return;
                }
                
                toast('🔄 Sincronizando...');
                this.uploadToCloud();
                
                setTimeout(() => {
                    toast('✅ Dados sincronizados!');
                }, 1500);
            },
            
            uploadToCloud() {
                // Simular upload para nuvem (salva no localStorage como backup)
                const data = {
                    user: this.user,
                    favs: Fav.favs,
                    hist: Fav.hist,
                    dls: DL.items,
                    playlists: Playlist.getPlaylists(),
                    theme: T.current,
                    timestamp: Date.now()
                };
                
                const cloudKey = 'playtube_cloud_' + (this.user?.id || 'demo');
                localStorage.setItem(cloudKey, JSON.stringify(data));
                
                console.log('📤 Dados enviados para nuvem:', new Date().toLocaleString());
            },
            
            loadCloudData() {
                if (!this.isLoggedIn || !this.user) return;
                
                const cloudKey = 'playtube_cloud_' + this.user.id;
                const saved = localStorage.getItem(cloudKey);
                
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        
                        // Perguntar se deseja restaurar dados da nuvem
                        if (data.favs && data.favs.length > 0) {
                            if (confirm('Dados salvos na nuvem encontrados. Deseja restaurar?')) {
                                if (data.favs) localStorage.setItem('favs', JSON.stringify(data.favs));
                                if (data.hist) localStorage.setItem('hist', JSON.stringify(data.hist));
                                if (data.dls) localStorage.setItem('dls', JSON.stringify(data.dls));
                                if (data.playlists) localStorage.setItem('playlists', JSON.stringify(data.playlists));
                                if (data.theme) {
                                    T.current = data.theme;
                                    T.apply();
                                }
                                
                                // Recarregar em memória
                                Fav.favs = JSON.parse(localStorage.getItem('favs') || '[]');
                                Fav.hist = JSON.parse(localStorage.getItem('hist') || '[]');
                                DL.items = JSON.parse(localStorage.getItem('dls') || '[]');
                                Playlist.reload();
                                
                                toast('☁️ Dados restaurados da nuvem');
                            }
                        }
                    } catch(e) {
                        console.error('Erro ao carregar dados da nuvem:', e);
                    }
                } else {
                    // Primeiro login - fazer upload dos dados locais
                    this.uploadToCloud();
                    toast('☁️ Dados salvos na nuvem');
                }
            },
            
            saveLocalData() {
                localStorage.setItem('favs', JSON.stringify(Fav.favs));
                localStorage.setItem('hist', JSON.stringify(Fav.hist));
                localStorage.setItem('dls', JSON.stringify(DL.items));
                localStorage.setItem('playlists', JSON.stringify(Playlist.getPlaylists()));
            },
            
            loadLocalData() {
                Fav.favs = JSON.parse(localStorage.getItem('favs') || '[]');
                Fav.hist = JSON.parse(localStorage.getItem('hist') || '[]');
                DL.items = JSON.parse(localStorage.getItem('dls') || '[]');
                Playlist.reload();
            },
            
            exportData() {
                const data = {
                    favs: Fav.favs,
                    hist: Fav.hist,
                    dls: DL.items,
                    playlists: Playlist.getPlaylists(),
                    theme: T.current,
                    exportDate: new Date().toISOString(),
                    user: this.user ? this.user.email : 'offline'
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'playtube_backup_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
                
                this.hideMenu();
                toast('📤 Backup exportado!');
            },
            
            importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            
                            if (confirm('Importar dados do backup? Isso substituirá seus dados atuais.')) {
                                if (data.favs) {
                                    Fav.favs = data.favs;
                                    localStorage.setItem('favs', JSON.stringify(data.favs));
                                }
                                if (data.hist) {
                                    Fav.hist = data.hist;
                                    localStorage.setItem('hist', JSON.stringify(data.hist));
                                }
                                if (data.dls) {
                                    DL.items = data.dls;
                                    localStorage.setItem('dls', JSON.stringify(data.dls));
                                }
                                if (data.playlists) {
                                    localStorage.setItem('playlists', JSON.stringify(data.playlists));
                                    Playlist.reload();
                                }
                                if (data.theme) {
                                    T.current = data.theme;
                                    T.apply();
                                }
                                
                                // Sincronizar com nuvem se logado
                                if (this.isLoggedIn) {
                                    this.uploadToCloud();
                                }
                                
                                toast('📥 Dados importados com sucesso!');
                                switchTab('favorites');
                            }
                        } catch(e) {
                            toast('⚠️ Arquivo inválido');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
                this.hideMenu();
            }
        };

        // ===== PLAYLISTS =====
        const Playlist = {
            playlists: JSON.parse(localStorage.getItem('playlists') || '[]'),
            
            getPlaylists() {
                return this.playlists;
            },
            
            reload() {
                this.playlists = JSON.parse(localStorage.getItem('playlists') || '[]');
            },
            
            create(name) {
                const exists = this.playlists.find(p => p.name === name);
                if (exists) {
                    toast('⚠️ Playlist já existe');
                    return null;
                }
                
                const newPl = {
                    id: 'pl_' + Date.now(),
                    name: name,
                    tracks: [],
                    createdAt: new Date().toISOString()
                };
                
                this.playlists.push(newPl);
                this.save();
                toast('📋 Playlist criada: ' + name);
                return newPl;
            },
            
            delete(id) {
                const index = this.playlists.findIndex(p => p.id === id);
                if (index > -1) {
                    const name = this.playlists[index].name;
                    this.playlists.splice(index, 1);
                    this.save();
                    toast('🗑️ Playlist removida: ' + name);
                }
            },
            
            addTrack(playlistId, track) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    const exists = pl.tracks.find(t => t.id === track.id);
                    if (!exists) {
                        pl.tracks.push(track);
                        this.save();
                        toast('✅ Adicionado a ' + pl.name);
                    } else {
                        toast('⚠️ Já está na playlist');
                    }
                }
            },
            
            removeTrack(playlistId, trackId) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    pl.tracks = pl.tracks.filter(t => t.id !== trackId);
                    this.save();
                }
            },
            
            save() {
                localStorage.setItem('playlists', JSON.stringify(this.playlists));
                if (Auth.isLoggedIn) Auth.uploadToCloud();
            }
        };

        // ===== DETECÇÃO DE BARRAS DO SISTEMA =====
        function detectSystemBars() {
            const style = getComputedStyle(document.documentElement);
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            let safeTop = parseInt(style.getPropertyValue('env(safe-area-inset-top)')) || 
                         parseInt(style.getPropertyValue('constant(safe-area-inset-top)')) || 0;
            let safeBottom = parseInt(style.getPropertyValue('env(safe-area-inset-bottom)')) || 
                            parseInt(style.getPropertyValue('constant(safe-area-inset-bottom)')) || 0;
            let navBarHeight = 0;
            
            const isAndroid = /Android/.test(navigator.userAgent);
            
            if (isAndroid) {
                const screenHeight = screen.height || h;
                const heightDiff = screenHeight - h;
                if (heightDiff > 50 && safeBottom === 0) navBarHeight = 48;
                if (safeBottom > 0 && safeBottom <= 48) { navBarHeight = safeBottom; safeBottom = 0; }
            }
            
            if (safeTop === 0 && dpr >= 3 && w < 430) safeTop = 47;
            else if (safeTop === 0 && dpr >= 2 && w < 430) safeTop = 24;
            
            if (safeBottom === 0 && navBarHeight === 0) {
                if (dpr >= 3 && w < 430 && !isAndroid) safeBottom = 34;
                else if (isAndroid && w < 430 && safeBottom === 0) navBarHeight = 48;
            }
            
            return { statusBarHeight: safeTop, safeBottom: safeBottom, navBarHeight: navBarHeight };
        }

        // ===== CONFIGURAÇÃO DE ÁUDIO =====
        const AudioBackground = {
            enabled: true, wakeLock: null, audioContext: null, gainNode: null,
            
            async requestWakeLock() {
                if (!this.enabled) return;
                try {
                    if ('wakeLock' in navigator) {
                        this.wakeLock = await navigator.wakeLock.request('screen');
                        this.wakeLock.addEventListener('release', () => {
                            if (window.playing) this.requestWakeLock();
                        });
                    }
                } catch (e) {}
            },
            
            releaseWakeLock() {
                if (this.wakeLock) { this.wakeLock.release().catch(() => {}); this.wakeLock = null; }
            },
            
            initAudioContext() {
                try {
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        this.gainNode = this.audioContext.createGain();
                        this.gainNode.gain.value = 0.01;
                        this.gainNode.connect(this.audioContext.destination);
                    }
                    if (this.audioContext.state === 'suspended') this.audioContext.resume();
                } catch (e) {}
            }
        };

        // ===== AUTO AJUSTE DE TELA =====
        function autoAdjustScreen() {
            const w = window.innerWidth, h = window.innerHeight, dpr = window.devicePixelRatio || 1;
            const portrait = h > w, mobile = w < 768;
            const systemBars = detectSystemBars();
            const root = document.documentElement;
            
            root.style.setProperty('--safe-t', systemBars.statusBarHeight + 'px');
            root.style.setProperty('--safe-b', systemBars.safeBottom + 'px');
            root.style.setProperty('--nav-bar-h', systemBars.navBarHeight + 'px');
            
            let ph = mobile && !portrait ? 46 : mobile && w < 360 ? 58 : mobile ? 62 : 65;
            let th = mobile && !portrait ? 40 : w < 360 ? 44 : 50;
            
            root.style.setProperty('--player-h', ph + 'px');
            root.style.setProperty('--topbar-h', th + 'px');
            
            document.body.style.paddingTop = (systemBars.statusBarHeight + th) + 'px';
            document.body.style.paddingBottom = (ph + 8 + systemBars.navBarHeight + systemBars.safeBottom) + 'px';
            
            let fs = w < 320 ? 13 : w < 360 ? 14 : w < 768 ? 15 : 16;
            root.style.fontSize = fs + 'px';
        }

        // ===== PAGINAÇÃO =====
        const Paginator = {
            currentPage: 1, totalPages: 1, itemsPerPage: 10, allItems: [],
            
            setItems(items, perPage) {
                this.allItems = items || [];
                this.itemsPerPage = perPage || 10;
                this.totalPages = Math.ceil(this.allItems.length / this.itemsPerPage) || 1;
                if (this.currentPage > this.totalPages) this.currentPage = 1;
                if (this.currentPage < 1) this.currentPage = 1;
            },
            
            getPageItems() {
                const start = (this.currentPage - 1) * this.itemsPerPage;
                return this.allItems.slice(start, start + this.itemsPerPage);
            },
            
            changePage(action) {
                switch(action) {
                    case 'first': this.currentPage = 1; break;
                    case 'prev': if (this.currentPage > 1) this.currentPage--; break;
                    case 'next': if (this.currentPage < this.totalPages) this.currentPage++; break;
                    case 'last': this.currentPage = this.totalPages; break;
                }
                this.updateUI();
            },
            
            jumpToPage(page) {
                page = parseInt(page);
                if (page >= 1 && page <= this.totalPages) { this.currentPage = page; this.updateUI(); }
            },
            
            updateUI() {
                const counter = document.getElementById('pageCounter');
                const currentEl = document.getElementById('pageCurrent');
                const totalEl = document.getElementById('pageTotal');
                const rangeEl = document.getElementById('itemsRange');
                const jumpInput = document.getElementById('pageJump');
                
                if (this.totalPages > 1) {
                    counter.classList.add('active');
                    currentEl.textContent = this.currentPage;
                    totalEl.textContent = this.totalPages;
                    
                    document.getElementById('btnFirst').disabled = this.currentPage === 1;
                    document.getElementById('btnPrev').disabled = this.currentPage === 1;
                    document.getElementById('btnNext').disabled = this.currentPage === this.totalPages;
                    document.getElementById('btnLast').disabled = this.currentPage === this.totalPages;
                    
                    if (jumpInput) { jumpInput.max = this.totalPages; jumpInput.value = ''; jumpInput.placeholder = `1-${this.totalPages}`; }
                    
                    const total = this.allItems.length;
                    const start = (this.currentPage - 1) * this.itemsPerPage + 1;
                    const end = Math.min(this.currentPage * this.itemsPerPage, total);
                    if (rangeEl) rangeEl.textContent = `${start}-${end} de ${total}`;
                } else {
                    counter.classList.remove('active');
                    if (rangeEl) rangeEl.textContent = '';
                }
                
                const resCount = document.getElementById('resultCount');
                if (resCount && this.allItems.length > 0) {
                    const total = this.allItems.length;
                    if (total > this.itemsPerPage) {
                        const start = (this.currentPage - 1) * this.itemsPerPage + 1;
                        const end = Math.min(this.currentPage * this.itemsPerPage, total);
                        resCount.textContent = `${start}-${end} de ${total} resultados`;
                    } else {
                        resCount.textContent = `${total} resultados`;
                    }
                }
            }
        };

        // ===== TEMA =====
        const T = {
            themes: ['dark', 'light', 'amoled'],
            current: localStorage.getItem('theme') || 'dark',
            apply() {
                document.body.setAttribute('data-theme', this.current);
                const themeColor = this.current === 'light' ? '#fff' : this.current === 'amoled' ? '#000' : '#0f0f0f';
                document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor);
                localStorage.setItem('theme', this.current);
            },
            cycle() {
                const i = this.themes.indexOf(this.current);
                this.current = this.themes[(i + 1) % this.themes.length];
                this.apply();
                toast('🎨 ' + ({dark:'Escuro', light:'Claro', amoled:'AMOLED'})[this.current]);
            }
        };
        T.apply();

        // ===== FAVORITOS =====
        const Fav = {
            favs: JSON.parse(localStorage.getItem('favs') || '[]'),
            hist: JSON.parse(localStorage.getItem('hist') || '[]'),
            toggle(tr) {
                const i = this.favs.findIndex(f => f.id === tr.id);
                i > -1 ? (this.favs.splice(i, 1), toast('💔 Removido')) : (this.favs.unshift(tr), toast('❤️ Favoritado'));
                localStorage.setItem('favs', JSON.stringify(this.favs));
                if (Auth.isLoggedIn) Auth.uploadToCloud();
                return i === -1;
            },
            is(id) { return this.favs.some(f => f.id === id); },
            addHist(tr) {
                this.hist = this.hist.filter(h => h.id !== tr.id);
                this.hist.unshift({...tr, at: new Date().toISOString()});
                if (this.hist.length > 50) this.hist.pop();
                localStorage.setItem('hist', JSON.stringify(this.hist));
                if (Auth.isLoggedIn) Auth.uploadToCloud();
            }
        };

        // ===== DOWNLOADS =====
        const DL = {
            items: JSON.parse(localStorage.getItem('dls') || '[]'),
            async download(id, title, channel, thumb) {
                toast('⬇️ Baixando...');
                const el = document.getElementById('dlProgress'), fill = document.getElementById('dlFill'), pct = document.getElementById('dlPercent');
                el.classList.add('active'); fill.style.width = '0%'; pct.textContent = '0%';
                for (let i = 0; i <= 100; i += 25) { await new Promise(r => setTimeout(r, 250)); fill.style.width = i + '%'; pct.textContent = i + '%'; }
                this.items.unshift({id, title, channel, thumbnail:thumb, at: new Date().toISOString()});
                localStorage.setItem('dls', JSON.stringify(this.items));
                if (Auth.isLoggedIn) Auth.uploadToCloud();
                toast('✅ Concluído!');
                setTimeout(() => el.classList.remove('active'), 800);
            },
            has(id) { return this.items.some(d => d.id === id); },
            all() { return this.items; }
        };

        // ===== ESTADO =====
        window.playing = false;
        let yt = null, ytTop = null, playlist = [], idx = -1, vid = null;
        let toastTO = null, query = '', progInt = null, isVideo = false;
        let keepAliveInterval = null, recoveryAttempts = 0;
        const MAX_RECOVERY = 5;

        // ===== DOM =====
        const $ = id => document.getElementById(id);
        const sInput = $('searchInput'), sBtn = $('searchBtn'), resCont = $('resultsContainer'), resCount = $('resultCount');
        const sTitle = $('sectionTitle'), toastEl = $('toast');
        const spBar = $('spotifyBar'), spArt = $('spArt'), spTitle = $('spTitle'), spArtist = $('spArtist');
        const spPlay = $('spPlay'), spDL = $('spDL'), progBar = $('progressBar'), progCont = $('progressContainer');
        const vidCont = $('playerContainer'), vidWrap = $('playerWrapper');
        const bgIndicator = $('bgPlayIndicator');

        // ===== YOUTUBE =====
        window.onYouTubeIframeAPIReady = () => initYT();
        
        function initYT() {
            if (yt) { try { yt.destroy(); } catch(e) {} }
            
            yt = new YT.Player('audioPlayerContainer', {
                height: '200', width: '300', videoId: '',
                host: 'https://www.youtube-nocookie.com',
                playerVars: { 
                    autoplay: 0, playsinline: 1, controls: 0, disablekb: 1, 
                    fs: 0, rel: 0, modestbranding: 1, iv_load_policy: 3, 
                    origin: window.location.origin, enablejsapi: 1, 
                    mute: 0, volume: 100, autohide: 1, showinfo: 0, loop: 0
                },
                events: { onReady: onPlayerReady, onStateChange: onState, onError: onPlayerError }
            });
        }
        
        function onPlayerReady(e) {
            e.target.setVolume(100); e.target.unMute(); recoveryAttempts = 0;
            if (vid && window.playing) {
                e.target.loadVideoById({ videoId: vid, startSeconds: 0 });
                setTimeout(() => { e.target.playVideo(); e.target.unMute(); }, 500);
            }
        }
        
        function onState(e) {
            if (e.data === 1) {
                window.playing = true; updateUI(true); startProg(); startKeepAlive();
                AudioBackground.requestWakeLock(); AudioBackground.initAudioContext();
                recoveryAttempts = 0; updateMediaSession(true);
            } else if (e.data === 2) {
                window.playing = false; updateUI(false); stopProg(); stopKeepAlive();
                AudioBackground.releaseWakeLock(); updateMediaSession(false);
            } else if (e.data === 0) { stopProg(); progBar.style.width = '0%'; nextTrack(); }
        }
        
        function onPlayerError(e) {
            console.error('❌ Erro no player:', e.data);
            if (recoveryAttempts < MAX_RECOVERY && vid) {
                recoveryAttempts++;
                setTimeout(() => {
                    if (yt && yt.loadVideoById) {
                        yt.loadVideoById({ videoId: vid, startSeconds: 0 });
                        setTimeout(() => { yt.playVideo(); yt.unMute(); }, 500);
                    }
                }, 1000 * recoveryAttempts);
            } else if (recoveryAttempts >= MAX_RECOVERY) { stopPlayback(); toast('⚠️ Erro na reprodução'); }
        }
        
        function startProg() { 
            stopProg(); 
            progInt = setInterval(() => { 
                if (!yt || !window.playing) return; 
                try { const d = yt.getDuration(), c = yt.getCurrentTime(); if (d > 0) progBar.style.width = (c / d) * 100 + '%'; } catch(e) {} 
            }, 1000); 
        }
        function stopProg() { if (progInt) { clearInterval(progInt); progInt = null; } }
        function updateUI(p) {
            spPlay.textContent = p ? '⏸' : '▶';
            spPlay.classList.toggle('playing', p);
            spBar.classList.toggle('playing', p);
            spArt.classList.toggle('playing', p);
            bgIndicator.classList.toggle('active', p);
        }
        function updateMediaSession(p) {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.playbackState = p ? 'playing' : 'paused';
        }
        function startKeepAlive() {
            stopKeepAlive();
            keepAliveInterval = setInterval(() => {
                if (window.playing && yt) {
                    try {
                        const state = yt.getPlayerState();
                        if (state !== 1 && state !== 3) { yt.playVideo(); yt.unMute(); AudioBackground.initAudioContext(); }
                        if (document.hidden) { AudioBackground.requestWakeLock(); AudioBackground.initAudioContext(); }
                    } catch (e) {
                        if (vid) {
                            initYT();
                            setTimeout(() => {
                                if (yt && yt.loadVideoById) {
                                    yt.loadVideoById({ videoId: vid, startSeconds: 0 });
                                    setTimeout(() => { yt.playVideo(); yt.unMute(); }, 500);
                                }
                            }, 1000);
                        }
                    }
                }
            }, 5000);
        }
        function stopKeepAlive() { if (keepAliveInterval) { clearInterval(keepAliveInterval); keepAliveInterval = null; } }

        // ===== CONTROLES =====
        function playTrack(i = -1) {
            if (i >= 0 && i < playlist.length) idx = i;
            if (idx < 0 || idx >= playlist.length) return;
            const t = playlist[idx]; vid = t.id; recoveryAttempts = 0;
            Fav.addHist(t); progBar.style.width = '0%';
            
            if (yt?.loadVideoById) {
                yt.loadVideoById({ videoId: t.id, startSeconds: 0 });
                setTimeout(() => { if (yt?.playVideo) { yt.playVideo(); yt.unMute(); yt.setVolume(100); } }, 300);
            } else {
                initYT();
                setTimeout(() => {
                    if (yt?.loadVideoById) {
                        yt.loadVideoById({ videoId: t.id, startSeconds: 0 });
                        setTimeout(() => { yt.playVideo(); yt.unMute(); }, 500);
                    }
                }, 1000);
            }
            
            spTitle.textContent = t.title || ''; spArtist.textContent = t.channel || '';
            spArt.src = t.thumbnail || ''; document.title = '▶ ' + (t.title || 'Play Tube Music');
            spBar.classList.add('active'); isVideo = false; closeVideo();
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.title || '',
                    artist: t.channel || '',
                    artwork: [{ src: t.thumbnail || '', sizes: '96x96', type: 'image/jpeg' }]
                });
            }
        }
        
        window.togglePlay = () => {
            if (!yt) { initYT(); toast('🔄 Inicializando player...'); return; }
            if (window.playing) { yt.pauseVideo(); if (ytTop) ytTop.pauseVideo(); }
            else if (vid) { yt.playVideo(); yt.unMute(); yt.setVolume(100); }
            else if (playlist.length > 0) playTrack(0);
        };
        window.nextTrack = () => { if (!playlist.length) return; progBar.style.width = '0%'; playTrack((idx + 1) % playlist.length); };
        window.prevTrack = () => { if (!playlist.length) return; progBar.style.width = '0%'; playTrack((idx - 1 + playlist.length) % playlist.length); };
        window.seekTrack = e => { if (!yt || !vid) return; const r = progCont.getBoundingClientRect(), d = yt.getDuration(); if (d > 0) yt.seekTo(((e.clientX - r.left) / r.width) * d, true); };
        function stopPlayback() { 
            if (yt) yt.stopVideo(); if (ytTop) ytTop.stopVideo(); 
            window.playing = false; updateUI(false); stopProg(); stopKeepAlive();
            AudioBackground.releaseWakeLock(); progBar.style.width = '0%'; 
            spBar.classList.remove('active'); vidCont.classList.remove('active'); vid = null; updateMediaSession(false);
        }

        // ===== VIDEO =====
        window.showVideo = () => {
            if (!vid) return;
            isVideo = true; vidCont.classList.add('active', 'rainbow-border');
            if (!ytTop) { 
                vidWrap.innerHTML = '<div id="topPlayerElement"></div>'; 
                ytTop = new YT.Player('topPlayerElement', { 
                    videoId: vid, 
                    playerVars: { autoplay: 1, playsinline: 1, controls: 1, rel: 0, modestbranding: 1, fs: 1 }, 
                    events: { 
                        onReady: () => { if (yt?.getCurrentTime) ytTop.seekTo(yt.getCurrentTime()); }, 
                        onStateChange: e => { if (e.data === 1 && yt?.pauseVideo) yt.pauseVideo(); if (e.data === 0) closeVideo(); } 
                    } 
                }); 
            }
            else ytTop.loadVideoById({ videoId: vid, startSeconds: yt?.getCurrentTime?.() || 0 });
            vidCont.scrollIntoView({ behavior: 'smooth' });
        };
        window.closeVideo = () => { vidCont.classList.remove('active', 'rainbow-border'); if (ytTop) ytTop.stopVideo(); isVideo = false; };

        // ===== DOWNLOAD =====
        window.downloadCurrent = () => {
            if (!vid || idx < 0) { toast('⚠️ Nenhuma música'); return; }
            const t = playlist[idx]; spDL.classList.add('downloading');
            DL.download(t.id, t.title, t.channel, t.thumbnail).finally(() => spDL.classList.remove('downloading'));
        };

        // ===== RESULTADOS =====
        window.playFromResults = (id, title, channel, thumb) => {
            const v = { id, title, channel, thumbnail: thumb };
            playlist = playlist.filter(t => t.id !== v.id); playlist.unshift(v);
            idx = 0; playTrack(0); toast('▶ ' + title.substring(0, 30));
        };
        window.toggleFav = (id, title, channel, thumb, e) => { e.stopPropagation(); Fav.toggle({ id, title, channel, thumbnail: thumb }); updateFavBtns(); };
        window.dlFromCard = (id, title, channel, thumb, e) => { e.stopPropagation(); DL.download(id, title, channel, thumb); };
        
        window.addToPlaylist = (id, title, channel, thumb, e) => {
            e.stopPropagation();
            const track = { id, title, channel, thumbnail: thumb };
            const pls = Playlist.getPlaylists();
            
            if (pls.length === 0) {
                const name = prompt('Nome da nova playlist:');
                if (name && name.trim()) {
                    const newPl = Playlist.create(name.trim());
                    if (newPl) Playlist.addTrack(newPl.id, track);
                }
            } else {
                let msg = 'Escolha uma playlist:\n\n';
                pls.forEach((pl, i) => { msg += `${i + 1}. ${pl.name} (${pl.tracks.length} músicas)\n`; });
                msg += '\n0. Criar nova playlist';
                
                const choice = prompt(msg);
                if (choice === '0') {
                    const name = prompt('Nome da nova playlist:');
                    if (name && name.trim()) {
                        const newPl = Playlist.create(name.trim());
                        if (newPl) Playlist.addTrack(newPl.id, track);
                    }
                } else if (choice && parseInt(choice) > 0 && parseInt(choice) <= pls.length) {
                    Playlist.addTrack(pls[parseInt(choice) - 1].id, track);
                }
            }
        };

        function updateFavBtns() {
            document.querySelectorAll('.v-btn.fav').forEach(b => {
                const fid = b.getAttribute('data-id'), f = Fav.is(fid);
                b.classList.toggle('fav-active', f); b.textContent = f ? '❤️' : '🤍';
            });
        }

        function card(v) {
            const f = Fav.is(v.id), d = DL.has(v.id);
            return `<div class="video-card" onclick="playFromResults('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}')">
                <img class="video-thumb" src="${v.thumbnail}" loading="lazy" onerror="this.style.opacity='0.3'">
                <div class="video-info"><div class="video-title">${esc(v.title)}</div><div class="video-channel">${esc(v.channel)}</div>${v.at?`<div style="font-size:0.65rem;color:var(--text3);margin-top:1px;">🕐 ${new Date(v.at).toLocaleDateString()}</div>`:''}</div>
                <div class="video-actions">
                    <button class="v-btn fav${f?' fav-active':''}" data-id="${v.id}" onclick="toggleFav('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">${f?'❤️':'🤍'}</button>
                    <button class="v-btn" onclick="addToPlaylist('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)" title="Adicionar à playlist">📋</button>
                    ${!d?`<button class="v-btn dl" onclick="dlFromCard('${v.id}','${esc(v.title)}','${esc(v.channel)}','${v.thumbnail}',event)">⬇</button>`:''}
                </div></div>`;
        }

        // ===== TABS =====
        window.switchTab = t => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            [...document.querySelectorAll('.tab-btn')].forEach(b => { 
                const text = b.textContent.toLowerCase();
                if (text.includes(t === 'search' ? 'buscar' : t === 'favorites' ? 'favoritos' : t === 'playlists' ? 'playlists' : t === 'history' ? 'histórico' : 'downloads')) 
                    b.classList.add('active'); 
            });
            
            const titles = {
                search: 'Resultados', favorites: '❤️ Favoritos', playlists: '📋 Playlists',
                history: '🕐 Histórico', downloads: '⬇️ Downloads'
            };
            sTitle.innerHTML = '<span>' + (titles[t] || 'Resultados') + '</span>';
            
            if (t === 'search') { 
                if (query) searchYT(query); 
                else {
                    resCont.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text2);"><div style="font-size:3rem;">🎧</div><div>Busque suas músicas</div></div>';
                    document.getElementById('pageCounter').classList.remove('active'); resCount.textContent = '';

            else if (t === 'favorites') {

                } else {

            else if (t === 'playlists') {

                    resCont.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text2);">
                        📋 Nenhuma playlist<br><br>
                        <button onclick="createPlaylist()" style="background:var(--red);color:#fff;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-size:0.85rem;">
                            + Criar Playlist
                        </button>
                    </div>`;
                    document.getElementById('pageCounter').classList.remove('active'); resCount.textContent = '0 playlists';
                } else {
                    resCont.innerHTML = pls.map(pl => `
                        <div class="video-card" style="flex-direction:column;align-items:stretch;" onclick="showPlaylist('${pl.id}')">

                                <div style="font-weight:600;color:var(--text);">📋 ${esc(pl.name)}</div>
                                <button class="v-btn" onclick="event.stopPropagation();deletePlaylist('${pl.id}')" style="color:#f44;">🗑️</button>
                            </div>
                            <div style="font-size:0.7rem;color:var(--text2);margin-top:4px;">
                                ${pl.tracks.length} músicas • Criada em ${new Date(pl.createdAt).toLocaleDateString()}
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('pageCounter').classList.remove('active'); resCount.textContent = `${pls.length} playlists`;
                }
            }
            else if (t === 'history') { 
                if (Fav.hist.length === 0) {
                    resCont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">🕐 Vazio</div>';

                } else {

                    resCont.innerHTML = Paginator.getPageItems().map(v => card(v)).join('');

                    Paginator.updateUI(); updateFavBtns();
                }
            }

        window.createPlaylist = () => {
            const name = prompt('Nome da playlist:');
            if (name && name.trim()) {
                Playlist.create(name.trim());
                switchTab('playlists');

        };
        
        window.deletePlaylist = (id) => {
            if (confirm('Excluir esta playlist?')) {
                Playlist.delete(id);
                switchTab('playlists');
            }
        };
        
        window.showPlaylist = (id) => {
            const pl = Playlist.getPlaylists().find(p => p.id === id);
            if (!pl) return;
            
            if (pl.tracks.length === 0) {

        // ===== CONTROLES DE PÁGINA =====
        window.changePage = (action) => {
            Paginator.changePage(action);
            const items = Paginator.getPageItems();
            resCont.innerHTML = items.map(v => card(v)).join('');
            updateFavBtns();
            resCont.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        
        window.jumpToPage = () => {
            const page = parseInt(document.getElementById('pageJump').value);
            if (page) {
                Paginator.jumpToPage(page);
                const items = Paginator.getPageItems();
                resCont.innerHTML = items.map(v => card(v)).join('');
                updateFavBtns();
                resCont.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ===== BUSCA =====
        sBtn.addEventListener('click', () => { query = sInput.value; searchYT(query); });
        sInput.addEventListener('keydown', e => { if (e.key === 'Enter') { query = sInput.value; searchYT(query); } });
        
        async function searchYT(q) {
            if (!q.trim()) { toast('⚠️ Digite algo'); return; }
            showLoad(true); 
            
            try {
                const u = new URL(PROXY); 
                u.searchParams.append('q', q + ' música'); 
                u.searchParams.append('maxResults', '50');
                u.searchParams.append('regionCode', 'BR'); 
                u.searchParams.append('relevanceLanguage', 'pt');
                
                const r = await fetch(u); 
                if (!r.ok) throw new Error('Erro');
                const d = await r.json();
                
                if (d.videos?.length) {
                    Paginator.setItems(d.videos, 10);
                    resCont.innerHTML = Paginator.getPageItems().map(v => card(v)).join('');
                    Paginator.updateUI(); updateFavBtns();
                } else {
                    resCont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum resultado</div>';
                    document.getElementById('pageCounter').classList.remove('active'); resCount.textContent = '';
                }
            } catch(e) { toast('⚠️ Erro na busca'); }
            showLoad(false);
        }

        // ===== UTILS =====
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showLoad(s) { if (s) resCont.innerHTML = '<div class="loading"><div class="spinner"></div><div>Buscando...</div></div>'; }
        function toast(m) { if (toastTO) clearTimeout(toastTO); toastEl.textContent = m; toastEl.classList.add('show'); toastTO = setTimeout(() => toastEl.classList.remove('show'), 2500); }

        // ===== MEDIA SESSION =====
        function setupMS() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.setActionHandler('play', togglePlay);
            navigator.mediaSession.setActionHandler('pause', togglePlay);
            navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
            navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            navigator.mediaSession.setActionHandler('stop', stopPlayback);
        }

        // ===== EVENTOS =====
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && window.playing) {
                AudioBackground.requestWakeLock(); AudioBackground.initAudioContext(); startKeepAlive();
            }
        });
        
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('userMenu');
            const profile = document.getElementById('userProfile');
            if (menu.classList.contains('active') && !menu.contains(e.target) && !profile.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // ===== INIT =====
        function init() {
            setupMS(); 
            autoAdjustScreen();
            AudioBackground.initAudioContext();
            Auth.init();
            
            setTimeout(() => initYT(), 500);
            
            console.log('✅ Play Tube Music - Google Auth Configurado');
        }
        
        window.addEventListener('resize', () => { 
            clearTimeout(window._rt); 
            window._rt = setTimeout(autoAdjustScreen, 250); 
        });
        window.addEventListener('orientationchange', () => setTimeout(autoAdjustScreen, 300));
        window.addEventListener('load', init);

        // EXPORT GLOBAIS
        window.Auth = Auth;
        window.Playlist = Playlist;
        window.T = T;
        window.autoAdjustScreen = autoAdjustScreen;
        window.changePage = changePage;
        window.jumpToPage = jumpToPage;
        window.togglePlay = togglePlay; 
        window.nextTrack = nextTrack; 
        window.prevTrack = prevTrack;
        window.playFromResults = playFromResults; 
        window.toggleFav = toggleFav; 
        window.dlFromCard = dlFromCard;
        window.addToPlaylist = addToPlaylist;
        window.downloadCurrent = downloadCurrent; 
        window.switchTab = switchTab; 
        window.seekTrack = seekTrack;
        window.showVideo = showVideo; 
        window.closeVideo = closeVideo;
        window.stopPlayback = stopPlayback;
        window.createPlaylist = createPlaylist;
        window.deletePlaylist = deletePlaylist;
        window.showPlaylist = showPlaylist;
    })();
    </script>
</body>
</html>
